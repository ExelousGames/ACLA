# =============================================================================
# Graph Analysis Skill — VLM graph description knowledge base
#
# Teaches the Vision Language Model how to accurately describe the contents
# of each telemetry graph type.  The VLM's job is ONLY to produce a
# detailed, precise description of what it sees.  It must NOT diagnose
# problems, assign labels, or draw conclusions — downstream pipeline
# nodes handle that.
#
# For each graph:
#   id                    – must match AGENT_GRAPH_DEFINITIONS in
#                           annotation_agent_tools.py
#   title                 – human-readable graph title
#   graph_type            – feature_plot | trajectory_plot
#   axes                  – what the x-axis and y-axis represent
#   visual_elements       – colours, line styles, markers the VLM will see
#   what_to_describe      – step-by-step checklist of observations to report
#   description_vocabulary – precise terms to use when describing patterns
#   common_description_errors – VLM misreadings to avoid
#
# This file is loaded once by GraphAnalysisSkill (graph_analysis_skill.py).
# The step_describer node injects the relevant entries into the VLM prompt
# when the current step includes graph images.
# =============================================================================

graphs:

  # =========================================================================
  # FEATURE PLOTS (line charts over segment index)
  # =========================================================================

  throttle:
    title: "Throttle Application: Expert vs Player"
    graph_type: feature_plot
    axes:
      x: "Segment index (time progression left to right)"
      y: "Throttle position (0.0 = off, 1.0 = full throttle)"
    visual_elements:
      - "Two overlapping line traces — one for the expert (reference), one for the player"
      - "Legend identifies which line is expert_optimal_throttle vs Physics_gas (player)"
      - "Grid lines for reading exact values"
    what_to_describe: >
      Write a single cohesive paragraph describing the throttle graph.
      Identify the expert and player lines from the legend and state the
      colour of each.  Cover the application points for both traces —
      which index each rises from zero, which applies first, and the
      approximate index gap.  Describe the application ramp steepness
      for each (steep/aggressive, gradual, near-identical) and over
      how many indices each goes from 0 to peak.  Report the peak value
      for each trace numerically.  Note any hesitations, dips, or lifts
      in the player's trace — the index range and depth of each dip.
      Describe the release point for each trace and how abrupt the drop
      is (sharp drop, gradual taper, stepped release).  End with the
      overall shape comparison — whether the player's trace matches the
      expert's shape or differs fundamentally.
    description_vocabulary:
      application_point: "The index where the trace first rises above ~0.05 from zero"
      ramp_rate: "Described relative to the expert's ramp — steeper than expert, similar to expert, or more gradual than expert (compare the indices each takes from zero to peak)"
      peak_value: "The highest y-value the trace reaches, read from the y-axis"
      release_point: "The index where the trace begins falling from its plateau"
      release_rate: "Described relative to the expert's release — sharper than expert, similar to expert, or more gradual than expert; note 'stepped' if the drop happens in stages rather than a single motion"
      hesitation: "A temporary dip or fluctuation in the trace before it returns to its prior level"
    comparative_vocabulary:
      - "The player's throttle trace begins rising at index 80, eight indices later than the expert's at index 72."
      - "The player's peak throttle (0.78) is lower than the expert's (1.00)."
      - "The player applies throttle more gradually than the expert, taking 14 indices to reach peak versus the expert's 6."
      - "The player releases the throttle earlier than the expert, lifting at index 110 versus the expert's index 118."
    common_description_errors:
      - "Do NOT confuse the expert line with the player line — always verify against the legend before describing"
      - "Do NOT describe a difference in a braking zone as a throttle difference — only describe throttle behaviour where throttle is actually applied"
      - "Do NOT omit numerical values — always report index positions and y-axis values wherever readable"
      - "Do NOT interpret or diagnose — describe what you see, not what it means"

  brake:
    title: "Brake Application: Expert vs Player"
    graph_type: feature_plot
    axes:
      x: "Segment index (time progression left to right)"
      y: "Brake pressure (0.0 = off, 1.0 = full brake)"
    visual_elements:
      - "Two overlapping line traces — expert_optimal_brake and Physics_brake (player)"
      - "Legend identifies which is which"
      - "Grid lines for reading exact values"
    what_to_describe: >
      Write a single cohesive paragraph describing the brake graph.
      Identify the expert and player traces from the legend and state
      the colour of each.  Cover the braking initiation index for both
      traces — where each rises from zero, which begins first, and the
      index gap.  Describe the application ramp steepness for each and
      the approximate indices from zero to peak.  Report the peak brake
      pressure for each trace numerically.  Describe the release phase
      for each — the index where pressure begins decreasing, the rate
      of decrease (sharp drop, gradual trail-off, stepped reduction),
      and the index where each trace reaches zero.  State the total
      braking duration (indices from initiation to full release) for
      each.  If both brake and throttle are visible, mention any index
      range where both are simultaneously above zero.  Close with the
      overall shape comparison.
    description_vocabulary:
      initiation_index: "The index where the trace first rises above ~0.05"
      peak_pressure: "The highest y-value reached, read from the y-axis"
      release_onset: "The index where the trace begins decreasing from its peak or plateau"
      release_rate: "Described relative to the expert's release — sharper than expert, similar to expert, or more gradual than expert; flag as trail-brake if pressure decreases gradually rather than abruptly, or stepped if it drops in stages"
      braking_duration: "Count of indices from initiation to full release (trace returns to ~0)"
      trail_braking: "A phase where brake pressure decreases gradually rather than releasing abruptly"
    comparative_vocabulary:
      - "The player's brake trace begins rising at index 55, ten indices later than the expert's at index 45."
      - "The player's peak brake pressure (0.62) is lower than the expert's (0.85)."
      - "The player applies the brake more gradually than the expert, taking 8 indices to reach peak versus the expert's 3."
      - "The player releases the brake more gradually than the expert, taking 12 indices to reach zero versus the expert's 4."
      - "The player's total braking duration (24 indices) is longer than the expert's (18 indices)."
      - "The player applies throttle and brake simultaneously between indices 70 and 78."
    common_description_errors:
      - "Do NOT confuse brake release (trace returning to zero) with brake reduction (trace decreasing but not to zero, i.e. trail braking) — describe what the trace actually does"
      - "Do NOT omit the expert comparison — always describe BOTH traces, not just the player"
      - "Do NOT round indices to 'about halfway' — read the x-axis grid and report specific indices"
      - "Do NOT interpret or diagnose — describe what you see, not what it means"

  time_delta:
    title: "Time Difference to Expert"
    graph_type: feature_plot
    axes:
      x: "Segment index (time progression left to right)"
      y: "Time delta in milliseconds (positive = player behind expert, negative = player ahead)"
    visual_elements:
      - "Single line trace showing cumulative time gap"
      - "A RISING line means the gap is growing (player falling further behind)"
      - "A FALLING line means the gap is shrinking (player catching up)"
      - "A FLAT line means the gap is stable"
    what_to_describe: >
      Write a single cohesive paragraph describing the time delta graph.
      State the value at the leftmost index and the value at the
      rightmost index in milliseconds, then state the net change
      (whether the gap increased, decreased, or stayed the same and
      by how many milliseconds).  Describe the overall shape of the
      line using terms such as continuously rising, continuously falling,
      flat, rises then flattens, rises then falls, or oscillating.
      Identify any inflection points — indices where the line changes
      direction — and report the index and delta value at each.
      Describe the steepness of any rising or falling sections (steep
      rise if >0.1 s over ~20 indices, gradual, slight drift).  Note
      any discontinuities that look like data artifacts rather than
      smooth trends.
    description_vocabulary:
      rising: "Time delta value is increasing (gap growing)"
      falling: "Time delta value is decreasing (gap shrinking)"
      flat: "Time delta value is approximately constant (gap stable)"
      inflection_point: "An index where the trend changes direction"
      net_change: "Ending value minus starting value"
      steep: "A change of >0.1 seconds over a short span (~20 indices)"
      gradual: "A slow, steady change over many indices"
    comparative_vocabulary:
      - "The player loses 320 ms to the expert across the segment (gap rises from 0 ms to 320 ms)."
      - "The player gains 80 ms back on the expert between indices 60 and 110."
    common_description_errors:
      - "Do NOT ignore the SCALE of the y-axis — a 0.01s change is negligible, a 0.5s change is large.  Always read and report the actual values."
      - "Do NOT describe every micro-fluctuation as a trend change — only report clear, sustained directional changes"
      - "Do NOT interpret why the delta is changing — only describe WHAT the line does (rises, falls, inflection at index X)"
      - "Do NOT confuse the sign — positive means the player is BEHIND, negative means AHEAD"

  speed_delta:
    title: "Speed Difference (Expert - Player)"
    graph_type: feature_plot
    axes:
      x: "Segment index (time progression left to right)"
      y: "Speed difference in km/h (positive = expert faster, negative = player faster)"
    visual_elements:
      - "Single line trace oscillating around zero"
      - "Values above zero mean the expert is faster at that index"
      - "Values below zero mean the player is faster at that index"
    what_to_describe: >
      Write a single cohesive paragraph describing the speed delta graph.
      State the overall bias — whether the line sits mostly above zero,
      mostly below zero, or balanced.  Report the peak positive value
      (the maximum km/h where the expert is faster) with its index, and
      the peak negative value (the maximum km/h where the player is
      faster) with its index.  Describe the shape — smooth or spiky,
      one dominant peak or multiple, any sustained section above or
      below zero.  Note any sustained sections where the absolute
      difference exceeds 20 km/h (with index range and magnitude) and
      any sustained sections where the difference stays near zero
      (within ±5 km/h).  Report the index positions where the line
      crosses zero.
    description_vocabulary:
      positive_region: "Expert faster than player (line above zero)"
      negative_region: "Player faster than expert (line below zero)"
      zero_crossing: "Index where the line crosses from positive to negative or vice versa"
      sustained_gap: "A section where the absolute difference stays above a threshold for many indices"
      peak_difference: "The largest absolute value of the speed difference in the segment"
    comparative_vocabulary:
      - "The expert is faster than the player by up to 28 km/h around index 75."
      - "The player is faster than the expert by 6 km/h between indices 110 and 130."
    common_description_errors:
      - "Do NOT read the sign backwards — positive = expert faster, not player faster"
      - "Do NOT describe brief single-index spikes as sustained differences — report their duration"
      - "Do NOT interpret causation — describe the speed difference, not why it exists"

  speed:
    title: "Speed Trace: Expert vs Player"
    graph_type: feature_plot
    axes:
      x: "Segment index (time progression left to right)"
      y: "Speed in km/h"
    visual_elements:
      - "Two overlapping line traces — expert_optimal_speed and Physics_speed_kmh (player)"
      - "Legend identifies which line is which"
      - "Speed dropping = deceleration/braking, speed minimum = apex/lowest speed, speed rising = acceleration"
    what_to_describe: >
      Write a single cohesive paragraph describing the speed graph.
      Identify the expert and player traces from the legend and state
      the colour of each.  Describe the overall shape of each trace
      using terms such as V-shape, U-shape, flat-top, descending, or
      ascending.  Report the entry speed for each trace (km/h at the
      leftmost index), the minimum speed and the index where it occurs,
      and the exit speed at the rightmost index.  Describe the
      deceleration phase for each — where speed starts dropping,
      how steeply, and over how many indices each trace falls from
      entry to minimum.  Describe the acceleration phase — where speed
      starts rising after the minimum and how steeply.  Note any flat
      spots, steps, or plateaus in the player's trace, and any extended
      section where the player's speed holds constant at a low value
      (~60–80 km/h).
    description_vocabulary:
      entry_speed: "Speed at the leftmost index of the segment"
      minimum_speed: "The lowest speed value and the index where it occurs"
      exit_speed: "Speed at the rightmost index of the segment"
      deceleration_onset: "The index where speed starts decreasing"
      acceleration_onset: "The index where speed starts increasing after the minimum"
      flat_spot: "A section where speed holds approximately constant for several indices"
      speed_step: "A sudden small jump or drop in speed (possibly a gear shift)"
    comparative_vocabulary:
      - "The player's entry speed (172 km/h) is lower than the expert's (188 km/h)."
      - "The player's minimum speed (78 km/h at index 92) is lower than the expert's (95 km/h at index 88)."
      - "The player's exit speed (134 km/h) is lower than the expert's (152 km/h)."
      - "The player begins decelerating at index 60, four indices later than the expert at index 56."
    common_description_errors:
      - "Do NOT compare values from different phases — report entry vs entry, minimum vs minimum, exit vs exit"
      - "Do NOT confuse the two traces — always verify which line is which from the legend"
      - "Do NOT skip reporting numerical values — always state km/h figures"
      - "Do NOT interpret — describe the shape and values, not what they mean for driving quality"

  push_limit:
    title: "Driver Push/Limit"
    graph_type: feature_plot
    axes:
      x: "Segment index (time progression left to right)"
      y: "Push-to-limit metric (higher = closer to car's grip limit)"
    visual_elements:
      - "Single line trace showing grip utilisation over the segment"
      - "Higher values = driver using more of the car's available grip"
      - "Spikes indicate moments where the car approached or exceeded grip limits"
    what_to_describe: >
      Write a single cohesive paragraph describing the push/limit graph.
      State the baseline level — the typical value the trace hovers
      around for most of the segment.  For each spike (sudden increase
      above baseline), describe where it starts rising, its peak value,
      the index of the peak, the index where it returns to baseline,
      its duration in indices, and where it falls within the segment
      (early, middle, or late third).  If there are multiple spikes,
      state how many and whether they are isolated or clustered.
      Describe any sustained high sections (elevated plateau rather than
      a spike) and any sustained low sections (near zero for many
      indices).  Close with the overall range — the minimum and maximum
      values seen across the segment.
    description_vocabulary:
      baseline: "The typical value the trace sits at during normal driving"
      spike: "A brief sharp increase above the baseline, then return"
      sustained_elevation: "A section where the value stays high for many indices"
      sustained_low: "A section where the value stays near zero for many indices"
      peak_value: "The highest value reached during a spike"
    common_description_errors:
      - "Do NOT confuse this metric with speed — push_limit is about grip utilisation, not velocity"
      - "Do NOT describe the overall level without also describing specific spikes — both matter"
      - "Do NOT interpret spikes as oversteer or understeer — that requires the balance trajectory graph.  Just describe the spike shape and location."
      - "Do NOT omit index positions for spikes — report where they occur"

  # =========================================================================
  # TRAJECTORY PLOTS (bird's-eye view of the track)
  # =========================================================================

  trajectory_detailed:
    title: "Detailed Trajectory"
    graph_type: trajectory_plot
    axes:
      x: "Track X position (spatial, not time-based)"
      y: "Track Y position (spatial, not time-based — y-axis is INVERTED)"
    visual_elements:
      - "Green solid line = Player trajectory"
      - "Blue dashed line = Expert (optimal) trajectory"
      - "Black X marker = Start of segment"
      - "Black O marker = End of segment"
      - "Purple star marker = Detected apex (highest curvature point)"
      - "Red annotation = Minimum speed point with km/h value"
      - "Y-axis is INVERTED (standard for top-down track views)"
    what_to_describe: >
      Write a single cohesive paragraph describing the detailed
      trajectory graph.  State the direction of travel from the Start
      (X) marker to the End (O) marker.  Describe the overall shape
      of the trajectory (single curve, straight, S-shape, hairpin,
      approach to curve, exit from curve, short transition).  Describe
      the separation between the player (green) and expert (blue) lines
      throughout — whether they are close, show a moderate gap, or
      diverge largely, and which section (entry, mid, exit) has the
      most separation.  At corner entry describe the relative positions
      and whether the turn-in points coincide or one stays straight
      longer.  Near the apex (purple star) describe how close the
      player's line passes to the inside relative to the expert's.  At
      corner exit describe whether the player's line opens out to the
      same width as the expert's or is tighter/wider.  Note any kinks,
      wobbles, or sharp corrections in the player's line and their
      approximate location.  If the minimum speed annotation is visible,
      state its value and location.  If the player's line deviates
      dramatically with a sharp correction back, describe the location
      and magnitude.
    description_vocabulary:
      inside: "The side of the track closer to the centre of the corner"
      outside: "The side of the track farther from the centre of the corner"
      turn_in_point: "Where the trajectory begins curving from a straight path"
      apex_proximity: "How close the player's line passes to the inside of the corner"
      track_width_usage: "How much of the available track the player uses on exit"
      kink: "A sharp, brief deviation in the trajectory that suggests a correction"
      divergence: "A section where the two lines are far apart"
      convergence: "A section where the two lines come closer together"
    common_description_errors:
      - "The Y-AXIS IS INVERTED — do not read up/down wrong when describing inside/outside of corners"
      - "Do NOT assume a direction of travel — always verify from the Start (X) and End (O) markers"
      - "Do NOT describe tiny pixel-level differences as meaningful — only report clear, visible separations"
      - "Do NOT interpret what a trajectory difference means for driving quality — describe the lines and their relative positions"
      - "The purple apex marker is computed by curvature, not track geometry — describe where it is, do not assume it is the 'correct' apex"

  trajectory_gas_brake:
    title: "Gas/Brake Trajectory"
    graph_type: trajectory_plot
    axes:
      x: "Track X position (spatial)"
      y: "Track Y position (spatial — y-axis INVERTED)"
    visual_elements:
      - "Player trajectory as a COLOURED line (colour = throttle/brake balance)"
      - "GREEN sections = full throttle (gas dominant)"
      - "RED sections = full brake"
      - "YELLOW sections = coasting (neither gas nor brake, or partial overlap)"
      - "Colour bar on the side maps values: -1 (full brake) through 0 (coast) to +1 (full gas)"
      - "Blue/grey dashed line = Expert trajectory (reference position)"
      - "Black X = Start, Black O = End"
    what_to_describe: >
      Write a single cohesive paragraph describing the gas/brake
      trajectory graph.  State the direction of travel from Start (X)
      to End (O).  Describe the colour sequence along the player's line
      in travel order — list each colour section and where each
      transition occurs relative to the corner geometry (before the
      curve, at curve entry, at the apex area, after the apex, on the
      straight).  For each colour section describe its length relative
      to the total trajectory (short section, extended section, brief
      transition, dominant colour).  Note where the red braking section
      starts and ends relative to the corner geometry, where the green
      throttle section resumes after braking, and the position and
      duration of any yellow coasting sections.  Describe the player's
      trajectory position relative to the expert's dashed line
      (inside/outside, separation by section).  Note any mixed or
      transitional colour sections (e.g., orange) and where they occur.
    description_vocabulary:
      green_section: "Throttle-dominant section (gas > brake)"
      red_section: "Brake-dominant section (brake > gas)"
      yellow_section: "Coasting or balanced section (gas ≈ brake ≈ 0, or partial overlap)"
      colour_transition: "The point along the trajectory where the colour changes"
      relative_to_corner: "Described as: before curve, at curve entry, at apex area, at curve exit, on the straight"
    common_description_errors:
      - "Do NOT describe colour transitions without relating them to the corner geometry — state whether each transition is before, at, or after the curve"
      - "Yellow does NOT necessarily mean 'nothing is happening' — it can mean coast (both zero) or overlap (both partially applied). Describe it as 'yellow (coast or overlap)' and move on."
      - "Do NOT describe what the colour pattern means for performance — just describe what colours appear where"
      - "Do NOT forget to describe the trajectory position (inside/outside) in addition to the colours"

  trajectory_balance:
    title: "Oversteer/Understeer Balance Trajectory"
    graph_type: trajectory_plot
    axes:
      x: "Track X position (spatial)"
      y: "Track Y position (spatial — y-axis INVERTED)"
    visual_elements:
      - "Player trajectory as a COLOURED line (colour = rear-vs-front slip angle balance)"
      - "RED sections = rear slip angle dominant (rear tyres slipping more)"
      - "BLUE sections = front slip angle dominant (front tyres slipping more)"
      - "WHITE/NEUTRAL sections = balanced (similar front and rear slip)"
      - "Colour bar: negative (blue) through 0 (neutral) to positive (red)"
      - "Grey dashed line = Expert trajectory (reference position)"
      - "Black X = Start, Black O = End"
      - "IMPORTANT: understeer (blue) is amplified 2x in the colour mapping for visibility"
    what_to_describe: >
      Write a single cohesive paragraph describing the oversteer/
      understeer balance trajectory graph.  State the direction of
      travel from Start (X) to End (O).  Describe the colour sequence
      along the trajectory in travel order with approximate locations
      relative to the corner geometry.  For each red section state
      where it falls on the trajectory (entry, mid-corner, exit,
      straight), how saturated the red is (vivid/dark vs light/faint),
      and whether it is brief or extended.  For each blue section
      cover the same detail and note that blue is displayed at 2x
      amplification so a given blue intensity represents half the
      actual slip difference of the same red intensity.  Describe
      white/neutral sections — where they are and how much of the
      trajectory they cover.  Describe the player's trajectory position
      relative to the expert's dashed grey line.  Note any abrupt
      colour changes and their locations.
    description_vocabulary:
      red_section: "Rear-slip-dominant section (rear tyres slipping more than fronts)"
      blue_section: "Front-slip-dominant section (front tyres slipping more than rears)"
      neutral_section: "Balanced section (similar front and rear slip angles)"
      saturation: "How vivid or intense the colour is — vivid = strong imbalance, faint = mild imbalance"
      amplification_note: "Blue is displayed at 2x amplification — a given blue intensity represents half the actual slip difference of the same red intensity"
    common_description_errors:
      - "Do NOT forget the 2x understeer amplification — always note that blue is amplified when describing blue sections"
      - "Do NOT confuse entry vs exit — verify travel direction from Start/End markers before describing which part of the corner a colour section is in"
      - "Do NOT interpret the colours as good or bad — describe what colours appear where, and let downstream nodes draw conclusions"
      - "Do NOT skip describing neutral sections — knowing where the car IS balanced is as important as where it is not"

# =============================================================================
# Cross-graph description guidelines
#
# When the step includes multiple graph types, these guidelines tell the
# VLM how to cross-reference observations across graphs for a more
# complete description.  Still description-only — no diagnosis.
# =============================================================================

cross_graph_guidelines:

  brake_and_speed: >
    When both the BRAKE graph and SPEED graph are present, cross-reference
    your descriptions: report whether the index where brake pressure rises
    corresponds to the index where speed starts decreasing.  Report whether
    the index where brake pressure returns to zero corresponds to the speed
    minimum.  If they do not align, describe the gap in indices.

  throttle_and_speed: >
    When both the THROTTLE graph and SPEED graph are present: report whether
    the index where throttle rises corresponds to the index where speed
    starts increasing.  If there is a delay between throttle application and
    speed increase, describe how many indices the delay spans.

  time_delta_and_features: >
    When the TIME DELTA graph is present alongside brake, throttle, or speed
    graphs: describe which sections of the time delta line (rising, flat,
    falling) align with which index ranges on the feature graphs.  For
    example: "The time delta rises between index 100–150, which corresponds
    to the braking zone on the brake graph."

  trajectory_and_features: >
    When trajectory plots and feature plots are both present: describe which
    spatial sections of the trajectory (entry, apex, exit) correspond to
    which index ranges on the feature plots.  This helps link "where on
    track" to "when in the data".

  balance_and_push_limit: >
    When the BALANCE trajectory and PUSH_LIMIT graph are both present:
    describe whether any push_limit spikes occur at the same segment
    section as red or blue colour sections on the balance trajectory.
    Report the co-occurrence without interpreting it.

  brake_and_throttle_overlap: >
    When both BRAKE and THROTTLE graphs are present: describe any index
    range where BOTH traces are simultaneously above zero.  Report the
    start index, end index, and the approximate values of each trace
    during the overlap.

# =============================================================================
# Trajectory shape description guide
#
# When any trajectory graph is present, describe the overall shape of the
# trajectory using these standard terms.
# =============================================================================

trajectory_shape_vocabulary: >
  Use these terms when describing the overall shape of a trajectory:
  - "Single curve": The trajectory follows one continuous arc from Start to End.
  - "Straight": The trajectory is essentially a straight line with minimal curvature.
  - "Approach to curve": The trajectory starts straight and begins curving toward the End marker.
  - "Exit from curve": The trajectory starts curved and straightens out toward the End marker.
  - "S-shape / chicane": The trajectory changes direction at least twice (left-right-left or right-left-right).
  - "Hairpin": A very tight, ~180-degree turn.
  - "Short transition": A brief section between two curves, neither a full straight nor a full corner.
  Describe the shape first, then the details.  The shape tells downstream
  nodes what type of segment this is.
