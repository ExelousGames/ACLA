# =============================================================================
# Graph Analysis Skill — VLM graph description knowledge base
#
# Teaches the Vision Language Model how to read each telemetry graph
# accurately.  The VLM's job is ONLY to produce a detailed, precise
# description of what it sees.  It must NOT diagnose problems, assign
# labels, or draw conclusions — downstream pipeline nodes do that.
#
# Per-graph schema (loaded by GraphSkillEntry in graph_analysis_skill.py):
#   title                    — human-readable graph title
#   graph_type               — feature_plot | trajectory_plot
#   axes                     — what x-axis and y-axis mean
#   visual_elements          — colours, line styles, markers the VLM will see
#   how_to_analyze           — numbered procedure with a clear cadence:
#                                (a) observe values from the graph,
#                                (b) name the matching glossary term where one
#                                    applies (events, jargon, encodings),
#                                (c) compose the summary using
#                                    sentence_format_guide.
#                              Keep observation steps strictly observational —
#                              do not slip composition into them.
#   glossary                 — map of term -> definition for racing or
#                              visualization jargon the VLM may not understand
#                              on its own (e.g. "trail braking",
#                              "over-limit spike", "2x understeer
#                              amplification", phase references like
#                              "at expert's entry (idx N)", custom
#                              encodings like "yellow (coast or overlap)").
#                              Definitions are emitted verbatim in the
#                              per-graph prompt block as
#                                  - "term": definition
#                              so the VLM can resolve any unfamiliar phrase it
#                              meets in how_to_analyze / sentence_format_guide.
#                              Maintenance rules:
#                                * Plain-English comparators ("earlier than",
#                                  "wider than", "higher than") DO NOT belong
#                                  here — VLM understands them already.
#                                * Keys are lowercase, no trailing punctuation.
#                                * Recurring terms (e.g. trajectory marker
#                                  references like
#                                  "at expert's apex (idx N, phase k)") are
#                                  repeated under each consuming graph so the
#                                  definition lives next to its usage.
#   sentence_format_guide    — short skeleton + 1-2 example sentences
#                              showing how to glue numerical values and
#                              comparators into prose.  Works for comparison
#                              and single-trace graphs alike.
#   common_description_errors — VLM misreadings to avoid
#
# Top-level keys:
#   cross_graph_guidelines   — guidance that fires only when specific graph
#                              combinations are present
#   trajectory_shape_vocabulary — overall-shape names that mirror the
#                              segment_type labels (ST1–ST6)
#
# This file is loaded once by GraphAnalysisSkill (graph_analysis_skill.py).
# The describe_graphs solver injects the relevant entries into the VLM prompt
# when the current step includes graph images.
# =============================================================================

graphs:

  # =========================================================================
  # FEATURE PLOTS (line charts over segment index)
  # =========================================================================

  throttle:
    title: "Throttle Application: Expert vs Player"
    graph_type: feature_plot
    axes:
      x: "Segment index (time progression left to right)"
      y: "Throttle position (0.0 = off, 1.0 = full throttle)"
    visual_elements:
      - "Two overlapping line traces — expert_optimal_throttle (expert) and Physics_gas (player)"
      - "Legend identifies which colour is expert vs player"
      - "Grid lines for reading approximate values"
    how_to_analyze: >
      Observe (record values, do not summarise yet):
      1. Read the legend — assign each colour to expert or player.  Note the
         left and right edge values for both traces.

      2.Describe events (throttle application, release throttle, modulation dip) for both expert and player.
        For EVERY event mentioned, record the index range (start–end) where it
        occurs — never describe a feature with only a duration ("across X indices") 
        and no anchor. Make comparsions between expert and player for each event found.
          - Is the application/release "abrupt" or "gradual"?
          - Does the release show "trailing off" or an "abrupt drop"?
          - Is there any "modulation dip" (dip-and-recover)?

      3. Enumerate ONLY clearly-visible events (throttle application, release
         throttle, modulation dip).  Do not invent events to satisfy a
         template — if a trace has one application and one release, report
         one and one.  Skip any event you cannot clearly distinguish from
         the grid.  For every event record the index on each trace.

      4. Classify the segment using exactly one segment-class glossary term
         (flat-full segment, flat-zero segment, release-only segment,
         apply-only segment, release-and-reapply segment, multi-cycle
         segment, unmatch segment).

      5. Write the summary using sentence_format_guide.  Lead with the shape difference 
        (release and application character,  modulation dips) anchored to 
        index ranges; then the matched events with the index on each trace; then the
        segment class callout.
    glossary:
      "flat-full segment": >
        Both traces remain at full throttle (1.0) across the segment; no
        release or re-application is visible.
      "flat-zero segment": >
        Both traces remain near zero across the segment; the segment is a
        brake or coast zone rather than a throttle phase.
      "release-only segment": >
        A throttle release is visible but the segment ends before any
        re-application.
      "apply-only segment": >
        A throttle application is visible but no prior release falls
        inside the window (segment starts mid-corner or after a coast).
      "release-and-reapply segment": >
        A full release → near-zero hold → re-application cycle is visible
        within the segment (the typical case).
      "multi-cycle segment": >
        More than one release / re-apply pair is visible (e.g. chicane or
        a series of esses) in travel order.
      "unmatch segment": >
        One trace stays flat while the other is active, or the two traces
        do not share the same overall shape. 
      "release throttle": >
        Throttle drops from a consistent value and rests at near zero, with the negative slope potentially containing some fluctuation.
        The release modulation dip may occur during the release, but the overall slope should be negative. 
        When compare a subject to a object, a subject has more abrupt releases if the length of
        the drop is shorter; more gradual releases if the drop is longer.
      "throttle application": >
        Throttle rises from a consistent value and rests at the local maximum, with the positive slope potentially containing some fluctuation.
        The throttle modulation dip may occur during the throttle application, the overall slope should be positive. 
        When compare a subject to an object, a subject has more abrupt applications 
        if the length of the rise is shorter; more gradual applications if the drop is longer.
      "release onset": >
        start of throttle release. An index where the throttle trace first drops 
        from a consistent value with a negative slope. A subject has an earlier release 
        onset if this index is less than the other trace's release onset; later if it is greater.
      "application onset": >
        start of throttle application. An index where the throttle trace begin rises 
        from near zero with a positive slope. A subject has an earlier application 
        onset if this index is less than the other trace's application onset; later if it is greater.
      "modulation dip": >
        Occcur in mid-release down slope or mid-application raise slope where 
        the trace dips and recovers without returning to zero. when modulation 
        dip occurs for both traces at about the same index, compare the depth and 
        duration of the dips to determine whether the subject shows a more pronounced dip.
    sentence_format_guide: >
      One paragraph.  Every event MUST be anchored to an index range or specific index — never
      quote a duration alone.

      (a) Detailed events — emit ONLY the clauses your chosen class
          requires.  Use whichever apply:

        - event comparison (release, application, release onset, application onset):
          "<event>: <Player/expert> starts at index A and ends at index B(if there is one); <Player/expert> 
          starts at index C and ends at index D(if there is one) — <Player/expert> is <earlier|later> 
          by N indices, or <more abrupt|more gradual> by M indices."

          Modulation dip occurs within the release or application slope itself. When present
          on either trace, include as a separate clause:
            "<Player/expert>'s <release|application> across indices X–Y contains
            a modulation dip around index N (val); <other>'s <release|application>
            across the same range is monotonic."
          If both traces dip near the same index, compare depth and duration:
            "Both <release|application> slopes contain a modulation dip near
            index N; <Player/expert>'s dip is <deeper|shallower> by Δ and
            <longer|shorter> by D indices."

      (b) Segment class callout (when applicable):
        "The segment is a <segment-class> — both traces <description of
         shape features that define the class, anchored to index ranges>."
    common_description_errors:
      - "Verify expert vs player from the legend before describing"
      - "Do NOT invent events to fill the format. If the trace has only one application and one release, report only one of each"
      - "Anchor EVERY shape feature and event to an index range or specific index — \"gradual across 5 indices\" without a start index is insufficient; write \"gradual across indices 94–99\" instead"
      - "Suspect-pattern check: if your output shows the player consistently offset by exactly the same number of indices at every event, you are pattern-matching rather than reading — restart from step 3"
      - "For a flat-zero segment, state the classification rather than fabricating a release"
      - "The example envelope shows structure, not content — classify from the trace and emit only the clauses your chosen class requires; do not force release / re-application phrasing onto a flat, one-sided, or unmatch segment"
      - "Describe what you see — do not interpret or diagnose"

  brake:
    title: "Brake Application: Expert vs Player"
    graph_type: feature_plot
    axes:
      x: "Segment index (time progression left to right)"
      y: "Brake pressure (0.0 = off, 1.0 = full brake)"
    visual_elements:
      - "Two overlapping line traces — expert_optimal_brake (expert) and Physics_brake (player)"
      - "Legend identifies which colour is expert vs player"
      - "Grid lines for reading approximate values"
    how_to_analyze: >
      Observe (record values, do not summarise yet):
      1. Read the legend — assign each colour to expert or player.  Note the
         left and right edge values for both traces.

      2. Describe events (brake initiation, brake release, peak brake pressure, modulation dip) for both expert and player.
        For EVERY event mentioned, record the index range (start–end) where it
        occurs — never describe a feature with only a duration ("across X indices")
        and no anchor. Make comparisons between expert and player for each event found.
          - Is the initiation "abrupt" or "gradual"?
          - Is the release "trail braking" or an "abrupt drop"?
          - Is there any "modulation dip" (dip-and-recover) during initiation, hold, or release?
          - Are there flat holds at peak?

      3. Enumerate ONLY clearly-visible events (brake initiation, brake
         release, peak brake pressure, modulation dip).  Do not invent
         events to satisfy a template — if a trace has one initiation and
         one release, report one and one.  Skip any event you cannot clearly
         distinguish from the grid.  For every event record the index on
         each trace.

      4. Classify the segment using exactly one segment-class glossary term
         (flat-full segment, flat-zero segment, brake-only segment,
         release-only segment, brake-and-release segment, multi-cycle
         segment, unmatch segment).

      5. Write the summary using sentence_format_guide.  Lead with the shape difference
        (initiation and release character, modulation dips, flat holds) anchored to
        approximate index ranges; then the matched events with the index on each trace; then the
        segment class callout; then a trail-braking callout; then any throttle/brake overlap.
        All indices and y-values are approximate.
    glossary:
      "flat-full segment": >
        Both traces remain at peak brake (~1.0) across the segment; no
        release or re-initiation is visible.
      "flat-zero segment": >
        Both traces remain near zero across the segment; the segment is a
        coast or throttle zone rather than a braking phase.
      "brake-only segment": >
        A brake initiation is visible but the segment ends before any
        release.
      "release-only segment": >
        A brake release is visible but no prior initiation falls inside the
        window (segment starts mid-corner with brake already applied).
      "brake-and-release segment": >
        A full initiation → peak hold → release cycle is visible within
        the segment (the typical case).
      "multi-cycle segment": >
        More than one initiation / release pair is visible (e.g. chicane
        or a series of esses) in travel order.
      "unmatch segment": >
        One trace stays flat while the other is active, or the two traces
        do not share the same overall shape.
      "brake initiation": >
        Brake pressure rises from near zero and ends at a peak value without
        dropping back to zero immediately, with the positive slope potentially
        containing some fluctuation. The modulation dip may occur during the
        initiation, but the overall slope should be positive. When compare a
        subject to an object, a subject has more abrupt initiations if the length
        of the rise is shorter; more gradual initiations if the rise is longer.
      "brake release": >
        Brake pressure drops from a consistent value and ends at near zero, with
        the negative slope potentially containing some fluctuation. The modulation
        dip may occur during the release, but the overall slope should be negative.
        When compare a subject to an object, a subject has more abrupt releases if
        the length of the drop is shorter; more gradual releases (i.e. trail braking)
        if the drop is longer.
      "initiation onset": >
        start of brake initiation. An index where the brake trace first rises
        above ~0.05 from zero with a positive slope. A subject has an earlier
        initiation onset if this index is less than the other trace's initiation
        onset; later if it is greater.
      "release onset": >
        start of brake release. An index where the brake trace first begins
        dropping from a consistent value with a negative slope. A subject has
        an earlier release onset if this index is less than the other trace's
        release onset; later if it is greater.
      "peak brake pressure": >
        The maximum y-value the brake trace reaches across the segment, with
        the index (or index range, if held).
      "modulation dip": >
        Occurs in mid-initiation up slope, mid-hold, or mid-release down slope
        where the trace dips and recovers without returning to zero. When
        modulation dip occurs for both traces at about the same index, compare
        the depth and duration of the dips to determine whether the subject
        shows a more pronounced dip.
      "trail braking": >
        A release where brake pressure decreases gradually over many indices
        rather than dropping abruptly to zero.  Used to maintain front-axle
        load through corner entry.
      "abrupt drop": >
        A release where the brake trace returns to zero within ~1–2 indices
        (no trail braking).
      "applies throttle and brake simultaneously": >
        An index range where both the brake trace and the throttle trace
        are above zero at the same time.  Report approximate start, end,
        and approximate values, and whether the expert shows the same
        overlap.
    sentence_format_guide: >
      One paragraph.  Every event MUST be anchored to an index range or specific index — never
      quote a duration alone.

      (a) Detailed events — emit ONLY the clauses your chosen class
          requires.  Use whichever apply:

        - event comparison (initiation, release, initiation onset, release onset,
          peak brake pressure):
          "<event>: <Player/expert> starts at index A and ends at index B (if there is one);
          <Player/expert> starts at index C and ends at index D (if there is one) — <Player/expert>
          is <earlier|later> by N indices, or <more abrupt|more gradual> by M
          indices, or <higher|lower> by Δ pressure."

          Modulation dip occurs within the initiation, hold, or release. When present
          on either trace, include as a separate clause:
            "<Player/expert>'s <initiation|hold|release> across indices X–Y contains
            a modulation dip around index N (val); <other>'s <initiation|hold|release>
            across the same range is monotonic."
          If both traces dip near the same index, compare depth and duration:
            "Both <initiation|hold|release> slopes contain a modulation dip near
            index N; <Player/expert>'s dip is <deeper|shallower> by Δ and
            <longer|shorter> by D indices."

        - Trail-braking callout (when applicable):
          "Expert trail-brakes across indices X–Y; player <trail-brakes
           across indices P–Q | shows an abrupt drop at index R>."

      (b) Segment class callout (when applicable):
        "The segment is a <segment-class> — both traces <description of
         shape features that define the class, anchored to index ranges>."
    common_description_errors:
      - "Verify expert vs player from the legend before describing"
      - "Do NOT invent events to fill the format. If a trace has only one initiation and one release, report only one of each"
      - "Anchor EVERY shape feature and event to an index range or specific index — \"gradual across 5 indices\" without a start index is insufficient; write \"gradual across indices 45–50\" instead"
      - "Suspect-pattern check: if your output shows the player consistently offset by exactly the same number of indices at every event, you are pattern-matching rather than reading — restart from step 3"
      - "For a flat-zero segment, state the classification rather than fabricating an initiation or release"
      - "The example envelope shows structure, not content — classify from the trace and emit only the clauses your chosen class requires; do not force initiation / release phrasing onto a flat, one-sided, or unmatch segment"
      - "Do NOT confuse brake release (trace returning to zero) with brake reduction (decreasing but not to zero — i.e. trail braking)"
      - "Describe what you see — do not interpret or diagnose"

  time_delta:
    title: "Time Difference to Expert"
    graph_type: feature_plot
    axes:
      x: "Segment index (time progression left to right)"
      y: "Time delta in milliseconds (positive = player behind expert, negative = player ahead)"
    visual_elements:
      - "Single line trace showing cumulative time gap"
      - "Rising line means the gap is growing (player falling further behind)"
      - "Falling line means the gap is shrinking (player catching up)"
      - "Flat line means the gap is stable"
    how_to_analyze: >
      Observe (record values, do not summarise yet):
      1. Read the y-axis scale and range; note the sign (+ = player behind
         expert, − = player ahead).
      2. Record the start and end values, the net change in ms, and who is
         ahead/behind at each end.
      3. Split the trace at slope changes; for each segment record the
         index range (start–end), the ms change, and the slope direction
         (rising / falling / flat).

      Compose:
      4. Write the summary using sentence_format_guide — one sentence per
         segment from step 3, naming the slope direction in plain English
         (gap grows / gap shrinks / gap stable) and quoting the ms values
         and who is ahead/behind.  Skip micro-fluctuations; only report
         sustained directional changes.
    glossary: {}
    sentence_format_guide: >
      One paragraph, one sentence per slope segment.  Subject = player,
      object = expert.
        "Across indices <N>–<M> the gap <grows|shrinks|holds stable>
         from <X> ms to <Y> ms — player is <behind|ahead> by <Δ> ms at
         each end."
      Example: "Across indices 100–150 the gap grows from 80 ms to 320 ms —
      player is behind expert by 80 ms at index 100 and 320 ms at index 150;
      across indices 150–200 the gap holds stable at ~320 ms."
    common_description_errors:
      - "Do NOT ignore the SCALE of the y-axis — a 0.01 s change is negligible, a 0.5 s change is large"
      - "Do NOT describe every micro-fluctuation as a trend change — only report clear, sustained directional changes"
      - "Do NOT confuse the sign — positive means the player is BEHIND expert, negative means AHEAD"
      - "Do NOT interpret why the delta changes — describe WHAT the line does"

  speed_delta:
    title: "Speed Difference (Expert - Player)"
    graph_type: feature_plot
    axes:
      x: "Segment index (time progression left to right)"
      y: "Speed difference in km/h (positive = expert faster, negative = player faster)"
    visual_elements:
      - "Single line trace oscillating around zero"
      - "Values above zero mean the expert is faster than the player at that index"
      - "Values below zero mean the player is faster than the expert at that index"
    how_to_analyze: >
      Observe (record values, do not summarise yet):
      1. Read the y-axis range and units (km/h); note the sign convention
         (+ = expert faster, − = player faster).
      2. Record the overall bias — who is faster across most of the segment.
      3. Walk the trace; for each notable section record the index range
         (start–end), the sign, and the peak |delta| with its index.
      4. Record every index where the line crosses zero.

      Match (apply glossary thresholds):
      5. For each section in step 3, decide whether it is a "speed match"
         (|delta| ≤ 5 km/h), a "large gap section" (|delta| > 20 km/h), or
         a regular gap.  Tag each zero-crossing index from step 4.

      Compose:
      6. Write the summary using sentence_format_guide — one sentence per
         section, embedding the matched glossary tag (where applicable),
         the index range, the km/h values, and who is faster.
    glossary:
      "speed match": >
        A section where |delta| stays within ±5 km/h — player matches the
        expert's speed.  Report start index, end index, and peak |delta|.
      "large gap section": >
        A section where |delta| exceeds 20 km/h.  Report start index, end
        index, peak magnitude, and direction (expert faster or player faster).
      "zero crossing": >
        An index where the speed-delta line crosses zero.  Report whether
        the flip is from expert-faster to player-faster or vice versa.
    sentence_format_guide: >
      One paragraph, one sentence per section.  Plain-English direction
      (expert faster / player faster) carries the sign; glossary tags carry
      the threshold.
        "<who-is-faster> by <N km/h> across indices <A>–<B>
         (peak <Z km/h> at index <I>) [— large gap section / speed match]."
      Example: "Expert faster than player by up to 28 km/h across indices 65–85
      (peak 28 km/h at index 75) — large gap section; zero crossing at index 92
      flips to player faster; player faster than expert by 6 km/h across
      indices 110–130."
    common_description_errors:
      - "Do NOT read the sign backwards — positive = expert faster, negative = player faster"
      - "Do NOT describe brief single-index spikes as sustained gaps"
      - "Do NOT interpret causation — describe the speed difference and tag thresholds with glossary terms"

  speed:
    title: "Speed Trace: Expert vs Player"
    graph_type: feature_plot
    axes:
      x: "Segment index (time progression left to right)"
      y: "Speed in km/h"
    visual_elements:
      - "Two overlapping line traces — expert_optimal_speed and Physics_speed_kmh (player)"
      - "Legend identifies which line is which"
      - "Speed dropping = deceleration / braking; speed minimum = apex / lowest speed; speed rising = acceleration"
    how_to_analyze: >
      Observe (record values, do not summarise yet):
      1. Name who is who: read the legend; assign each colour to expert or player.
      2. For each trace independently, locate four glossary anchor points:
         entry speed (left edge), deceleration onset, minimum speed point,
         acceleration onset, exit speed (right edge).  Record the index
         and km/h at each.
      3. Note shape mismatches on either trace — flat spot, plateau, or
         extended low-speed range — with the index range.

      Match (line up player vs expert, anchor by anchor):
      4. For each glossary anchor, pair player-value vs expert-value (km/h
         offset) and player-index vs expert-index (timing offset); record
         the sign of each gap.

      Compose:
      5. Write the summary using sentence_format_guide — one sentence per
         anchor, embedding both km/h values and the directional offset.
         Add a sentence for any shape mismatch from step 3.
    glossary:
      "deceleration onset": >
        The index where the speed trace begins falling from its entry
        value — start of the braking phase.
      "minimum speed point": >
        The index where the speed trace bottoms out, plus the km/h value
        at that point.
      "acceleration onset": >
        The index where the speed trace begins rising again from the
        minimum — start of the corner-exit acceleration phase.
    sentence_format_guide: >
      One paragraph, one sentence per glossary anchor + entry/exit edges.
      Subject = player, object = expert.
        "The player's <anchor> is at index <A> (<X km/h>); the expert's at
         index <C> (<Y km/h>) — player is <earlier|later|higher|lower> by
         <N> indices / <Δ> km/h."
      Example: "The player's minimum speed point is at index 92 (78 km/h);
      the expert's at index 86 (95 km/h) — player is later by 6 indices and
      lower by 17 km/h."
    common_description_errors:
      - "Do NOT compare values from different anchors — entry vs entry, minimum vs minimum, exit vs exit"
      - "Do NOT confuse the two traces — verify which line is which from the legend"
      - "Do NOT report a player speed without also reporting the expert's speed at the matching anchor and the directional offset"
      - "Do NOT skip reporting numerical values — always state km/h figures"

  push_limit:
    title: "Driver Push/Limit"
    graph_type: feature_plot
    axes:
      x: "Segment index (time progression left to right)"
      y: "Tire grip utilisation (1.0 = peak; >1.0 = over-limit)"
    visual_elements:
      - "Single line trace showing tire grip utilisation over the segment"
      - "Reference threshold at y = 1.0 — tire is operating exactly at its peak"
      - "Values below 1.0 = grip headroom remaining; values above 1.0 = over-limit"
      - "Only excursions above 1.0 count as spikes"
    how_to_analyze: >
      Observe (record values, do not summarise yet):
      1. Note: player's trace only — no expert comparison; y = 1.0 is the
         threshold.
      2. Record the baseline level (well below / near / riding at 1.0) and
         its index range.
      3. For every excursion above 1.0, record the index range
         (onset–peak–return) and the peak value.
      4. If the trace never crosses 1.0, record the segment-wide max value
         and its index.

      Match (apply glossary tags to each section):
      5. For each above-1.0 excursion from step 3, decide whether it is an
         "over-limit spike" (brief, one peak) or "sustained over-limit"
         (stays above 1.0 for many indices — use the long-form
         "tire is sustained over its peak grip").
      6. For each baseline section from step 2, decide whether it qualifies
         as "sustained low" (well below 1.0).

      Compose:
      7. Write the summary using sentence_format_guide — one clause per
         tagged section, embedding the glossary term plus the index range
         and peak/baseline values.
    glossary:
      "over-limit spike": >
        A brief excursion above 1.0 (one peak, returns within a few
        indices).  Report start index (crossing 1.0), peak index, peak
        value, return index, and duration above 1.0.
      "sustained over-limit": >
        A section where the trace stays above 1.0 for many indices (not a
        single-index spike).  Use the long-form phrasing
        "tire is sustained over its peak grip across indices N–M".
      "tire is sustained over its peak grip": >
        Long-form phrasing for sustained over-limit.  Report the index
        range and the peak value.
      "sustained low": >
        A section where the trace stays well below 1.0 — driver is well
        within grip limits.  Report the index range and the approximate
        value held.
    sentence_format_guide: >
      One paragraph.  Player's trace only; reference = y = 1.0 (no expert
      comparison).
        "<glossary tag> across indices <N>–<M> (peak <value> at index <X>;
         returns to 1.0 at index <Y>, duration <D> indices)."
      Example: "The player's trace shows an over-limit spike across indices 72–88
      (peaks at 1.18 at index 80, returns at 88, 16 indices); sustained low
      across indices 0–71 (~0.85)."
      If never above 1.0: "The player's trace stays at or below 1.0 across the
      full segment (max <value> at index <X>); no spike to report."
    common_description_errors:
      - "Do NOT call a rise a 'spike' unless it exceeds 1.0 — values below 1.0 mean grip is still within peak"
      - "Do NOT measure spikes against the local baseline — 1.0 is the reference"
      - "Do NOT confuse this metric with speed — push_limit is about tire grip utilisation"
      - "Do NOT interpret over-limit spikes as oversteer or understeer — that requires the balance trajectory graph"

  gear:
    title: "Gear Selection: Expert vs Player"
    graph_type: feature_plot
    axes:
      x: "Segment index (time progression left to right)"
      y: "Gear number (integer steps)"
    visual_elements:
      - "Two step-like traces — expert_optimal_gear and Physics_gear (player)"
      - "Legend identifies which line is which"
      - "Traces jump between integer levels (no smooth curves)"
      - "Grid lines for reading exact gear numbers and shift indices"
    how_to_analyze: >
      Observe (record values, do not summarise yet):
      1. Name who is who: read the legend; assign each colour to expert or player.
      2. Walk left-to-right; for each trace record every shift event
         (direction = upshift|downshift, source gear → target gear, index)
         and the gear-hold range that follows (indices start–end, gear).
      3. Tally total shifts on each trace.

      Match (line up player vs expert):
      4. Pair each shift event with its matching event on the other trace
         (same direction, similar index); record the index gap and sign.
      5. Identify index ranges where the two traces hold different gear
         numbers; record range and the two gear values.

      Compose:
      6. Write the summary using sentence_format_guide — one sentence per
         paired shift, one sentence per gear-hold mismatch range, plus a
         closing tally line if shift counts differ.
    glossary: {}
    sentence_format_guide: >
      One paragraph. Subject = player, object = expert.
      For paired shift events:
        "Player <upshift|downshift> <N>→<M> at index <A>; expert at
         index <B> — player is <earlier|later> by <|A−B|> indices."
      For gear-hold mismatch ranges:
        "Across indices <X>–<Y> the player holds gear <N> while the expert
         holds gear <M> — player is in a <lower|higher> gear."
      Example: "Player upshift 3→4 at index 110; expert at index 102 — player is
      later by 8 indices.  Across indices 102–110 the player holds gear 3 while
      the expert holds gear 4 — player is in a lower gear."
    common_description_errors:
      - "Gear values are INTEGERS — do not report fractional gear numbers"
      - "Do NOT confuse upshift and downshift — up = higher gear number, down = lower gear number"
      - "Do NOT report a player shift without also reporting the expert's matching shift and the index gap"
      - "Do NOT interpret gear choices — describe what you see"

  # =========================================================================
  # TRAJECTORY PLOTS (bird's-eye view of the track)
  # =========================================================================

  trajectory_detailed:
    title: "Detailed Trajectory"
    graph_type: trajectory_plot
    axes:
      x: "Track X position (spatial, not time-based)"
      y: "Track Y position (spatial, not time-based — y-axis is INVERTED)"
    visual_elements:
      - "Green solid line = Player trajectory"
      - "Blue dashed line = Expert (optimal) trajectory"
      - "Black X marker = Start of segment"
      - "Black O marker = End of segment"
      - "Yellow circle on expert line = Entry (turn-in onset)"
      - "Red star on expert line = Apex (geometric — peak |κ| of expert line)"
      - "Green triangle on expert line = Exit (track-out, where curvature subsides)"
      - "Numbered apex labels (#1, #2, …) appear on chicanes / esses — one set of entry/apex/exit markers per arc"
      - "Y-axis is INVERTED (standard for top-down track views)"
    how_to_analyze: >
      Observe (record positions, do not summarise yet):
      1. Verify who is who: player = green solid, expert = blue dashed;
         confirm direction of travel from Start (X) → End (O).
      2. Name the overall shape (trajectory_shape_vocabulary).
      3. If the 'Phase Indices (expert-anchored)' attachment is present
         on this prompt, read its phase_indices.phases list — one element
         per detected arc.  Empty list ⇒ no corner detected; describe
         shapes only.  Each phase k holds entry / apex / exit ilocs
         relative to the segment start; chicanes / esses produce multiple
         phases of opposite 'direction'.
      4. For each phase k, at each of its entry / apex / exit ilocs,
         record where the player's curve sits relative to the expert's
         curve at that index — closer to inside / closer to outside /
         aligned, with an approximate offset.  Cross-check against the
         on-image markers (yellow circle / red star / green triangle on
         the expert line; for chicanes, marker pairs are tagged #1, #2, …).
      5. Note the phase + iloc with the largest visible gap between the
         two lines.
      6. Scan the player line for any of these glossary events and record
         where each occurs: "cuts inside the racing line", "kink in the
         line", "off track at entry", "off track at exit",
         "off track on the straight".
      7. Write one paragraph per phase using sentence_format_guide: a
         sentence per (entry / apex / exit) iloc naming the player's
         position relative to the expert in plain English (closer to
         inside / closer to outside), one sentence calling out the
         largest-divergence phase, plus one sentence per glossary event
         from step 6.  Reference markers using the "at expert's
         <entry|apex|exit> (idx N, phase k)" form.
    glossary:
      "cuts inside the racing line": >
        The player line crosses inside the expert line, shortening the
        corner relative to the expert's path.  Report where (which phase).
      "kink in the line": >
        A sharp brief deviation in the player trajectory suggesting a
        correction.  Report location and whether the expert line is smooth
        in the same area.
      "off track at entry": >
        The player's trajectory crosses outside the track bounds during
        the corner-entry phase.
      "off track at exit": >
        The player's trajectory crosses outside the track bounds during
        the corner-exit phase.
      "off track on the straight": >
        The player's trajectory crosses outside the track bounds on a
        straight section.
      "at expert's entry (idx N, phase k)": >
        The 'entry' iloc of the k-th element of phase_indices.phases —
        arc onset where |κ| of the smoothed expert position trace first
        clears the noise threshold (turn-in).  k is 0 for a single-arc
        corner; chicanes / esses iterate all phases.  Substitute the
        actual idx N and arc index k.
      "at expert's apex (idx N, phase k)": >
        The 'apex' iloc of the k-th element of phase_indices.phases —
        argmax(|κ|) within the arc on the smoothed expert position
        trace (geometric apex; can differ from minimum-speed iloc on
        flat-speed sweepers and trail-braked corners).  Substitute the
        actual idx N and arc index k.
      "at expert's exit (idx N, phase k)": >
        The 'exit' iloc of the k-th element of phase_indices.phases —
        arc offset where |κ| drops back below the noise threshold
        (track-out).  Substitute the actual idx N and arc index k.
    sentence_format_guide: >
      One paragraph per phase k from phase_indices.phases (each phase has
      its own entry / apex / exit), plus a final 'overall' line.  Subject
      = player, object = expert.
        "Through phase <k> at expert's <entry|apex|exit> (idx N), the
         player's line is <closer to inside | closer to outside | aligned
         with> the expert."
        "Across all phases the largest divergence falls at <phase k>'s
         <entry|apex|exit>."
      Add one sentence per glossary event observed (off-track / kink /
      cuts inside).  Single-phase corners use phase 0 only and skip the
      "across all phases" line.
    common_description_errors:
      - "The Y-AXIS IS INVERTED — do not read up/down wrong when describing inside/outside of corners"
      - "Do NOT assume a direction of travel — verify from the Start (X) and End (O) markers"
      - "Do NOT describe the player line in isolation — for every phase state position RELATIVE to the expert line"
      - "Do NOT skip the divergence callout — always name which phase has the largest gap"
      - "Do NOT describe tiny pixel-level differences as meaningful — only report clear, visible separations"
      - "Phase indices come from the attachment, not from the graph itself — if no 'Phase Indices (expert-anchored)' attachment is present, describe shapes only"

  trajectory_gas_brake:
    title: "Gas/Brake Trajectory"
    graph_type: trajectory_plot
    axes:
      x: "Track X position (spatial)"
      y: "Track Y position (spatial — y-axis INVERTED)"
    visual_elements:
      - "Player trajectory as a COLOURED line (colour = throttle/brake balance)"
      - "GREEN sections = full throttle (gas dominant)"
      - "RED sections = full brake"
      - "YELLOW sections = coasting (neither gas nor brake, or partial overlap)"
      - "Colour bar on the side maps values: -1 (full brake) through 0 (coast) to +1 (full gas)"
      - "Blue/grey dashed line = Expert trajectory (reference position)"
      - "Black X = Start, Black O = End"
    how_to_analyze: >
      Observe (record positions and colours, do not summarise yet):
      1. Verify who is who: player = coloured line, expert = blue/grey
         dashed; confirm direction of travel from Start (X) → End (O).
      2. If the 'Phase Indices (expert-anchored)' attachment is present
         on this prompt, read its phase_indices.phases list — one element
         per arc, each with entry / apex / exit ilocs.  Empty list ⇒
         describe colours and positions without anchoring to phases.
      3. Walk the player's coloured line in travel order; record each
         colour section as (colour, start idx, end idx, phase k +
         entry|apex|exit if it falls in or near a phase iloc).
      4. For each phase k, at each of its entry / apex / exit ilocs,
         record the player's colour AT that idx and where the player's
         curve sits relative to the expert's curve — closer to inside /
         closer to outside / aligned.

      Match (apply glossary tags to ambiguous colours):
      5. For every yellow section from step 3, tag it
         "yellow (coast or overlap)" — the colour cannot disambiguate coast
         from partial gas/brake overlap.

      Compose:
      6. Write one paragraph using sentence_format_guide.  Two halves:
         (a) colour sequence in travel order, anchored to each phase k
             when phases are present, with every yellow tagged
             "yellow (coast or overlap)";
         (b) trajectory position at each phase's entry / apex / exit —
             closer to inside / closer to outside / aligned, using
             "at expert's <entry|apex|exit> (idx N, phase k)" form.
    glossary:
      "yellow (coast or overlap)": >
        A yellow section on the gas/brake trajectory.  The colour cannot
        disambiguate coast from partial gas/brake overlap; use this exact
        phrasing rather than guessing.
      "at expert's entry (idx N, phase k)": >
        The 'entry' iloc of the k-th element of phase_indices.phases —
        arc onset where |κ| of the smoothed expert position trace first
        clears the noise threshold (turn-in).  k is 0 for a single-arc
        corner; chicanes / esses iterate all phases.  Substitute the
        actual idx N and arc index k.
      "at expert's apex (idx N, phase k)": >
        The 'apex' iloc of the k-th element of phase_indices.phases —
        argmax(|κ|) within the arc on the smoothed expert position
        trace (geometric apex; can differ from minimum-speed iloc on
        flat-speed sweepers and trail-braked corners).  Substitute the
        actual idx N and arc index k.
      "at expert's exit (idx N, phase k)": >
        The 'exit' iloc of the k-th element of phase_indices.phases —
        arc offset where |κ| drops back below the noise threshold
        (track-out).  Substitute the actual idx N and arc index k.
    sentence_format_guide: >
      One paragraph, two halves.

      (a) Colour sequence skeleton (anchor each section to its phase k
          when phases are present):
        "Player: <colour> at phase <k> <entry|apex|exit> (idx <A>–<B>)
         → <colour> at phase <k> <entry|apex|exit> (idx <C>–<D>) → ..."
      Tag every yellow with "yellow (coast or overlap)".

      (b) Position-at-phase skeleton (one clause per (phase k, marker)
          combination):
        "At expert's <entry|apex|exit> (idx N, phase k) the player's
         curve is <colour> and <closer to inside | closer to outside |
         aligned with> the expert."

      Example (single-phase corner, k = 0): "Player: green on straight
      (idx 0–55) → red at phase 0 entry (idx 55–82) → yellow (coast or
      overlap) at phase 0 apex area (idx 82–95) → green at phase 0 exit
      (idx 95–end).  At expert's entry (idx 50, phase 0) the player's
      curve is green and aligned with the expert.  At expert's apex
      (idx 88, phase 0) the player's curve is yellow (coast or overlap)
      and closer to outside than the expert."
    common_description_errors:
      - "Do NOT describe colour transitions without relating them to the corner geometry"
      - "Yellow does NOT necessarily mean 'nothing is happening' — phrase it as 'yellow (coast or overlap)'"
      - "Do NOT describe what the colour pattern means for performance — describe colours, locations, and marker references only"
      - "Do NOT forget to describe the trajectory POSITION (closer to inside / closer to outside) in addition to the colours"

  trajectory_balance:
    title: "Oversteer/Understeer Balance Trajectory"
    graph_type: trajectory_plot
    axes:
      x: "Track X position (spatial)"
      y: "Track Y position (spatial — y-axis INVERTED)"
    visual_elements:
      - "Player trajectory as a COLOURED line (colour = rear-vs-front slip angle balance)"
      - "RED sections = rear slip angle dominant (rear tyres slipping more)"
      - "BLUE sections = front slip angle dominant (front tyres slipping more)"
      - "WHITE/NEUTRAL sections = balanced (similar front and rear slip)"
      - "Colour bar: negative (blue) through 0 (neutral) to positive (red)"
      - "Grey dashed line = Expert trajectory (reference position)"
      - "Black X = Start, Black O = End"
      - "IMPORTANT: understeer (blue) is amplified 2x in the colour mapping for visibility"
    how_to_analyze: >
      Observe (record positions and colours, do not summarise yet):
      1. Verify who is who: player = coloured line, expert = grey dashed;
         confirm direction of travel from Start (X) → End (O).
      2. If the 'Phase Indices (expert-anchored)' attachment is present
         on this prompt, read its phase_indices.phases list and use
         each phase's entry / apex / exit ilocs to anchor every
         "corner entry / mid-corner / corner exit" statement to a concrete
         idx + phase k.  Empty list ⇒ describe colour sections without
         anchoring.
      3. Walk the player's coloured line in travel order; for each colour
         section record (colour, start idx, end idx, saturation
         vivid|faint, phase k + entry|mid-corner|exit if it falls within
         a phase).
      4. Note every abrupt colour change point (idx + colour pair).
      5. For each phase k, at each of its entry / apex / exit ilocs,
         record where the player's curve sits relative to the expert's
         curve — closer to inside / closer to outside / aligned.

      Match (apply glossary tags by colour + phase):
      6. For each red section, tag it
         "rear-slip dominant at corner entry / mid-corner / corner exit".
      7. For each blue section, tag it
         "front-slip dominant at corner entry / mid-corner / corner exit"
         AND remember to apply the "2x understeer amplification" note in
         the summary.
      8. For each white / near-neutral section, tag it "neutral balance".
      9. For each abrupt change point, tag it "abrupt colour change".

      Compose:
      10. Write one paragraph using sentence_format_guide — one clause per
          colour section using the matched glossary tag plus saturation,
          plus a "2x understeer amplification" note whenever any blue is
          described, plus the position-at-marker line for each (phase k,
          entry|apex|exit) combination.
    glossary:
      "rear-slip dominant at corner entry": >
        Section on the balance trajectory where the rear tyres slip more
        than the fronts, falling within the corner-entry phase.  Appears
        as red colouring.
      "rear-slip dominant at mid-corner": >
        Rear-slip-dominant section in the mid-corner phase.
      "rear-slip dominant at corner exit": >
        Rear-slip-dominant section in the corner-exit phase (after the apex).
      "front-slip dominant at corner entry": >
        Section on the balance trajectory where the front tyres slip more
        than the rears, in the corner-entry phase.  Appears as blue
        colouring; remember the 2x amplification.
      "front-slip dominant at mid-corner": >
        Front-slip-dominant section in the mid-corner phase.
      "front-slip dominant at corner exit": >
        Front-slip-dominant section in the corner-exit phase.
      "neutral balance": >
        White / near-neutral colouring on the balance trajectory — the
        player's slip distribution is balanced (similar front and rear).
      "abrupt colour change": >
        A point on the balance trajectory where the colour shifts sharply
        (e.g. blue to red, vivid to neutral) within a few indices.  Often
        co-occurs with a push_limit spike.
      "2x understeer amplification": >
        Reminder that blue (front-slip) on the balance trajectory is
        displayed at 2x intensity for visibility.  A given blue intensity
        represents half the actual slip difference of the same red
        intensity.
      "at expert's entry (idx N, phase k)": >
        The 'entry' iloc of the k-th element of phase_indices.phases —
        arc onset where |κ| of the smoothed expert position trace first
        clears the noise threshold (turn-in).  k is 0 for a single-arc
        corner; chicanes / esses iterate all phases.  Substitute the
        actual idx N and arc index k.
      "at expert's apex (idx N, phase k)": >
        The 'apex' iloc of the k-th element of phase_indices.phases —
        argmax(|κ|) within the arc on the smoothed expert position
        trace (geometric apex; can differ from minimum-speed iloc on
        flat-speed sweepers and trail-braked corners).  Substitute the
        actual idx N and arc index k.
      "at expert's exit (idx N, phase k)": >
        The 'exit' iloc of the k-th element of phase_indices.phases —
        arc offset where |κ| drops back below the noise threshold
        (track-out).  Substitute the actual idx N and arc index k.
    sentence_format_guide: >
      One paragraph.  Subject = player's coloured trace.

      Colour-section skeleton (one clause per section):
        "Player: <glossary tag> (<vivid|faint>) idx <A>–<B>."
      For every blue section ALWAYS append a "— 2x understeer amplification"
      note in the same sentence or as a closing reminder.

      Position-at-phase skeleton (one clause per (phase k, marker)):
        "At expert's <entry|apex|exit> (idx N, phase k) the player's
         curve is <closer to inside | closer to outside | aligned with>
         the expert."

      Example (single-phase corner, k = 0): "Player: rear-slip dominant
      at corner entry (vivid) idx 50–82, transitioning to neutral balance
      idx 82–95, then front-slip dominant at corner exit (faint) idx
      95–end — 2x understeer amplification.  At expert's apex (idx 88,
      phase 0) the player's curve is closer to outside than the expert."
    common_description_errors:
      - "Do NOT forget the 2x understeer amplification — always note it whenever describing blue sections"
      - "Do NOT confuse entry vs exit — verify travel direction from Start/End markers before tagging corner phase"
      - "Do NOT skip the corner-phase tag — every red and blue section MUST be labelled by phase"
      - "Do NOT interpret the colours as good or bad — describe colours, corner phase, saturation, and trajectory position"
      - "Do NOT skip describing neutral sections"

# =============================================================================
# Cross-graph guidelines
#
# These fire when specific graph combinations appear together in a step.
# They tell the VLM how to cross-reference observations across graphs in
# the same paragraph (still description-only — no diagnosis).
# =============================================================================

cross_graph_guidelines:

  brake_and_speed: >
    When both BRAKE and SPEED graphs are present: cross-reference the
    timing offsets.  If the player begins braking later than the expert
    by N indices AND begins decelerating later than the expert by ~N
    indices on the speed graph, state both offsets in the same sentence.
    Likewise check whether the index where each player trace's brake
    returns to zero aligns with the player's minimum speed index, and
    whether that alignment matches the expert's.  If the offsets differ
    by more than 3 indices, describe the gap explicitly.

  throttle_and_speed: >
    When both THROTTLE and SPEED graphs are present: report the player's
    throttle-onset offset relative to the expert AND the player's
    acceleration-onset offset relative to the expert in the same
    sentence.  If there is a delay between the player's throttle
    application and the speed beginning to rise, describe it as "player
    has throttle applied for N indices before speed begins to rise" and
    state whether the expert shows the same delay.

  time_delta_and_features: >
    When the TIME DELTA graph is present alongside brake, throttle, or
    speed graphs: describe which sections of the time delta line (gap to
    expert grows / shrinks / is stable) align with which index ranges on
    the feature graphs.  Example: "The gap to expert grows between
    indices 100–150, which corresponds to the braking zone where the
    player begins braking later than the expert by 10 indices and the
    player's peak brake pressure is lower than the expert's by 0.20."

  trajectory_and_features: >
    When trajectory plots and feature plots are both present: describe
    which spatial sections of the trajectory (per-phase entry / apex /
    exit, or straight when phase_indices.phases is empty) correspond to
    which index ranges on the feature plots.  Anchor each statement to
    a (phase k, entry|apex|exit) where phases are present.  Example:
    "The brake graph's index 50–80 (where the player begins braking
    later than the expert by 8 indices) corresponds to phase 0's
    corner-entry section on the trajectory plot, where the player's
    entry line is wider than the expert's."

  balance_and_push_limit: >
    When the BALANCE trajectory and PUSH_LIMIT graph are both present:
    describe whether any over-limit spike (identified by index range on
    the push_limit graph) co-occurs with a red or blue colour section
    on the balance trajectory.  The push_limit graph has no corner
    phase — derive the phase from where the index range falls along the
    balance trajectory's entry / mid-corner / exit progression.  Phrase
    as "an over-limit spike across indices N–M co-occurs with a vivid
    rear-slip dominant at corner entry section on the balance
    trajectory" — report co-occurrence without interpreting it.

  brake_and_throttle_overlap: >
    When both BRAKE and THROTTLE graphs are present: describe any index
    range where the player has BOTH traces simultaneously above zero.
    Report start index, end index, the approximate values during the
    overlap, AND whether the expert shows the same overlap.  Phrase as
    "the player applies throttle and brake simultaneously between
    indices N–M (N indices); the expert shows no overlap / shows overlap
    of M indices".

# =============================================================================
# Trajectory shape vocabulary
#
# When any trajectory graph is present, describe the overall shape using
# these standard terms.  They mirror the segment_type labels (ST1–ST6) so
# downstream nodes can match the description directly.
# =============================================================================

trajectory_shape_vocabulary: >
  Use these terms when describing the overall shape of a trajectory:
  - "Single curve": one continuous arc from Start to End.
  - "Straight": essentially a straight line with minimal curvature.
  - "Approach to corner": starts straight and begins curving toward the End marker.
  - "Exit corner leading to straight": starts curved and straightens out toward the End marker.
  - "S-shape / chicane": changes direction at least twice (left-right-left or right-left-right).
  - "Hairpin": a very tight, ~180-degree turn.
  - "Between consecutive corners": a brief transition between two corners — neither a full straight nor a full corner.
  - "Consecutive corners with no straight in between": multiple corners with no intervening straight (esses / chicane complex).
  Describe the shape first, then per-phase comparative details — iterate
  every entry in phase_indices.phases (each has its own entry / apex /
  exit).  Single-arc corners use phase 0; chicanes / esses cover all
  phases.

