# =============================================================================
# Graph Analysis Skill — VLM graph description knowledge base
#
# Teaches the Vision Language Model how to read each telemetry graph
# accurately.  The VLM's job is ONLY to produce a detailed, precise
# description of what it sees.  It must NOT diagnose problems, assign
# labels, or draw conclusions — downstream pipeline nodes do that.
#
# Per-graph schema (loaded by GraphSkillEntry in graph_analysis_skill.py):
#   title                    — human-readable graph title
#   graph_type               — feature_plot | trajectory_plot
#   axes                     — what x-axis and y-axis mean
#   visual_elements          — colours, line styles, markers the VLM will see
#   how_to_analyze           — 4-6 line numbered procedure on HOW to read
#                              the graph (not WHAT features to enumerate)
#   vocabulary_to_use           — flat list of canonical phrases the VLM MUST
#                              embed verbatim where applicable.  Definitions
#                              for these phrases live centrally in
#                              vocabulary.yaml and are injected into the
#                              prompt as a Glossary block by the pipeline.
#   sentence_format_guide    — short skeleton + 1-2 example sentences
#                              showing how to glue phrases with numerical
#                              values into prose.  Works for comparison and
#                              single-trace graphs alike.
#   common_description_errors — VLM misreadings to avoid
#
# Top-level keys:
#   cross_graph_guidelines   — guidance that fires only when specific graph
#                              combinations are present
#   trajectory_shape_vocabulary — overall-shape names that mirror the
#                              segment_type labels (ST1–ST6)
#
# This file is loaded once by GraphAnalysisSkill (graph_analysis_skill.py).
# The step_describer node injects the relevant entries into the VLM prompt
# when the current step includes graph images.
# =============================================================================

graphs:

  # =========================================================================
  # FEATURE PLOTS (line charts over segment index)
  # =========================================================================

  throttle:
    title: "Throttle Application: Expert vs Player"
    graph_type: feature_plot
    axes:
      x: "Segment index (time progression left to right)"
      y: "Throttle position (0.0 = off, 1.0 = full throttle)"
    visual_elements:
      - "Two overlapping line traces — expert_optimal_throttle (expert) and Physics_gas (player)"
      - "Legend identifies which colour is expert vs player"
      - "Grid lines for reading exact values"
    how_to_analyze: >
      1. Name who is who: read the legend; assign each colour to expert or player.
      2. Note the left and right edge values for both traces — may start/end at full throttle.
      3. For each sustained throttle phase, identify the index range (start–end) for the player AND the expert.
      4. For each transition (>0.1 y-move), state who initiates it and compare index ranges on each trace; record the gap.
      5. If the brake graph is present, report any overlap range only.
    vocabulary_to_use:
      - "begins applying throttle earlier than"
      - "begins applying throttle later than"
      - "applies throttle more sharply than"
      - "applies throttle more gradually than"
      - "peak throttle is lower than"
      - "peak throttle is higher than"
      - "begins releasing throttle earlier than"
      - "begins releasing throttle later than"
      - "releases throttle more abruptly than"
      - "releases throttle more gradually than"
      - "applies throttle and brake simultaneously"
    sentence_format_guide: >
      One paragraph. Subject = who (player), object = who (expert).
        "The player <canonical predicate> the expert — player [action] across
         indices <A>–<B> (<val>), expert across indices <C>–<D> (<val>);
         gap <N> indices / <Δ> value."
      Always: who acts, where (index range) each trace acts, numerical gap.
    common_description_errors:
      - "Verify expert vs player from the legend before describing"
      - "Always pair a player metric with the matching expert metric and directional offset"
      - "Only describe throttle behaviour where throttle is applied — not in braking zones"
      - "Always report numerical index positions and y-axis values; do not round to 'about halfway'"
      - "Describe what you see — do not interpret or diagnose"

  brake:
    title: "Brake Application: Expert vs Player"
    graph_type: feature_plot
    axes:
      x: "Segment index (time progression left to right)"
      y: "Brake pressure (0.0 = off, 1.0 = full brake)"
    visual_elements:
      - "Two overlapping line traces — expert_optimal_brake (expert) and Physics_brake (player)"
      - "Legend identifies which is which"
      - "Grid lines for reading exact values"
    how_to_analyze: >
      1. Name who is who: read the legend; assign each colour to expert or player.
      2. For each trace, locate the full brake phase as an index range (onset → peak → release-end); read values at those points.
      3. Compare who initiates earlier, who peaks higher, who releases first — record both traces' ranges and the gap.
      4. Select the canonical phrase matching the directional offset; embed it with index ranges and value gap.
      5. If the throttle graph is present, report any overlap range where both player traces are above zero.
    vocabulary_to_use:
      - "begins braking earlier than"
      - "begins braking later than"
      - "applies brake more sharply than"
      - "applies brake more gradually than"
      - "peak brake pressure is lower than"
      - "peak brake pressure is higher than"
      - "begins releasing brake earlier than"
      - "begins releasing brake later than"
      - "releases brake more abruptly than"
      - "releases brake more gradually than"
      - "trail braking"
      - "braking duration longer than"
      - "braking duration shorter than"
      - "applies throttle and brake simultaneously"
    sentence_format_guide: >
      One paragraph. Subject = who (player), object = who (expert).
        "The player <canonical predicate> the expert — player [action] across
         indices <A>–<B> (<val>), expert across indices <C>–<D> (<val>);
         gap <N> indices / <Δ> pressure."
      Example: "The player begins braking later than the expert — player onset
      at index 55, expert at index 45 (gap 10 indices); braking phase spans
      indices 55–100 (player) vs 45–83 (expert)."
    common_description_errors:
      - "Do NOT confuse brake release (trace returning to zero) with brake reduction (decreasing but not to zero — i.e. trail braking)"
      - "Do NOT report a player metric without also reporting the expert's matching metric and the directional offset"
      - "Do NOT round indices — read the x-axis grid"
      - "Do NOT interpret or diagnose — describe the comparison, not what it means for driving quality"

  time_delta:
    title: "Time Difference to Expert"
    graph_type: feature_plot
    axes:
      x: "Segment index (time progression left to right)"
      y: "Time delta in milliseconds (positive = player behind expert, negative = player ahead)"
    visual_elements:
      - "Single line trace showing cumulative time gap"
      - "Rising line means the gap is growing (player falling further behind)"
      - "Falling line means the gap is shrinking (player catching up)"
      - "Flat line means the gap is stable"
    how_to_analyze: >
      1. Read the y-axis scale and range; note the sign (+ = player behind expert, − = player ahead).
      2. State the start and end values; compute the net change and who is ahead/behind at each end.
      3. Identify the overall shape (rising / falling / flat / oscillating).
      4. Split at slope changes; for each segment state the index range (start–end), the ms change, and whether the player is losing or gaining on the expert.
      5. Mark every inflection and every flat section (flat = who matches whose pace across that range).
    vocabulary_to_use:
      - "gap to expert grows"
      - "gap to expert shrinks"
      - "gap to expert is stable"
      - "loses time to"
      - "gains time on"
    sentence_format_guide: >
      One paragraph. "Gap to expert" phrases stand alone; "loses time to / gains time on"
      take who (player) and object (expert).
        "The player <canonical phrase> across indices <N>–<M> (delta <X> ms → <Y> ms;
         who is ahead/behind at each end)."
      Example: "The player loses time to the expert across indices 100–150 (gap
      grows from 80 ms to 320 ms); the gap to expert is stable across indices
      150–200 (~320 ms; player remains behind expert)."
    common_description_errors:
      - "Do NOT ignore the SCALE of the y-axis — a 0.01 s change is negligible, a 0.5 s change is large"
      - "Do NOT describe every micro-fluctuation as a trend change — only report clear, sustained directional changes"
      - "Do NOT confuse the sign — positive means the player is BEHIND expert, negative means AHEAD"
      - "Do NOT interpret why the delta changes — describe WHAT the line does"

  speed_delta:
    title: "Speed Difference (Expert - Player)"
    graph_type: feature_plot
    axes:
      x: "Segment index (time progression left to right)"
      y: "Speed difference in km/h (positive = expert faster, negative = player faster)"
    visual_elements:
      - "Single line trace oscillating around zero"
      - "Values above zero mean the expert is faster than the player at that index"
      - "Values below zero mean the player is faster than the expert at that index"
    how_to_analyze: >
      1. Read the y-axis range and units (km/h); note who is faster per sign (+ = expert, − = player).
      2. State the overall bias — who is faster across most of the segment.
      3. For each notable section, state who is faster, the index range (start–end), and the km/h gap (peak value and its index).
      4. Identify speed-match ranges (|delta| ≤ 5 km/h) and zero-crossing indices where who-is-faster flips.
      5. Embed the canonical phrase for each section with index range and km/h values.
    vocabulary_to_use:
      - "expert faster than player"
      - "player faster than expert"
      - "speed match"
      - "large gap section"
      - "zero crossing"
    sentence_format_guide: >
      One paragraph. Who is faster = embedded in canonical phrase.
        "<canonical phrase> by <N km/h> across indices <A>–<B>
         (peak <Z km/h> at index <I>)."
      Example: "Expert faster than player by up to 28 km/h across indices 65–85
      (peak 28 km/h at index 75); zero crossing at index 92; player faster than
      expert by 6 km/h across indices 110–130."
    common_description_errors:
      - "Do NOT read the sign backwards — positive = expert faster, negative = player faster"
      - "Do NOT describe brief single-index spikes as sustained gaps"
      - "Do NOT interpret causation — describe the speed difference and use the canonical phrasing"

  speed:
    title: "Speed Trace: Expert vs Player"
    graph_type: feature_plot
    axes:
      x: "Segment index (time progression left to right)"
      y: "Speed in km/h"
    visual_elements:
      - "Two overlapping line traces — expert_optimal_speed and Physics_speed_kmh (player)"
      - "Legend identifies which line is which"
      - "Speed dropping = deceleration / braking; speed minimum = apex / lowest speed; speed rising = acceleration"
    how_to_analyze: >
      1. Name who is who: read the legend; assign each colour to expert or player.
      2. For each trace identify three phase ranges: deceleration (onset–minimum), low-speed zone (around minimum), acceleration (minimum–exit).
      3. At each phase compare who has higher/lower speed; record both trace values and the gap.
      4. Compare deceleration and acceleration onset indices — who starts earlier and by how many indices.
      5. Note shape mismatches — flat spot, plateau, or extended low-speed range on who (player) absent on who (expert).
    vocabulary_to_use:
      - "entry speed is lower than"
      - "entry speed is higher than"
      - "minimum speed is lower than"
      - "minimum speed is higher than"
      - "reaches minimum speed earlier than"
      - "reaches minimum speed later than"
      - "exit speed is lower than"
      - "exit speed is higher than"
      - "begins decelerating earlier than"
      - "begins decelerating later than"
      - "begins accelerating earlier than"
      - "begins accelerating later than"
    sentence_format_guide: >
      One paragraph. Subject = who (player), object = who (expert).
        "The player's <phase> speed (<X km/h> across indices <A>–<B>)
         <canonical predicate> the expert (<Y km/h> across indices <C>–<D>)
         by <Z km/h>."
      Example: "The player's minimum-speed phase (78 km/h, indices 88–95) is
      lower than the expert (95 km/h, indices 82–88) by 17 km/h; the player
      reaches minimum speed later than the expert by 6 indices."
    common_description_errors:
      - "Do NOT compare values from different phases — entry vs entry, minimum vs minimum, exit vs exit"
      - "Do NOT confuse the two traces — verify which line is which from the legend"
      - "Do NOT report a player speed without also reporting the expert's speed at the matching phase and the directional offset"
      - "Do NOT skip reporting numerical values — always state km/h figures"

  push_limit:
    title: "Driver Push/Limit"
    graph_type: feature_plot
    axes:
      x: "Segment index (time progression left to right)"
      y: "Tire grip utilisation (1.0 = peak; >1.0 = over-limit)"
    visual_elements:
      - "Single line trace showing tire grip utilisation over the segment"
      - "Reference threshold at y = 1.0 — tire is operating exactly at its peak"
      - "Values below 1.0 = grip headroom remaining; values above 1.0 = over-limit"
      - "Only excursions above 1.0 count as spikes"
    how_to_analyze: >
      1. Note: player's trace only — no expert comparison; y = 1.0 is the threshold.
      2. State the player's baseline level (well below / near / riding at 1.0) and its index range.
      3. For every excursion above 1.0, record the index range (onset–peak–return) and the peak value.
      4. Identify any sustained over-limit range and any sustained low range; if never above 1.0, state the max value and its index.
    vocabulary_to_use:
      - "over-limit spike"
      - "sustained over-limit"
      - "sustained low"
      - "tire is sustained over its peak grip"
    sentence_format_guide: >
      One paragraph. Who = player's trace only; reference = y = 1.0 (no expert comparison).
        "<canonical phrase> across indices <N>–<M> (player peaks at <value>
         at index <X>; returns to 1.0 at index <Y>, duration <D> indices)."
      Example: "The player's trace shows an over-limit spike across indices 72–88
      (peaks at 1.18 at index 80, returns at 88, 16 indices); sustained low
      across indices 0–71 (~0.85)."
      If never above 1.0: "The player's trace stays at or below 1.0 across the
      full segment (max <value> at index <X>); no spike to report."
    common_description_errors:
      - "Do NOT call a rise a 'spike' unless it exceeds 1.0 — values below 1.0 mean grip is still within peak"
      - "Do NOT measure spikes against the local baseline — 1.0 is the reference"
      - "Do NOT confuse this metric with speed — push_limit is about tire grip utilisation"
      - "Do NOT interpret over-limit spikes as oversteer or understeer — that requires the balance trajectory graph"

  gear:
    title: "Gear Selection: Expert vs Player"
    graph_type: feature_plot
    axes:
      x: "Segment index (time progression left to right)"
      y: "Gear number (integer steps)"
    visual_elements:
      - "Two step-like traces — expert_optimal_gear and Physics_gear (player)"
      - "Legend identifies which line is which"
      - "Traces jump between integer levels (no smooth curves)"
      - "Grid lines for reading exact gear numbers and shift indices"
    how_to_analyze: >
      1. Name who is who: read the legend; assign each colour to expert or player.
      2. Walk left-to-right; for each trace record every shift (who shifts, direction, index) and the gear-hold range that follows (indices start–end, gear number).
      3. For each matching shift, compare who shifts earlier — note both trace indices and the gap.
      4. Identify ranges where the two traces hold different gear numbers; note who is lower/higher and the full index range.
      5. Tally shifts per trace; note who shifts more/fewer times.
    vocabulary_to_use:
      - "upshifts earlier than"
      - "upshifts later than"
      - "downshifts earlier than"
      - "downshifts later than"
      - "lower gear than"
      - "higher gear than"
      - "shifts more often than"
      - "shifts fewer times than"
    sentence_format_guide: >
      One paragraph. Subject = who (player), object = who (expert).
      For shift events:
        "The player <canonical predicate> the expert — player gear <N>→<M>
         at index <A>, expert gear <N>→<M> at index <B> (gap: <|A−B|> indices)."
      For gear-hold mismatches (range):
        "The player is in <N>th gear while the expert is in <M>th gear across
         indices <X>–<Y> (player in lower/higher gear than the expert)."
    common_description_errors:
      - "Gear values are INTEGERS — do not report fractional gear numbers"
      - "Do NOT confuse upshift and downshift — up = higher gear number, down = lower gear number"
      - "Do NOT report a player shift without also reporting the expert's matching shift and the index gap"
      - "Do NOT interpret gear choices — describe what you see"

  # =========================================================================
  # TRAJECTORY PLOTS (bird's-eye view of the track)
  # =========================================================================

  trajectory_detailed:
    title: "Detailed Trajectory"
    graph_type: trajectory_plot
    axes:
      x: "Track X position (spatial, not time-based)"
      y: "Track Y position (spatial, not time-based — y-axis is INVERTED)"
    visual_elements:
      - "Green solid line = Player trajectory"
      - "Blue dashed line = Expert (optimal) trajectory"
      - "Black X marker = Start of segment"
      - "Black O marker = End of segment"
      - "Purple star marker = Detected apex (highest curvature point)"
      - "Red annotation = Minimum speed point with km/h value"
      - "Y-axis is INVERTED (standard for top-down track views)"
    how_to_analyze: >
      1. Verify who is who: identify who (player = green solid) and who (expert = blue dashed); confirm direction of travel from Start (X) → End (O).
      2. Name the overall shape (trajectory_shape_vocabulary).
      3. For each phase (entry / apex / exit), compare where the player line sits relative to the expert line and note who is tighter/wider.
      4. Name the divergence phase — where the gap between who (player) and who (expert) is largest.
      5. Flag off-track, kinks, or cut-inside: state who exhibits it and where (which phase).
      6. If the minimum-speed annotation is visible, state the value and where (which phase / which trace it sits on).
    vocabulary_to_use:
      - "entry line is tighter than"
      - "entry line is wider than"
      - "turns in earlier than"
      - "turns in later than"
      - "tighter apex than"
      - "wider apex than"
      - "reaches apex earlier than"
      - "reaches apex later than"
      - "exit line is tighter than"
      - "exit line is wider than"
      - "exits the corner earlier than"
      - "exits the corner later than"
      - "cuts inside the racing line"
      - "off track at entry"
      - "off track at exit"
      - "off track on the straight"
      - "kink in the line"
      - "largest divergence at entry"
      - "largest divergence at apex"
      - "largest divergence at exit"
    sentence_format_guide: >
      One paragraph, four phases (entry / apex / exit / overall).
      Subject = who (player), object = who (expert).
        "Through the <phase> phase [where], the player's line <canonical predicate>
         the expert."
        "The largest divergence falls at the <phase> phase [where]."
      Name who and where (phase + tighter/wider/inside/outside) for every comparison.
    common_description_errors:
      - "The Y-AXIS IS INVERTED — do not read up/down wrong when describing inside/outside of corners"
      - "Do NOT assume a direction of travel — verify from the Start (X) and End (O) markers"
      - "Do NOT describe the player line in isolation — for every phase state position RELATIVE to the expert line"
      - "Do NOT skip the divergence callout — always name which phase has the largest gap"
      - "Do NOT describe tiny pixel-level differences as meaningful — only report clear, visible separations"
      - "The purple apex marker is computed by curvature, not track geometry — describe where it is, do not assume it is the 'correct' apex"

  trajectory_gas_brake:
    title: "Gas/Brake Trajectory"
    graph_type: trajectory_plot
    axes:
      x: "Track X position (spatial)"
      y: "Track Y position (spatial — y-axis INVERTED)"
    visual_elements:
      - "Player trajectory as a COLOURED line (colour = throttle/brake balance)"
      - "GREEN sections = full throttle (gas dominant)"
      - "RED sections = full brake"
      - "YELLOW sections = coasting (neither gas nor brake, or partial overlap)"
      - "Colour bar on the side maps values: -1 (full brake) through 0 (coast) to +1 (full gas)"
      - "Blue/grey dashed line = Expert trajectory (reference position)"
      - "Black X = Start, Black O = End"
    how_to_analyze: >
      1. Verify who is who: player = coloured line, expert = blue/grey dashed; confirm direction of travel from Start (X) → End (O).
      2. Walk the player's coloured line in travel order; for each colour section name who (player), where (corner phase), and the colour.
      3. Compare where the red section starts and ends vs the expert's typical braking zone — who starts earlier/later and how many phases/spatial length.
      4. Compare where the green section resumes vs the expert's throttle-resume point — who is earlier/later.
      5. Label every yellow section "yellow (coast or overlap)" and note where it falls (which phase).
      6. Describe where the player line is relative to the expert through each phase (tighter/wider).
    vocabulary_to_use:
      - "red section starts earlier than"
      - "red section starts later than"
      - "red section is longer than"
      - "red section is shorter than"
      - "throttle resumes earlier than"
      - "throttle resumes later than"
      - "yellow (coast or overlap)"
      - "entry line is tighter than"
      - "entry line is wider than"
      - "tighter apex than"
      - "wider apex than"
      - "exit line is tighter than"
      - "exit line is wider than"
    sentence_format_guide: >
      One paragraph, two halves: (a) colour sequence with who and where, (b) trajectory offset through phases.
      Colour skeleton:
        "Who (player): <colour> at <phase> → <colour> at <phase> → ..."
      Position skeleton:
        "Trajectory: who (player) <canonical predicate> who (expert) through <phase>."
      Example: "Player: green (on straight) → red (at entry, starts earlier than expert) →
      yellow (coast or overlap, apex area) → green (after apex, resumes later than expert).
      Trajectory: player entry line is wider than expert through entry phase."
    common_description_errors:
      - "Do NOT describe colour transitions without relating them to the corner geometry"
      - "Yellow does NOT necessarily mean 'nothing is happening' — phrase it as 'yellow (coast or overlap)'"
      - "Do NOT describe what the colour pattern means for performance — describe colours, locations, and the canonical phrasing only"
      - "Do NOT forget to describe the trajectory POSITION (tighter/wider) in addition to the colours"

  trajectory_balance:
    title: "Oversteer/Understeer Balance Trajectory"
    graph_type: trajectory_plot
    axes:
      x: "Track X position (spatial)"
      y: "Track Y position (spatial — y-axis INVERTED)"
    visual_elements:
      - "Player trajectory as a COLOURED line (colour = rear-vs-front slip angle balance)"
      - "RED sections = rear slip angle dominant (rear tyres slipping more)"
      - "BLUE sections = front slip angle dominant (front tyres slipping more)"
      - "WHITE/NEUTRAL sections = balanced (similar front and rear slip)"
      - "Colour bar: negative (blue) through 0 (neutral) to positive (red)"
      - "Grey dashed line = Expert trajectory (reference position)"
      - "Black X = Start, Black O = End"
      - "IMPORTANT: understeer (blue) is amplified 2x in the colour mapping for visibility"
    how_to_analyze: >
      1. Verify who is who: player = coloured line, expert = grey dashed; confirm direction of travel from Start (X) → End (O).
      2. Walk the player's coloured line in travel order; for each colour section name who (player), where (corner phase), colour, and saturation (vivid / faint).
      3. For every red section embed "who (player): rear-slip dominant at <phase>"; for every blue embed "who (player): front-slip dominant at <phase>" and note the 2x understeer amplification.
      4. Mark every neutral section — where who (player) holds balanced grip and which phase it covers.
      5. Flag abrupt colour changes: note where they occur (phase) and whether they co-occur with push_limit spikes if visible.
      6. Describe where the player line is relative to the expert dashed line through each phase (tighter/wider).
    vocabulary_to_use:
      - "rear-slip dominant at corner entry"
      - "rear-slip dominant at mid-corner"
      - "rear-slip dominant at corner exit"
      - "front-slip dominant at corner entry"
      - "front-slip dominant at mid-corner"
      - "front-slip dominant at corner exit"
      - "neutral balance"
      - "abrupt colour change"
      - "2x understeer amplification"
      - "entry line is tighter than"
      - "entry line is wider than"
      - "tighter apex than"
      - "wider apex than"
      - "exit line is tighter than"
      - "exit line is wider than"
    sentence_format_guide: >
      One paragraph. Subject = who (player's coloured trace).
        "Who (player): <canonical phrase> (<saturation>) at <phase> [where]."
      For every blue section ALWAYS include the 2x amplification note.
      Example: "Player: rear-slip dominant at corner entry (vivid), transitioning to neutral
      balance through mid-corner [where]; front-slip dominant at corner exit (faint) — note
      2x understeer amplification; player line is wider than expert at entry phase."
    common_description_errors:
      - "Do NOT forget the 2x understeer amplification — always note it whenever describing blue sections"
      - "Do NOT confuse entry vs exit — verify travel direction from Start/End markers before tagging corner phase"
      - "Do NOT skip the corner-phase tag — every red and blue section MUST be labelled by phase"
      - "Do NOT interpret the colours as good or bad — describe colours, corner phase, saturation, and trajectory position"
      - "Do NOT skip describing neutral sections"

# =============================================================================
# Cross-graph guidelines
#
# These fire when specific graph combinations appear together in a step.
# They tell the VLM how to cross-reference observations across graphs in
# the same paragraph (still description-only — no diagnosis).
# =============================================================================

cross_graph_guidelines:

  brake_and_speed: >
    When both BRAKE and SPEED graphs are present: cross-reference the
    timing offsets.  If the player begins braking later than the expert
    by N indices AND begins decelerating later than the expert by ~N
    indices on the speed graph, state both offsets in the same sentence.
    Likewise check whether the index where each player trace's brake
    returns to zero aligns with the player's minimum speed index, and
    whether that alignment matches the expert's.  If the offsets differ
    by more than 3 indices, describe the gap explicitly.

  throttle_and_speed: >
    When both THROTTLE and SPEED graphs are present: report the player's
    throttle-onset offset relative to the expert AND the player's
    acceleration-onset offset relative to the expert in the same
    sentence.  If there is a delay between the player's throttle
    application and the speed beginning to rise, describe it as "player
    has throttle applied for N indices before speed begins to rise" and
    state whether the expert shows the same delay.

  time_delta_and_features: >
    When the TIME DELTA graph is present alongside brake, throttle, or
    speed graphs: describe which sections of the time delta line (gap to
    expert grows / shrinks / is stable) align with which index ranges on
    the feature graphs.  Example: "The gap to expert grows between
    indices 100–150, which corresponds to the braking zone where the
    player begins braking later than the expert by 10 indices and the
    player's peak brake pressure is lower than the expert's by 0.20."

  trajectory_and_features: >
    When trajectory plots and feature plots are both present: describe
    which spatial sections of the trajectory (entry / apex / exit /
    straight) correspond to which index ranges on the feature plots.
    Example: "The brake graph's index 50–80 (where the player begins
    braking later than the expert by 8 indices) corresponds to the
    corner-entry phase on the trajectory plot, where the player's entry
    line is wider than the expert's."

  balance_and_push_limit: >
    When the BALANCE trajectory and PUSH_LIMIT graph are both present:
    describe whether any over-limit spike (identified by index range on
    the push_limit graph) co-occurs with a red or blue colour section
    on the balance trajectory.  The push_limit graph has no corner
    phase — derive the phase from where the index range falls along the
    balance trajectory's entry / mid-corner / exit progression.  Phrase
    as "an over-limit spike across indices N–M co-occurs with a vivid
    rear-slip dominant at corner entry section on the balance
    trajectory" — report co-occurrence without interpreting it.

  brake_and_throttle_overlap: >
    When both BRAKE and THROTTLE graphs are present: describe any index
    range where the player has BOTH traces simultaneously above zero.
    Report start index, end index, the approximate values during the
    overlap, AND whether the expert shows the same overlap.  Phrase as
    "the player applies throttle and brake simultaneously between
    indices N–M (N indices); the expert shows no overlap / shows overlap
    of M indices".

# =============================================================================
# Trajectory shape vocabulary
#
# When any trajectory graph is present, describe the overall shape using
# these standard terms.  They mirror the segment_type labels (ST1–ST6) so
# downstream nodes can match the description directly.
# =============================================================================

trajectory_shape_vocabulary: >
  Use these terms when describing the overall shape of a trajectory:
  - "Single curve": one continuous arc from Start to End.
  - "Straight": essentially a straight line with minimal curvature.
  - "Approach to corner": starts straight and begins curving toward the End marker.
  - "Exit corner leading to straight": starts curved and straightens out toward the End marker.
  - "S-shape / chicane": changes direction at least twice (left-right-left or right-left-right).
  - "Hairpin": a very tight, ~180-degree turn.
  - "Between consecutive corners": a brief transition between two corners — neither a full straight nor a full corner.
  - "Consecutive corners with no straight in between": multiple corners with no intervening straight (esses / chicane complex).
  Describe the shape first, then per-phase comparative details (entry / apex / exit).
