    parent: MS
    children: []
    exclusive_with: ["MS29"]

  # =========================================================================
  # MISTAKE SUB-LABELS — Turn-in / Apex / Exit timing
  # =========================================================================

  MS2:
    name: "Initiate the turn too late"
    type: sub
    description: >
      The player turns in later than the expert, with a wider entry
      line.  The player **turns in later than** the expert and the
      player's **entry line is wider than** the expert's.
    parent: MS
