# =============================================================================
# Category-level annotation guidelines
#
# These guidelines apply to a label *category* (a group) rather than a
# single label ID.  They are loaded into LabelCatalog.category_guidelines.
# =============================================================================

category_guidelines:

  Segment Type: >
    If the segment contains a corner, label the shape as 'In the corner'
    (ST1).  If the segment is on the straight, label as 'On the straight'
    (ST2).  If the segment is approaching a corner but not yet in it,
    label as 'Approach to corner' (ST3).  If the segment is exiting a
    corner, label as 'Exit corner leading to straight' (ST4).  If the
    segment is between corners and hasn't been named yet, label as
    'Between consecutive corners' (ST5).  If the segment covers
    consecutive corners with no straight in between, label as
    'Consecutive corners with no straight in between' (ST6).
