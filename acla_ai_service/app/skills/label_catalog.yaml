    exclusive_with: ["MS4"]

  # =========================================================================
  # MISTAKE SUB-LABELS — Trajectory
  # =========================================================================

  MS9:
    name: "Entry trajectory too tight"
    type: sub
    description: >
      The player's entry line is tighter than the expert's (closer to
