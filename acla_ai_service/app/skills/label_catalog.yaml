      braking is excessive on the player's trace.  The player
      **releases brake more gradually than** the expert and the
      description may mention **trail braking** on the player's trace.
    parent: MS
    children: []
    exclusive_with: ["MS17"]

  MS27:
    name: "Initiate brake release too late"
    type: sub
    description: >
      The player begins releasing brake later than the expert.  The
      player **begins releasing brake later than** the expert.
    parent: MS
    children: []
    exclusive_with: ["MS28"]

  MS28:
    name: "Initiate brake release too early"
    type: sub
    description: >
      The player begins releasing brake earlier than the expert.  The
      player **begins releasing brake earlier than** the expert.
    parent: MS
    children: []
    exclusive_with: ["MS27"]

  MS31:
    name: "Highest brake length too short"
    type: sub
    description: >
      The player's total braking duration is shorter than the expert's.
      The player has **braking duration shorter than** the expert.
    parent: MS
