# =============================================================================
# Label Catalog – racing telemetry annotation knowledge base
#
# Every label used by the annotation pipeline is defined here with:
#   name                  – human-readable display name
#   type                  – main | sub | segment_type | circuit | circuit_section
#   description           – what the label means
#   annotation_guideline  – (optional) step-by-step instructions for identifying this label
#   parent                – parent label ID (null for top-level)
#   children              – list of child label IDs
#   exclusive_with        – labels that cannot coexist with this one
#
# This file is loaded once by LabelCatalog (label_catalog.py).
# LABEL_MAPPING / LABEL_CATEGORIES in segment_models.py remain the
# source-of-truth for IDs and names; this YAML enriches them.
# =============================================================================

labels:

  # =========================================================================
  # MAIN LABELS
  # =========================================================================

  "1":
    name: "Overtaking"
    type: main
    description: >
      The driver is attempting to pass another car, or is being passed.
      This involves deliberate line deviation, late braking, or exploiting
      a speed differential to change track position.  Key telemetry
      indicators include unusual speed differentials between the player
      and nearby cars, late braking patterns, and deliberate trajectory
      deviations from the optimal racing line.
    annotation_guideline: >
      Analyze the driver's attempt to pass an opponent.  Look for late
      braking, line deviation to find a gap, and speed differentials.
      Assess if the move was successful and safe.
    parent: null
    children: []
    exclusive_with: ["2", "4"]

  "2":
    name: "Missing data"
    type: main
    description: >
      The segment contains gaps, dropouts, or corrupted telemetry.
      Sensor data may drop to zero, become constant unexpectedly, or
      show physically impossible values.  Typical signatures are
      zero/NaN dropouts across telemetry channels, flat-line segments
      in otherwise dynamic signals, and physically impossible or
      out-of-range values.
    annotation_guideline: >
      This segment contains gaps or corrupted telemetry.  Identify if
      the sensor data drops to zero or becomes inconsistent unexpectedly.
    parent: null
    children: []
    exclusive_with: ["1", "EA", "4", "RM", "MS"]

  EA:
    name: "Expert Adherence"
    type: main
    description: >
      The driver is closely following the expert's optimal racing line
      and speed profile.  The time difference to the expert is stable
      or decreasing.  No significant errors are present.  In the
      telemetry the Time Difference to Expert graph should be flat or
      decreasing, the speed delta near zero, and the trajectory closely
      following the expert line.
    annotation_guideline: >
      The driver is following the optimal racing line and speed profile
      closely.  Nothing needs to be labeled right now.
    parent: null
    children: []
    exclusive_with: ["MS", "RM", "2"]

  "4":
    name: "Pit Stop"
    type: main
    description: >
      The driver is entering, waiting in, or exiting the pit lane.
      This involves a significant speed reduction and a distinct
      trajectory deviation into the pit area.  Telemetry signatures
      include a dramatic speed reduction, a trajectory deviation into
      the pit lane, and a constant low speed consistent with the pit
      speed limiter being engaged.
    annotation_guideline: >
      The driver is entering, waiting in, or exiting the pit lane.
      Look for significant speed reduction and distinct trajectory
      deviation into the pit area.
    parent: null
    children: []
    exclusive_with: ["1", "2"]

  RM:
    name: "Recovery & Merge"
    type: main
    description: >
      The driver is recovering from a prior incident — such as going
      off-track, exiting the pit, or having a speed deficit — and is
      merging back onto the optimal racing line.  The time delta to
      the expert may initially be large but should be closing.
      Telemetry indicators include recovery from low speed, off-track
      excursions, or pit exit; a decreasing time delta to the expert;
      and trajectory converging back toward the optimal line.  Specific
      recovery sub-labels describe the root cause.
    annotation_guideline: >
      The driver is recovering from a mistake such as slower speed.
      Identify if the driver is recovering from low speed, off-track,
      or merging back to the expert line.
    parent: null
    children: ["RM1", "RM2", "RM5", "RM6", "RM7", "RM8", "RM9", "RM10", "RM11"]
    exclusive_with: ["EA"]

  MS:
    name: "Mistake"
    type: main
    description: >
      The driver has committed a driving error that results in time
      loss or vehicle instability.  The time difference to the expert
      increases continuously without a quick recovery.  In the
      telemetry, the Time Difference to Expert graph typically shows a
      continuously increasing gap; throttle and brake traces diverge
      from the expert; the push_limit graph may reveal understeer or
      oversteer causing lower speed; and the Trajectory map can show
      deviations from the optimal line.  Sub-labels describe the
      specific root cause of the mistake.
    annotation_guideline: >
      The driver has committed a driving error resulting in time loss
      or instability.
      Step 1: Analyze the 'Time Difference to Expert' graph; a mistake
      normally causes this time gap to increase continuously without
      decreasing shortly after.
      Step 2: Examine the differences in 'throttle' and 'brake' between
      the player and the expert to find out why the player is slower.
      Step 3: Examine the 'push_limit' graph to find understeer or
      oversteer, which could lead to lower speed.
      Step 4: Check the 'Trajectory' map for mistakes caused by
      deviations from the optimal line.
      Step 5: Find the labels that describe the *root cause*.
    parent: null
    children:
      - "MS1"
      - "MS2"
      - "MS3"
      - "MS4"
      - "MS5"
      - "MS6"
      - "MS7"
      - "MS8"
      - "MS9"
      - "MS10"
      - "MS11"
      - "MS13"
      - "MS14"
      - "MS15"
      - "MS16"
      - "MS17"
      - "MS18"
      - "MS19"
      - "MS20"
      - "MS21"
      - "MS22"
      - "MS23"
      - "MS24"
      - "MS25"
      - "MS26"
      - "MS27"
      - "MS28"
      - "MS29"
      - "MS30"
      - "MS31"
      - "MS32"
      - "MS33"
      - "MS34"
      - "MS35"
      - "MS36"
      - "MS37"
      - "MS38"
      - "MS41"
      - "MS42"
      - "MS43"
      - "MS44"
      - "MS45"
      - "MS46"
      - "MS47"
      - "MS48"
      - "MS49"
      - "MS50"
      - "MS51"
      - "MS52"
    exclusive_with: ["EA"]

  brands_hatch:
    name: "Brands Hatch"
    type: circuit
    description: >
      The segment takes place on the Brands Hatch circuit.  The
      Trajectories Overlay can be used to identify which specific
      named corner or straight section the segment corresponds to.
      The shape of the segment should also be described using Segment
      Type labels (ST1–ST6).
    annotation_guideline: >
      Look at the Trajectories Overlay and identify specific named
      corners or straight sections of the Brands Hatch circuit.  Also,
      identify the shape of the segment using labels ST1–ST6.
    parent: null
    children:
      - "brands_hatch1"
      - "brands_hatch2"
      - "brands_hatch3"
      - "brands_hatch4"
      - "brands_hatch5"
      - "brands_hatch6"
      - "brands_hatch7"
      - "brands_hatch9"
      - "brands_hatch10"
      - "brands_hatch11"
      - "brands_hatch12"
      - "brands_hatch13"
      - "brands_hatch14"
      - "brands_hatch15"
      - "brands_hatch16"
      - "brands_hatch17"
      - "brands_hatch18"
      - "brands_hatch19"
    exclusive_with: ["silverstone"]

  silverstone:
    name: "Silverstone"
    type: circuit
    description: >
      The segment takes place on the Silverstone circuit.  The
      Trajectories Overlay can be used to identify which specific
      named corner or straight section the segment corresponds to.
      The shape of the segment should also be described using Segment
      Type labels (ST1–ST6).
    annotation_guideline: >
      Look at the Trajectories Overlay and identify specific named
      corners or straight sections of the Silverstone circuit.  Also,
      identify the shape of the segment using labels ST1–ST6.
    parent: null
    children:
      - "silverstone1"
      - "silverstone2"
      - "silverstone3"
      - "silverstone4"
      - "silverstone5"
      - "silverstone6"
      - "silverstone7"
      - "silverstone8"
      - "silverstone9"
      - "silverstone10"
      - "silverstone11"
      - "silverstone12"
      - "silverstone13"
      - "silverstone14"
      - "silverstone15"
      - "silverstone16"
      - "silverstone17"
      - "silverstone18"
      - "silverstone19"
      - "silverstone20"
      - "silverstone21"
    exclusive_with: ["brands_hatch"]

  # =========================================================================
  # RECOVERY & MERGE SUB-LABELS
  # =========================================================================

  RM1:
    name: "Recover from off-track"
    type: sub
    description: >
      The driver went off the circuit surface and is now returning
      to the track.  There may be a large trajectory deviation and
      sudden speed loss.
    parent: RM
    children: []
    exclusive_with: ["RM2"]

  RM2:
    name: "Exit pit lane"
    type: sub
    description: >
      The driver is re-joining the track after a pit stop.  Speed
      increases from pit-limiter speed to racing speed.
    parent: RM
    children: []
    exclusive_with: ["RM1"]

  RM5:
    name: "Recover from speed gap over 20"
    type: sub
    description: >
      The driver has a speed deficit of more than 20 km/h compared
      to the expert and is working to close the gap.
    parent: RM
    children: []
    exclusive_with: ["RM6"]

  RM6:
    name: "Recover from small speed gap under 20"
    type: sub
    description: >
      The driver has a speed deficit of less than 20 km/h compared
      to the expert and is closing the gap.
    parent: RM
    children: []
    exclusive_with: ["RM5"]

  RM7:
    name: "Merge back to expert line"
    type: sub
    description: >
      The driver's trajectory is converging back to the optimal
      expert racing line after a deviation.
    parent: RM
    children: []
    exclusive_with: []

  RM8:
    name: "Accelerate earlier at exit"
    type: sub
    description: >
      During recovery the driver applies throttle earlier than
      the expert at the corner exit.
    parent: RM
    children: []
    exclusive_with: ["RM9"]

  RM9:
    name: "Accelerate later at exit"
    type: sub
    description: >
      During recovery the driver applies throttle later than
      the expert at the corner exit.
    parent: RM
    children: []
    exclusive_with: ["RM8"]

  RM10:
    name: "Brake earlier at entry"
    type: sub
    description: >
      During recovery the driver starts braking earlier than
      the expert at the corner entry.
    parent: RM
    children: []
    exclusive_with: ["RM11"]

  RM11:
    name: "Brake later at entry"
    type: sub
    description: >
      During recovery the driver starts braking later than
      the expert at the corner entry.
    parent: RM
    children: []
    exclusive_with: ["RM10"]

  # =========================================================================
  # MISTAKE SUB-LABELS — Braking
  # =========================================================================

  MS1:
    name: "Initiate brake too late"
    type: sub
    description: >
      The driver starts braking after the optimal braking point,
      carrying too much speed into the corner.
    parent: MS
    children: []
    exclusive_with: ["MS5"]

  MS5:
    name: "Initiate brake too early"
    type: sub
    description: >
      The driver starts braking before the optimal braking point,
      losing time by decelerating too soon.
    parent: MS
    children: []
    exclusive_with: ["MS1"]

  MS13:
    name: "Highest brake pressure too low"
    type: sub
    description: >
      Peak brake pressure is lower than the expert's, resulting
      in insufficient deceleration.
    parent: MS
    children: []
    exclusive_with: ["MS22"]

  MS22:
    name: "Highest brake pressure too high"
    type: sub
    description: >
      Peak brake pressure exceeds the expert's, risking lock-up
      or instability.
    parent: MS
    children: []
    exclusive_with: ["MS13"]

  MS14:
    name: "Brake applied too quickly"
    type: sub
    description: >
      The brake is applied with a very steep ramp — transitioning
      from zero to high pressure too rapidly.
    parent: MS
    children: []
    exclusive_with: ["MS24"]

  MS24:
    name: "Brake applied too slowly"
    type: sub
    description: >
      The brake is applied with a gradual ramp — not reaching
      peak pressure quickly enough.
    parent: MS
    children: []
    exclusive_with: ["MS14"]

  MS17:
    name: "Release brake too quickly"
    type: sub
    description: >
      The driver releases the brake pedal too fast — losing trail
      braking and destabilising the car mid-corner.
    parent: MS
    children: []
    exclusive_with: ["MS18"]

  MS18:
    name: "Release brake too slowly"
    type: sub
    description: >
      The driver releases the brake pedal too gradually — carrying
      too much braking into the corner and scrubbing speed.
    parent: MS
    children: []
    exclusive_with: ["MS17"]

  MS27:
    name: "Initiate brake release too late"
    type: sub
    description: >
      The driver begins releasing the brake at a later point than
      the expert, staying on the brake too long.
    parent: MS
    children: []
    exclusive_with: ["MS28"]

  MS28:
    name: "Initiate brake release too early"
    type: sub
    description: >
      The driver begins releasing the brake at an earlier point
      than the expert, losing trail-braking benefit.
    parent: MS
    children: []
    exclusive_with: ["MS27"]

  MS31:
    name: "Highest brake length too short"
    type: sub
    description: >
      The total duration of brake application is shorter than the
      expert's — potentially under-braking.
    parent: MS
    children: []
    exclusive_with: ["MS32"]

  MS32:
    name: "Highest brake length too long"
    type: sub
    description: >
      The total duration of brake application is longer than the
      expert's — over-braking and losing time.
    parent: MS
    children: []
    exclusive_with: ["MS31"]

  MS34:
    name: "Throttle and brake applied at the same time for too long"
    type: sub
    description: >
      The driver is simultaneously on throttle and brake for an
      excessive duration (left-foot braking overlap).
    parent: MS
    children: []
    exclusive_with: []

  # =========================================================================
  # MISTAKE SUB-LABELS — Throttle
  # =========================================================================

  MS15:
    name: "Throttle applied too quickly"
    type: sub
    description: >
      Throttle is applied with a very steep ramp —
      risking wheelspin or oversteer on corner exit.
    parent: MS
    children: []
    exclusive_with: ["MS25"]

  MS25:
    name: "Throttle applied too slowly"
    type: sub
    description: >
      Throttle is applied too gradually — not building speed
      quickly enough on corner exit.
    parent: MS
    children: []
    exclusive_with: ["MS15"]

  MS19:
    name: "Highest throttle pressure too low"
    type: sub
    description: >
      Peak throttle application is lower than the expert's —
      not using full power when it is safe to do so.
    parent: MS
    children: []
    exclusive_with: ["MS26"]

  MS26:
    name: "Highest throttle pressure too high"
    type: sub
    description: >
      Peak throttle exceeds what the expert uses — possibly
      causing wheelspin or instability.
    parent: MS
    children: []
    exclusive_with: ["MS19"]

  MS20:
    name: "Initiate throttle too early"
    type: sub
    description: >
      The driver gets on the throttle before the optimal point,
      risking oversteer or running wide on exit.
    parent: MS
    children: []
    exclusive_with: ["MS21"]

  MS21:
    name: "Initiate throttle too late"
    type: sub
    description: >
      The driver gets on the throttle after the optimal point,
      losing exit speed.
    parent: MS
    children: []
    exclusive_with: ["MS20"]

  MS23:
    name: "Release throttle too quickly"
    type: sub
    description: >
      The driver lifts off the throttle too abruptly, causing
      weight transfer instability.
    parent: MS
    children: []
    exclusive_with: []

  MS29:
    name: "Initiate throttle release too late"
    type: sub
    description: >
      The driver stays on the throttle longer than the expert
      before lifting — late lift-off.
    parent: MS
    children: []
    exclusive_with: ["MS30"]

  MS30:
    name: "Initiate throttle release too early"
    type: sub
    description: >
      The driver lifts off the throttle earlier than the expert —
      coasting or early lift.
    parent: MS
    children: []
    exclusive_with: ["MS29"]

  # =========================================================================
  # MISTAKE SUB-LABELS — Turn-in / Timing
  # =========================================================================

  MS2:
    name: "Initiate the turn too late"
    type: sub
    description: >
      The driver turns into the corner after the optimal turn-in
      point, resulting in a wider entry.
    parent: MS
    children: []
    exclusive_with: ["MS6"]

  MS6:
    name: "Initiate the turn too early"
    type: sub
    description: >
      The driver turns into the corner before the optimal turn-in
      point, resulting in a tighter entry.
    parent: MS
    children: []
    exclusive_with: ["MS2"]

  MS3:
    name: "Too late compared to expert Apex"
    type: sub
    description: >
      The driver reaches the apex (closest point to the inside
      of the corner) later than the expert.
    parent: MS
    children: []
    exclusive_with: ["MS7"]

  MS7:
    name: "Too early compared to expert Apex"
    type: sub
    description: >
      The driver reaches the apex earlier than the expert,
      potentially compromising exit speed.
    parent: MS
    children: []
    exclusive_with: ["MS3"]

  MS4:
    name: "Time to exit too early"
    type: sub
    description: >
      The driver exits the corner (straightens steering) earlier
      than the expert.
    parent: MS
    children: []
    exclusive_with: ["MS8"]

  MS8:
    name: "Time to exit too late"
    type: sub
    description: >
      The driver exits the corner (straightens steering) later
      than the expert, staying in the turn too long.
    parent: MS
    children: []
    exclusive_with: ["MS4"]

  # =========================================================================
  # MISTAKE SUB-LABELS — Trajectory
  # =========================================================================

  MS9:
    name: "Entry trajectory too tight"
    type: sub
    description: >
      The driver takes a tighter line than the expert on corner
      entry, reducing corner speed potential.
    parent: MS
    children: []
    exclusive_with: ["MS33"]

  MS33:
    name: "Entry trajectory too wide"
    type: sub
    description: >
      The driver takes a wider line than the expert on corner
      entry, requiring a tighter mid-corner to hit the apex.
    parent: MS
    children: []
    exclusive_with: ["MS9"]

  MS10:
    name: "Apex too wide"
    type: sub
    description: >
      The driver's closest point to the inside of the corner is
      wider (farther from the kerb) than the expert's apex.
    parent: MS
    children: []
    exclusive_with: []

  MS11:
    name: "Exit trajectory too narrow"
    type: sub
    description: >
      The driver stays too close to the inside on corner exit,
      not using the full track width to carry speed.
    parent: MS
    children: []
    exclusive_with: ["MS16"]

  MS16:
    name: "Exit trajectory too wide"
    type: sub
    description: >
      The driver runs too wide on corner exit, potentially going
      off-track or losing time by exceeding track limits.
    parent: MS
    children: []
    exclusive_with: ["MS11"]

  MS41:
    name: "Cutting the line"
    type: sub
    description: >
      The driver cuts inside the optimal racing line, shortening
      the corner but potentially violating track limits.
    parent: MS
    children: []
    exclusive_with: []

  MS50:
    name: "Off track at entry"
    type: sub
    description: >
      The driver goes off the track surface during corner entry.
    parent: MS
    children: []
    exclusive_with: []

  MS51:
    name: "Off track at exit"
    type: sub
    description: >
      The driver goes off the track surface during corner exit.
    parent: MS
    children: []
    exclusive_with: []

  MS52:
    name: "Off track in the straight"
    type: sub
    description: >
      The driver goes off the track surface on a straight section.
    parent: MS
    children: []
    exclusive_with: []

  # =========================================================================
  # MISTAKE SUB-LABELS — Grip / Vehicle dynamics
  # =========================================================================

  MS42:
    name: "Inefficient grip utilization at entry"
    type: sub
    description: >
      The driver is not using the available tire grip efficiently
      on corner entry — either under- or over-loading the tires.
    parent: MS
    children: []
    exclusive_with: []

  MS43:
    name: "Inefficient grip utilization at exit"
    type: sub
    description: >
      The driver is not using the available tire grip efficiently
      on corner exit.
    parent: MS
    children: []
    exclusive_with: []

  MS44:
    name: "Oversteering at entry"
    type: sub
    description: >
      The rear of the car loses grip on corner entry, causing
      the car to rotate more than intended.
    parent: MS
    children: []
    exclusive_with: ["MS45"]

  MS45:
    name: "Understeering at entry"
    type: sub
    description: >
      The front tires lose grip on corner entry, causing the
      car to push wide (not turning enough).
    parent: MS
    children: []
    exclusive_with: ["MS44"]

  MS46:
    name: "Oversteering at exit"
    type: sub
    description: >
      The rear of the car loses grip on corner exit, usually
      due to aggressive throttle application.
    parent: MS
    children: []
    exclusive_with: ["MS47"]

  MS47:
    name: "Understeering at exit"
    type: sub
    description: >
      The front tires lose grip on corner exit, causing the
      car to run wide despite steering input.
    parent: MS
    children: []
    exclusive_with: ["MS46"]

  # =========================================================================
  # MISTAKE SUB-LABELS — Gear / Shifting
  # =========================================================================

  MS35:
    name: "Shift up too early"
    type: sub
    description: >
      The driver upshifts before reaching optimal RPM, losing
      acceleration in the next gear.
    parent: MS
    children: []
    exclusive_with: ["MS36"]

  MS36:
    name: "Shift up too late"
    type: sub
    description: >
      The driver upshifts past the optimal RPM, hitting the
      rev limiter or losing power in over-rev.
    parent: MS
    children: []
    exclusive_with: ["MS35"]

  MS37:
    name: "Shift down too early"
    type: sub
    description: >
      The driver downshifts before the optimal point,
      potentially causing engine braking instability.
    parent: MS
    children: []
    exclusive_with: ["MS38"]

  MS38:
    name: "Shift down too late"
    type: sub
    description: >
      The driver downshifts after the optimal point,
      entering the corner in too high a gear.
    parent: MS
    children: []
    exclusive_with: ["MS37"]

  MS48:
    name: "Gear too low when accelerating"
    type: sub
    description: >
      The driver is in a lower gear than the expert during
      acceleration, hitting the rev limiter sooner.
    parent: MS
    children: []
    exclusive_with: ["MS49"]

  MS49:
    name: "Gear too high when accelerating"
    type: sub
    description: >
      The driver is in a higher gear than the expert during
      acceleration, resulting in less torque/power.
    parent: MS
    children: []
    exclusive_with: ["MS48"]

  # =========================================================================
  # SEGMENT TYPE LABELS
  # =========================================================================

  ST1:
    name: "In the corner"
    type: segment_type
    description: >
      The segment is entirely within a corner.  The driver is
      turning throughout.
    parent: null
    children: []
    exclusive_with: ["ST2", "ST3", "ST4", "ST5", "ST6"]

  ST2:
    name: "On the straight"
    type: segment_type
    description: >
      The segment is on a straight section.  Minimal steering,
      high speed, full throttle typical.
    parent: null
    children: []
    exclusive_with: ["ST1", "ST3", "ST4", "ST5", "ST6"]

  ST3:
    name: "Approach to corner"
    type: segment_type
    description: >
      The segment covers the approach/braking zone before a corner.
      The driver is decelerating and preparing to turn in.
    parent: null
    children: []
    exclusive_with: ["ST1", "ST2", "ST4", "ST5", "ST6"]

  ST4:
    name: "Exit corner leading to straight"
    type: segment_type
    description: >
      The segment covers the exit of a corner leading onto a
      straight.  Steering angle is decreasing, throttle increasing.
    parent: null
    children: []
    exclusive_with: ["ST1", "ST2", "ST3", "ST5", "ST6"]

  ST5:
    name: "Between consecutive corners"
    type: segment_type
    description: >
      The segment is a short connection between two corners —
      not a full straight but a brief transition.
    parent: null
    children: []
    exclusive_with: ["ST1", "ST2", "ST3", "ST4", "ST6"]

  ST6:
    name: "Consecutive corners with no straight in between"
    type: segment_type
    description: >
      The segment covers multiple corners with no intervening
