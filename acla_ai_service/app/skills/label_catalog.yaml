# =============================================================================
# Label Catalog – racing telemetry annotation knowledge base
#
# Every label used by the annotation pipeline is defined here with:
#   name                  – human-readable display name
#   type                  – main | sub | segment_type | circuit | circuit_section
#   description           – what the label means
#   annotation_guideline  – (optional) step-by-step instructions for identifying this label
#   parent                – parent label ID (null for top-level)
#   children              – list of child label IDs
#   exclusive_with        – labels that cannot coexist with this one
#
# This file is loaded once by LabelCatalog (label_catalog.py).
# LABEL_MAPPING / LABEL_CATEGORIES in segment_models.py remain the
# source-of-truth for IDs and names; this YAML enriches them.
# =============================================================================

labels:

  # =========================================================================
  # MAIN LABELS
  # =========================================================================

  "1":
    name: "Overtaking"
    type: main
    description: >
      The driver is attempting to pass another car, or is being passed.
      This involves deliberate line deviation, late braking, or exploiting
      a speed differential to change track position.  Key telemetry
      indicators include unusual speed differentials between the player
      and nearby cars, late braking patterns, and deliberate trajectory
      deviations from the optimal racing line.
    annotation_guideline: >
      Analyze the driver's attempt to pass an opponent.  Look for late
      braking, line deviation to find a gap, and speed differentials.
      Assess if the move was successful and safe.
    parent: null
    children: []
    exclusive_with: ["2", "4"]

  "2":
    name: "Missing data"
    type: main
    description: >
      The segment contains gaps, dropouts, or corrupted telemetry.
      Sensor data may drop to zero, become constant unexpectedly, or
      show physically impossible values.  Typical signatures are
      zero/NaN dropouts across telemetry channels, flat-line segments
      in otherwise dynamic signals, and physically impossible or
      out-of-range values.
    annotation_guideline: >
      This segment contains gaps or corrupted telemetry.  Identify if
      the sensor data drops to zero or becomes inconsistent unexpectedly.
    parent: null
    children: []
    exclusive_with: ["1", "EA", "4", "RM", "MS"]

  EA:
    name: "Expert Adherence"
    type: main
    description: >
      The driver is closely following the expert's optimal racing line
      and speed profile.  The time difference to the expert is stable
      or decreasing.  No significant errors are present.  In the
      telemetry the Time Difference to Expert graph should be flat or
      decreasing, the speed delta near zero, and the trajectory closely
      following the expert line.
    annotation_guideline: >
      The driver is following the optimal racing line and speed profile
      closely.  Nothing needs to be labeled right now.
    parent: null
    children: []
    exclusive_with: ["MS", "RM", "2"]

  "4":
    name: "Pit Stop"
    type: main
    description: >
      The driver is entering, waiting in, or exiting the pit lane.
      This involves a significant speed reduction and a distinct
      trajectory deviation into the pit area.  Telemetry signatures
      include a dramatic speed reduction, a trajectory deviation into
      the pit lane, and a constant low speed consistent with the pit
      speed limiter being engaged.
    annotation_guideline: >
      The driver is entering, waiting in, or exiting the pit lane.
      Look for significant speed reduction and distinct trajectory
      deviation into the pit area.
    parent: null
    children: []
    exclusive_with: ["1", "2"]

  RM:
    name: "Recovery & Merge"
    type: main
    description: >
      The driver is recovering from a prior incident — such as going
      off-track, exiting the pit, or having a speed deficit — and is
      merging back onto the optimal racing line.  The time delta to
      the expert may initially be large but should be closing.
      Telemetry indicators include recovery from low speed, off-track
      excursions, or pit exit; a decreasing time delta to the expert;
      and trajectory converging back toward the optimal line.  Specific
      recovery sub-labels describe the root cause.
    annotation_guideline: >
      The driver is recovering from a mistake such as slower speed.
      Identify if the driver is recovering from low speed, off-track,
      or merging back to the expert line.
    parent: null
    children: ["RM1", "RM2", "RM5", "RM6", "RM7", "RM8", "RM9", "RM10", "RM11"]
    exclusive_with: ["EA", "2"]

  MS:
    name: "Mistake"
    type: main
    description: >
      The driver has committed a driving error that results in time
      loss or vehicle instability.  The time difference to the expert
      increases continuously without a quick recovery.  In the
      telemetry, the Time Difference to Expert graph typically shows a
      continuously increasing gap; throttle and brake traces diverge
      from the expert; the push_limit graph may reveal understeer or
      oversteer causing lower speed; and the Trajectory map can show
      deviations from the optimal line.  Sub-labels describe the
      specific root cause of the mistake.
    annotation_guideline: >
      The driver has committed a driving error resulting in time loss
      or instability.
      Step 1: Analyze the 'Time Difference to Expert' graph; a mistake
      normally causes this time gap to increase continuously without
      decreasing shortly after.
      Step 2: Examine the differences in 'throttle' between the player
      and the expert to identify when the driver applyed too much or too little throttle, or got on/off the throttle at the wrong time.
      Step 3: Examine the differences in 'brake' between the player
      and the expert to identify if the driver braked too hard or too softly, or got on/off the brake at the wrong time.
      Step 4: Examine the 'push_limit' graph to find understeer or
      oversteer, which could lead to lower speed.
      Step 5: Check the 'Trajectory' map for mistakes caused by
      deviations from the optimal line.
    parent: null
    children:
      - "MS1"
      - "MS2"
      - "MS3"
      - "MS4"
      - "MS5"
      - "MS6"
      - "MS7"
      - "MS8"
      - "MS9"
      - "MS10"
      - "MS11"
      - "MS13"
      - "MS14"
      - "MS15"
      - "MS16"
      - "MS17"
      - "MS18"
      - "MS19"
      - "MS20"
      - "MS21"
      - "MS22"
      - "MS23"
      - "MS24"
      - "MS25"
      - "MS26"
      - "MS27"
      - "MS28"
      - "MS29"
      - "MS30"
      - "MS31"
      - "MS32"
      - "MS33"
      - "MS34"
      - "MS35"
      - "MS36"
      - "MS37"
      - "MS38"
      - "MS41"
      - "MS42"
      - "MS43"
      - "MS44"
      - "MS45"
      - "MS46"
      - "MS47"
      - "MS48"
      - "MS49"
      - "MS50"
      - "MS51"
      - "MS52"
    exclusive_with: ["EA", "2"]

  brands_hatch:
    name: "Brands Hatch"
    type: circuit
    description: >
      The segment takes place on the Brands Hatch circuit.  The
      Trajectories Overlay can be used to identify which specific
      named corner or straight section the segment corresponds to.
      The shape of the segment should also be described using Segment
      Type labels (ST1–ST6).
    annotation_guideline: >
      Look at the Trajectories Overlay and identify specific named
      corners or straight sections of the Brands Hatch circuit.  Also,
      identify the shape of the segment using labels ST1–ST6.
    parent: null
    children:
      - "brands_hatch1"
      - "brands_hatch2"
      - "brands_hatch3"
      - "brands_hatch4"
      - "brands_hatch5"
      - "brands_hatch6"
      - "brands_hatch7"
      - "brands_hatch9"
      - "brands_hatch10"
      - "brands_hatch11"
      - "brands_hatch12"
      - "brands_hatch13"
      - "brands_hatch14"
      - "brands_hatch15"
      - "brands_hatch16"
      - "brands_hatch17"
      - "brands_hatch18"
      - "brands_hatch19"
    exclusive_with: ["silverstone"]

  silverstone:
    name: "Silverstone"
    type: circuit
    description: >
      The segment takes place on the Silverstone circuit.  The
      Trajectories Overlay can be used to identify which specific
      named corner or straight section the segment corresponds to.
      The shape of the segment should also be described using Segment
      Type labels (ST1–ST6).
    annotation_guideline: >
      Look at the Trajectories Overlay and identify specific named
      corners or straight sections of the Silverstone circuit.  Also,
      identify the shape of the segment using labels ST1–ST6.
    parent: null
    children:
      - "silverstone1"
      - "silverstone2"
      - "silverstone3"
      - "silverstone4"
      - "silverstone5"
      - "silverstone6"
      - "silverstone7"
      - "silverstone8"
      - "silverstone9"
      - "silverstone10"
      - "silverstone11"
      - "silverstone12"
      - "silverstone13"
      - "silverstone14"
      - "silverstone15"
      - "silverstone16"
      - "silverstone17"
      - "silverstone18"
      - "silverstone19"
      - "silverstone20"
      - "silverstone21"
    exclusive_with: ["brands_hatch"]

  # =========================================================================
  # RECOVERY & MERGE SUB-LABELS
  # =========================================================================

  RM1:
    name: "Recover from off-track"
    type: sub
    description: >
      The driver went off the circuit surface and is now returning
      to the track.  There may be a large trajectory deviation and
      sudden speed loss.
    parent: RM
    children: []
    exclusive_with: ["RM2"]

  RM2:
    name: "Exit pit lane"
    type: sub
    description: >
      The driver is re-joining the track after a pit stop.  Speed
      increases from pit-limiter speed to racing speed.
    parent: RM
    children: []
    exclusive_with: ["RM1"]

  RM5:
    name: "Recover from speed gap over 20"
    type: sub
    description: >
      Player's speed is lower than expert's by more than 20 km/h
      on the speed graph (or speed_delta showing expert faster
      than player by more than 20 km/h) and the gap is closing
      (time_delta falling).  The driver is recovering from a
      large speed deficit.
    parent: RM
    children: []
    exclusive_with: ["RM6"]

  RM6:
    name: "Recover from small speed gap under 20"
    type: sub
    description: >
      Player's speed is lower than expert's by less than 20 km/h
      on the speed graph (or speed_delta showing expert faster
      than player by less than 20 km/h) and the gap is closing
      (time_delta falling).  The driver is recovering from a
      small speed deficit.
    parent: RM
    children: []
    exclusive_with: ["RM5"]

  RM7:
    name: "Merge back to expert line"
    type: sub
    description: >
      Player trajectory is converging back toward the expert line
      on the trajectory plot after a deviation — the gap between
      the green (player) and blue dashed (expert) lines decreases
      across the segment.
    parent: RM
    children: []
    exclusive_with: []

  RM8:
    name: "Accelerate earlier at exit"
    type: sub
    description: >
      During recovery, player begins applying throttle earlier
      than expert at corner exit on the throttle graph (negative
      application-onset offset in the corner-exit phase).
    parent: RM
    children: []
    exclusive_with: ["RM9"]

  RM9:
    name: "Accelerate later at exit"
    type: sub
    description: >
      During recovery, player begins applying throttle later than
      expert at corner exit on the throttle graph (positive
      application-onset offset in the corner-exit phase).
    parent: RM
    children: []
    exclusive_with: ["RM8"]

  RM10:
    name: "Brake earlier at entry"
    type: sub
    description: >
      During recovery, player begins braking earlier than expert
      at corner entry on the brake graph (negative
      brake-initiation offset in the corner-entry phase).
    parent: RM
    children: []
    exclusive_with: ["RM11"]

  RM11:
    name: "Brake later at entry"
    type: sub
    description: >
      During recovery, player begins braking later than expert at
      corner entry on the brake graph (positive brake-initiation
      offset in the corner-entry phase).
    parent: RM
    children: []
    exclusive_with: ["RM10"]

  # =========================================================================
  # MISTAKE SUB-LABELS — Braking
  # =========================================================================

  MS1:
    name: "Initiate brake too late"
    type: sub
    description: >
      Player begins braking later than expert on the brake graph
      (positive brake-initiation offset).  The driver carries too
      much speed into the corner because brake application is
      delayed relative to the expert's braking point.
    parent: MS
    children: []
    exclusive_with: ["MS5"]

  MS5:
    name: "Initiate brake too early"
    type: sub
    description: >
      Player begins braking earlier than expert on the brake graph
      (negative brake-initiation offset).  The driver loses time by
      decelerating before the expert's braking point.
    parent: MS
    children: []
    exclusive_with: ["MS1"]

  MS13:
    name: "Highest brake pressure too low"
    type: sub
    description: >
      Player's peak brake pressure is lower than expert's on the
      brake graph (negative peak-pressure offset).  The driver does
      not generate enough deceleration to match the expert's brake
      input.
    parent: MS
    children: []
    exclusive_with: ["MS22"]

  MS22:
    name: "Highest brake pressure too high"
    type: sub
    description: >
      Player's peak brake pressure is higher than expert's on the
      brake graph (positive peak-pressure offset), risking lock-up
      or instability.
    parent: MS
    children: []
    exclusive_with: ["MS13"]

  MS14:
    name: "Brake applied too quickly"
    type: sub
    description: >
      Player applies brake more sharply than expert on the brake
      graph — the player ramp from zero to peak takes fewer indices
      than the expert's, transitioning to high brake pressure too
      rapidly.
    parent: MS
    children: []
    exclusive_with: ["MS24"]

  MS24:
    name: "Brake applied too slowly"
    type: sub
    description: >
      Player applies brake more gradually than expert on the brake
      graph — the player ramp from zero to peak takes more indices
      than the expert's, not reaching peak pressure quickly enough.
    parent: MS
    children: []
    exclusive_with: ["MS14"]

  MS17:
    name: "Release brake too quickly"
    type: sub
    description: >
      Player releases brake more abruptly than expert on the brake
      graph — the player drops from peak to zero in fewer indices
      than the expert, losing trail braking and destabilising the
      car mid-corner.
    parent: MS
    children: []
    exclusive_with: ["MS18"]

  MS18:
    name: "Release brake too slowly"
    type: sub
    description: >
      Player releases brake more gradually than expert on the brake
      graph — the player drops from peak to zero in more indices
      than the expert, carrying too much braking into the corner
      and scrubbing speed.
    parent: MS
    children: []
    exclusive_with: ["MS17"]

  MS27:
    name: "Initiate brake release too late"
    type: sub
    description: >
      Player begins releasing brake later than expert on the brake
      graph (positive brake-release-onset offset), staying on the
      brake too long.
    parent: MS
    children: []
    exclusive_with: ["MS28"]

  MS28:
    name: "Initiate brake release too early"
    type: sub
    description: >
      Player begins releasing brake earlier than expert on the
      brake graph (negative brake-release-onset offset), losing
      trail-braking benefit.
    parent: MS
    children: []
    exclusive_with: ["MS27"]

  MS31:
    name: "Highest brake length too short"
    type: sub
    description: >
      Player's braking duration is shorter than expert's on the
      brake graph (total indices from initiation to full release).
      Potentially under-braking.
    parent: MS
    children: []
    exclusive_with: ["MS32"]

  MS32:
    name: "Highest brake length too long"
    type: sub
    description: >
      Player's braking duration is longer than expert's on the
      brake graph (total indices from initiation to full release).
      Over-braking and losing time.
    parent: MS
    children: []
    exclusive_with: ["MS31"]

  MS34:
    name: "Throttle and brake applied at the same time for too long"
    type: sub
    description: >
      Player applies throttle and brake simultaneously for an extended period.
    parent: MS
    children: []
    exclusive_with: []

  # =========================================================================
  # MISTAKE SUB-LABELS — Throttle
  # =========================================================================

  MS15:
    name: "Throttle applied too quickly"
    type: sub
    description: >
      Player applies throttle more sharply than expert on the
      throttle graph — ramp from zero to peak takes fewer indices
      than the expert's.
    parent: MS
    children: []
    exclusive_with: ["MS25"]

  MS25:
    name: "Throttle applied too slowly"
    type: sub
    description: >
      Player applies throttle more gradually than expert on the
      throttle graph — ramp from zero to peak takes more indices
      than the expert's.
    parent: MS
    children: []
    exclusive_with: ["MS15"]

  MS19:
    name: "Highest throttle pressure too low"
    type: sub
    description: >
      Peak throttle is lower than expert on the throttle graph —
      player tops out at a lower y-value than the expert.
    parent: MS
    children: []
    exclusive_with: ["MS26"]

  MS26:
    name: "Highest throttle pressure too high"
    type: sub
    description: >
      Peak throttle is higher than expert on the throttle graph —
      player tops out at a higher y-value than the expert.
    parent: MS
    children: []
    exclusive_with: ["MS19"]

  MS20:
    name: "Initiate throttle too early"
    type: sub
    description: >
      Player begins applying throttle earlier than expert on the
      throttle graph — application-onset index is lower than the
      expert's.
    parent: MS
    children: []
    exclusive_with: ["MS21"]

  MS21:
    name: "Initiate throttle too late"
    type: sub
    description: >
      Player begins applying throttle later than expert on the
      throttle graph — application-onset index is higher than the
      expert's.
    parent: MS
    children: []
    exclusive_with: ["MS20"]

  MS23:
    name: "Release throttle too quickly"
    type: sub
    description: >
      Player releases throttle more abruptly than expert on the
      throttle graph — drop from peak to zero takes fewer indices
      than the expert's.
    parent: MS
    children: []
    exclusive_with: []

  MS29:
    name: "Initiate throttle release too late"
    type: sub
    description: >
      Player begins releasing throttle later than expert on the
      throttle graph — release-onset index is higher than the
      expert's (late lift-off).
    parent: MS
    children: []
    exclusive_with: ["MS30"]

  MS30:
    name: "Initiate throttle release too early"
    type: sub
    description: >
      Player begins releasing throttle earlier than expert on the
      throttle graph — release-onset index is lower than the
      expert's (early lift-off).
    parent: MS
    children: []
    exclusive_with: ["MS29"]

  # =========================================================================
  # MISTAKE SUB-LABELS — Turn-in / Timing
  # =========================================================================

  MS2:
    name: "Initiate the turn too late"
    type: sub
    description: >
      Player turns in later than expert on the trajectory plot —
      the player begins curving from the straight at a later point
      along the trajectory than the expert, resulting in a wider
      entry line.
    parent: MS
    children: []
    exclusive_with: ["MS6"]

  MS6:
    name: "Initiate the turn too early"
    type: sub
    description: >
      Player turns in earlier than expert on the trajectory plot —
      the player begins curving from the straight at an earlier
      point than the expert, resulting in a tighter entry line.
    parent: MS
    children: []
    exclusive_with: ["MS2"]

  MS3:
    name: "Too late compared to expert Apex"
    type: sub
    description: >
      Player reaches apex later than expert on the trajectory plot
      (positive apex-timing offset) — the closest point to the
      inside of the corner is reached later along the player's
      trajectory than along the expert's.
    parent: MS
    children: []
    exclusive_with: ["MS7"]

  MS7:
    name: "Too early compared to expert Apex"
    type: sub
    description: >
      Player reaches apex earlier than expert on the trajectory
      plot (negative apex-timing offset), potentially compromising
      exit speed.
    parent: MS
    children: []
    exclusive_with: ["MS3"]

  MS4:
    name: "Time to exit too early"
    type: sub
    description: >
      Player exits corner earlier than expert on the trajectory
      plot (negative exit-timing offset) — the player straightens
      the steering before the expert does.
    parent: MS
    children: []
    exclusive_with: ["MS8"]

  MS8:
    name: "Time to exit too late"
    type: sub
    description: >
      Player exits corner later than expert on the trajectory plot
      (positive exit-timing offset) — the player straightens the
      steering after the expert does, staying in the turn too long.
    parent: MS
    children: []
    exclusive_with: ["MS4"]

  # =========================================================================
  # MISTAKE SUB-LABELS — Trajectory
  # =========================================================================

  MS9:
    name: "Entry trajectory too tight"
    type: sub
    description: >
      Player's entry line is tighter than expert (closer to inside)
      on the trajectory plot — the player takes a tighter line
      through the corner-entry phase, reducing corner speed
      potential.
    parent: MS
    children: []
    exclusive_with: ["MS33"]

  MS33:
    name: "Entry trajectory too wide"
    type: sub
    description: >
      Player's entry line is wider than expert (closer to outside)
      on the trajectory plot — the player takes a wider line
      through the corner-entry phase, requiring a tighter
      mid-corner to hit the apex.
    parent: MS
    children: []
    exclusive_with: ["MS9"]

  MS10:
    name: "Apex too wide"
    type: sub
    description: >
      Player's apex is farther from inside than expert on the
      trajectory plot — the player's closest point to the inside
      of the corner is wider (farther from the kerb) than the
      expert's apex.
    parent: MS
    children: []
    exclusive_with: []

  MS11:
    name: "Exit trajectory too narrow"
    type: sub
    description: >
      Player's exit line is tighter than expert (uses less track
      width) on the trajectory plot — the player stays too close
      to the inside on corner exit, not using the full track
      width to carry speed.
    parent: MS
    children: []
    exclusive_with: ["MS16"]

  MS16:
    name: "Exit trajectory too wide"
    type: sub
    description: >
      Player's exit line is wider than expert (uses more track
      width) on the trajectory plot — the player runs too wide on
      corner exit, potentially going off-track or losing time by
      exceeding track limits.
    parent: MS
    children: []
    exclusive_with: ["MS11"]

  MS41:
    name: "Cutting the line"
    type: sub
    description: >
      Player cuts inside expert's racing line on the trajectory
      plot — the player line crosses inside the expert's line,
      shortening the corner but potentially violating track
      limits.
    parent: MS
    children: []
    exclusive_with: []

  MS50:
    name: "Off track at entry"
    type: sub
    description: >
      Player goes off track at corner entry on the trajectory
      plot — the player trajectory leaves the track surface during
      the corner-entry phase.
    parent: MS
    children: []
    exclusive_with: []

  MS51:
    name: "Off track at exit"
    type: sub
    description: >
      Player goes off track at corner exit on the trajectory plot
      — the player trajectory leaves the track surface during the
      corner-exit phase.
    parent: MS
    children: []
    exclusive_with: []

  MS52:
    name: "Off track in the straight"
    type: sub
    description: >
      Player goes off track on the straight on the trajectory plot
      — the player trajectory leaves the track surface on a
      straight section (not in a corner).
    parent: MS
    children: []
    exclusive_with: []

  # =========================================================================
  # MISTAKE SUB-LABELS — Grip / Vehicle dynamics
  # =========================================================================

  MS42:
    name: "Inefficient grip utilization at entry"
    type: sub
    description: >
      Player's grip utilisation at corner entry differs from
      expert's pattern on the push_limit graph — either
      under-loading (sustained low) or over-loading (vivid spike)
      during the corner-entry phase, where the expert's pattern
      is a controlled moderate value.
    parent: MS
    children: []
    exclusive_with: []

  MS43:
    name: "Inefficient grip utilization at exit"
    type: sub
    description: >
      Player's grip utilisation at corner exit differs from
      expert's pattern on the push_limit graph — either
      under-loading or over-loading during the corner-exit phase.
    parent: MS
    children: []
    exclusive_with: []

  MS44:
    name: "Oversteering at entry"
    type: sub
    description: >
      Rear-slip dominant section at corner entry on the balance
      trajectory — the rear of the car loses grip (visible as a
      red section on the balance plot at the corner-entry phase),
      causing the car to rotate more than intended.
    parent: MS
    children: []
    exclusive_with: ["MS45"]

  MS45:
    name: "Understeering at entry"
    type: sub
    description: >
      Front-slip dominant section at corner entry on the balance
      trajectory — the front tyres lose grip (visible as a blue
      section on the balance plot at the corner-entry phase),
      causing the car to push wide (not turning enough).  Note:
      blue is amplified 2x in the colour mapping.
    parent: MS
    children: []
    exclusive_with: ["MS44"]

  MS46:
    name: "Oversteering at exit"
    type: sub
    description: >
      Rear-slip dominant section at corner exit on the balance
      trajectory — the rear of the car loses grip (visible as a
      red section on the balance plot at the corner-exit phase),
      usually due to aggressive throttle application.
    parent: MS
    children: []
    exclusive_with: ["MS47"]

  MS47:
    name: "Understeering at exit"
    type: sub
    description: >
      Front-slip dominant section at corner exit on the balance
      trajectory — the front tyres lose grip (visible as a blue
      section on the balance plot at the corner-exit phase),
      causing the car to run wide despite steering input.  Note:
      blue is amplified 2x in the colour mapping.
    parent: MS
    children: []
    exclusive_with: ["MS46"]

  # =========================================================================
  # MISTAKE SUB-LABELS — Gear / Shifting
  # =========================================================================

  MS35:
    name: "Shift up too early"
    type: sub
    description: >
      Player upshifts from lower gear earlier than expert  visible on the gear graph.
    parent: MS
    children: []
    exclusive_with: ["MS36"]

  MS36:
    name: "Shift up too late"
    type: sub
    description: >
      Player upshifts from higher gear later than expert (positive shift-timing
      offset) — visible on the gear graph 
    parent: MS
    children: []
    exclusive_with: ["MS35"]

  MS37:
    name: "Shift down too early"
    type: sub
    description: >
      Player downshifts from higher gear earlier than expert — visible on the
      gear graph as a downshift step occurring earlier.
    parent: MS
    children: []
    exclusive_with: ["MS38"]

  MS38:
    name: "Shift down too late"
    type: sub
    description: >
      Player downshifts from lower gear later than expert — visible on the gear
      graph as a downshift step occurring later.
    parent: MS
    children: []
    exclusive_with: ["MS37"]

  MS48:
    name: "Gear too low when accelerating"
    type: sub
    description: >
      Player is in a lower gear than expert during acceleration —
      visible on the gear graph.
    parent: MS
    children: []
    exclusive_with: ["MS49"]

  MS49:
    name: "Gear too high when accelerating"
    type: sub
    description: >
      Player is in a higher gear than expert during acceleration
