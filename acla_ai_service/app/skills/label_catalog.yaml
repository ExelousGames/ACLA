      - "brands_hatch2"
      - "brands_hatch3"
      - "brands_hatch4"
      - "brands_hatch5"
      - "brands_hatch6"
      - "brands_hatch7"
      - "brands_hatch9"
      - "brands_hatch10"
      - "brands_hatch11"
      - "brands_hatch12"
      - "brands_hatch13"
      - "brands_hatch14"
      - "brands_hatch15"
      - "brands_hatch16"
      - "brands_hatch17"
      - "brands_hatch18"
      - "brands_hatch19"
    exclusive_with: ["silverstone"]

  silverstone:
