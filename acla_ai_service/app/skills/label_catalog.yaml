    children: []
    exclusive_with: ["MS11"]

  MS41:
    name: "Cutting the line"
    type: sub
    description: >
      The player cuts inside the expert's racing line, shortening the
      corner.  The player **cuts inside the racing line** of the expert.
    parent: MS
    children: []
    exclusive_with: []

  MS50:
    name: "Off track at entry"
    type: sub
    description: >
      Player goes off track at corner entry.  Look for **off track at entry**.
