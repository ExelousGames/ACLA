    name: "Brands Hatch"
    type: circuit
    description: "Segment on the Brands Hatch circuit."
    annotation_guideline: >
      Look at the Trajectories Overlay and identify specific named
      corners or straight sections of the Brands Hatch circuit.  Also,
      identify the shape of the segment using labels ST1–ST6.
