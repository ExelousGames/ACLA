      - "silverstone17"
      - "silverstone18"
      - "silverstone19"
      - "silverstone20"
      - "silverstone21"
    exclusive_with: ["brands_hatch"]

  # =========================================================================
  # RECOVERY & MERGE SUB-LABELS
  # =========================================================================

  RM1:
    name: "Recover from off-track"
    type: sub
    description: >
      Driver returning to track after an off-track excursion.  Look for
      **off track at entry**, **off track at exit**, or **off track on
      the straight** in an earlier section, followed by **gap to expert
      shrinks** as the driver rejoins.
    parent: RM
    children: []
    exclusive_with: ["RM2"]

  RM2:
    name: "Exit pit lane"
    type: sub
    description: >
      Driver re-joining the track after a pit stop — speed increases from
      pit-limiter speed and the trajectory rejoins the racing line.
    parent: RM
    children: []
    exclusive_with: ["RM1"]

  RM5:
    name: "Recover from speed gap over 20"
    type: sub
    description: >
      Player more than 20 km/h slower than the expert with the gap
      closing.  Look for **expert faster than player** and **large gap
      section** on the speed-delta graph, alongside **gap to expert
      shrinks** or the player **gains time on** the expert on the
      time-delta graph.
    parent: RM
    children: []
    exclusive_with: ["RM6"]

  RM6:
    name: "Recover from small speed gap under 20"
    type: sub
    description: >
      Player less than 20 km/h slower than the expert with the gap
      closing.  Look for **expert faster than player** on the speed-delta
      graph (without **large gap section**) alongside **gap to expert
      shrinks** or the player **gains time on** the expert.
    parent: RM
    children: []
    exclusive_with: ["RM5"]

  RM7:
    name: "Merge back to expert line"
    type: sub
    description: >
      Player trajectory converging toward the expert line — the gap between
      the two trajectory lines decreases through the segment.
    parent: RM
    children: []
    exclusive_with: []

  RM8:
    name: "Accelerate earlier at exit"
    type: sub
    description: >
      During recovery, the player applies throttle earlier than the
      expert at corner exit.  Look for the player **begins applying
      throttle earlier than** the expert or **throttle resumes earlier
      than** the expert at corner exit alongside the player **gains time
      on** the expert.
    parent: RM
    children: []
    exclusive_with: ["RM9"]

  RM9:
    name: "Accelerate later at exit"
    type: sub
    description: >
      During recovery, the player applies throttle later than the expert
      at corner exit.  Look for the player **begins applying throttle
      later than** the expert or **throttle resumes later than** the
      expert at corner exit alongside the player **gains time on** the
      expert.
    parent: RM
    children: []
    exclusive_with: ["RM8"]

  RM10:
    name: "Brake earlier at entry"
    type: sub
    description: >
      During recovery, the player brakes earlier than the expert at
      corner entry.  Look for the player **begins braking earlier than**
      the expert alongside the player **gains time on** the expert.
    parent: RM
    children: []
    exclusive_with: ["RM11"]

  RM11:
    name: "Brake later at entry"
    type: sub
    description: >
      During recovery, the player brakes later than the expert at corner
      entry.  Look for the player **begins braking later than** the
      expert alongside the player **gains time on** the expert.
    parent: RM
    children: []
    exclusive_with: ["RM10"]

  # =========================================================================
