    parent: MS
    children: []
    exclusive_with: ["MS48"]

  # =========================================================================
  # SEGMENT TYPE LABELS
  # =========================================================================

  ST1:
    name: "In the corner"
    type: segment_type
    description: >
      The segment is entirely within a corner.  The driver is
      turning throughout.
    parent: null
    children: []
    exclusive_with: ["ST2", "ST3", "ST4", "ST5", "ST6"]

  ST2:
    name: "On the straight"
    type: segment_type
    description: >
      The segment is on a straight section.  Minimal steering,
      high speed, full throttle typical.
    parent: null
    children: []
    exclusive_with: ["ST1", "ST3", "ST4", "ST5", "ST6"]

  ST3:
    name: "Approach to corner"
    type: segment_type
    description: >
      The segment covers the approach/braking zone before a corner.
      The driver is decelerating and preparing to turn in.
    parent: null
    children: []
    exclusive_with: ["ST1", "ST2", "ST4", "ST5", "ST6"]

  ST4:
    name: "Exit corner leading to straight"
    type: segment_type
    description: >
      The segment covers the exit of a corner leading onto a
      straight.  Steering angle is decreasing, throttle increasing.
    parent: null
    children: []
    exclusive_with: ["ST1", "ST2", "ST3", "ST5", "ST6"]

  ST5:
    name: "Between consecutive corners"
    type: segment_type
    description: >
      The segment is a short connection between two corners —
      not a full straight but a brief transition.
    parent: null
    children: []
    exclusive_with: ["ST1", "ST2", "ST3", "ST4", "ST6"]

  ST6:
    name: "Consecutive corners with no straight in between"
    type: segment_type
    description: >
      The segment covers multiple corners with no intervening
      straight — e.g., an esses or chicane complex.
    parent: null
    children: []
    exclusive_with: ["ST1", "ST2", "ST3", "ST4", "ST5"]

