      expert's matching upshift.
    parent: MS
    children: []
    exclusive_with: ["MS35"]

  MS37:
    name: "Shift down too early"
    type: sub
    description: >
      The player's **downshift** occurs at an earlier index than the
      expert's matching downshift.
    parent: MS
    children: []
    exclusive_with: ["MS38"]

  MS38:
    name: "Shift down too late"
    type: sub
    description: >
