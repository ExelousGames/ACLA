      expert's matching downshift.
    parent: MS
    children: []
    exclusive_with: ["MS37"]

  MS48:
    name: "Gear too low when accelerating"
    type: sub
    description: >
      The player **holds gear** at a lower number than the expert
      across an index range where the speed trace is rising (player
      is in a **lower gear than** the expert during acceleration).
    parent: MS
    children: []
    exclusive_with: ["MS49"]

  MS49:
    name: "Gear too high when accelerating"
    type: sub
    description: >
