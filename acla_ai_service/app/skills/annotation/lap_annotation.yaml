_skill:
  name: lap_annotation
  description: >
    Per-label telemetry characteristics for the 8 candidate parent labels
    (EA, MS, RM, PS, O, MD + circuit) that the lap-to-segment excerpter
    can attach to one circuit section. Each label declares its telemetry
    signature (trajectory_offset, time_difference_to_expert slope, brake
    overlap, etc.) and the global_rules block prescribes the per-section
    detection procedure. Source of truth for "does this section qualify
    as MS / RM / EA / ... at all?"
  when_to_use:
    - Lap excerpter assigning one parent label per circuit section.
    - Building the system prompt for the lap-flow planner/synthesizer.
    - Evaluator checks for parent-label justification against telemetry.
  tags: [labels, lap_flow, parent_labels, telemetry, characteristics]

# =============================================================================
# Lap Annotation Skill — characteristic patterns for the 8 candidate parent
# labels the lap-to-segment excerpter can attach to one circuit section.
#
# Annotation-flow split — read this before editing:
#   - The main-label `characteristics` blocks here serve the **lap-to-
#     segment flow** — "does this whole section qualify as MS at all?".
#   - Sub-label discovery (drilling into an already-labelled MS section
#     to pick MS1 / MS17 / ...) is the **detailed flow**'s job; its
#     guidance lives in `sub_label_catalog.yaml` under each main-label
#     entry's `annotation_guideline` field. Do NOT duplicate that here.
#
# Out of scope (handled outside this file):
#   - circuit_section IDs (brands_hatch1, silverstone3, ...) — supplied by
#     the splitter and verifiable via the `locate_circuit_section` tool +
#     `sub_label_catalog.yaml`.
#   - ST1–ST6 segment_type labels — descriptions live in the catalog;
#     the agent picks one only when the shape is unambiguous (optional).
#
# Schema:
#   labels.<id>
#     name             — human-readable label
#     applies_when     — eligibility precondition (e.g. circuit gating)
#     characteristics  — telemetry signature that justifies attaching it
#
#   global_rules       — the per-section detection procedure: which graphs
#                        to render, which queries to run, how to score the
#                        characteristics against the rendered evidence.
# =============================================================================

labels:

  brands_hatch:
    name: "Brands Hatch"
    applies_when: "lap recorded at Brands Hatch (Static_track resolves to brands_hatch)"
    characteristics: >
      Circuit parent label — mandatory on every section of a Brands Hatch
      lap. No telemetry check needed beyond confirming the track ID.

  silverstone:
    name: "Silverstone"
    applies_when: "lap recorded at Silverstone (Static_track resolves to silverstone)"
    characteristics: >
      Circuit parent label — mandatory on every section of a Silverstone
      lap. No telemetry check needed beyond confirming the track ID.

  EA:
    name: "Expert Adherence"
    characteristics: >
      Player tracks the expert through the section.
        - `trajectory_offset` stays within ±0.5 m of zero for the whole range.
        - `time_difference_to_expert` slope is ≈ 0 (gap neither grows nor
          shrinks) — confirm with `compute_slope`.
        - Speed delta at sampled ilocs is small.
      Mutually exclusive with MS and RM.

  MS:
    name: "Mistake"
    characteristics: >
      Player loses time or stability inside the section.
        - `time_difference_to_expert` rises continuously (gap grows) — confirm
          with `compute_slope` (positive) and `find_extremum` (max - min > 0).
        - 'time_difference_to_expert' slope rises at the end of the corner exit, this
          may indicate a mistake.
        - `trajectory_offset` exceeds the expert envelope: a spike outward
          (ran wide) or inward (cut tight) that does NOT recover within the
          section.
      Mutually exclusive with EA and RM. The detailed-annotation flow refines
      MS sub-ranges later — attach MS at the section level when the section
      is dominated by the error.

  RM:
    name: "Recovery & Merge"
    characteristics: >
      Player recovering from a prior mistake inside this section.
        - `time_difference_to_expert` slope is negative across the range
          (gap shrinks, never grows) — confirm with `compute_slope`.
        - `trajectory_offset` trends back toward zero from a non-zero start.
      Often appears in the section immediately following an MS. Do NOT attach
      when the player started at offset ≈ 0 — that's EA, not RM. Mutually
      exclusive with EA and MS.

  PS:
    name: "Pit Stop"
    characteristics: >
      Player entering or sitting in the pit lane. Merging back out
      from the pit toward the expert line is RM, not PS.
        - `distance_to_expert_line` magnitude persistently large
          (≥ ~5 m) AND NOT trending toward zero (a decreasing offset
          ⇒ merging out ⇒ RM, not PS).
      Picking which named catalog section to attach is a sub-label
      decision — see `sub_label_catalog`. Compatible with the circuit
      label only; do NOT combine with EA / MS / RM / O.

  O:
    name: "Overtaking"
    characteristics: >
      Player passes or is being passed inside the section.
        - Late-brake signature on `brake` not present on the expert line.
        - Line deviation that is NOT explained by MS / RM (player chose an
          inside or outside line to pass).
        - Speed differential vs. a nearby car when that data is available.
      Rare without multi-car telemetry. Attach only when the signature is
      unambiguous; otherwise leave O off and let the detailed flow handle
      sub-events.

  MD:
    name: "Missing data"
    characteristics: >
      Section contains telemetry gaps, dropouts, or corrupted values.
        - A signal that should be dynamic flatlines (e.g. speed = 0 mid-lap).
        - Physically impossible values (negative speed, gear out of range).
        - NaN runs inside the section.
      Trigger: a `find_extremum` returns an impossible min/max, or a rendered
      graph shows a flat plateau where motion should exist. Compatible with
      every other label.

# =============================================================================
# Global rules — how to detect the characteristics above
# =============================================================================

global_rules: >
  Per-section detection procedure:

  1. **Anchor the circuit + section.** The circuit label comes from the lap
     context (always attached). The splitter assigned a `circuit_section_id`;
     call `locate_circuit_section(start, end)` once to confirm the rough
     range still overlaps that section's `normalized_position_range`. When
     the response has `is_ambiguous: false`, attach `best_match.label_id`.
     When `is_ambiguous: true`, enumerate `top_matches` and read each
     entry's `description` — the catalog carries any per-section
     disambiguation tell. Use `peek_graph` or out-of-range
     `query_telemetry` if the disambiguating evidence sits just before
     or after the section.

  2. **Render the two diagnostic graphs.** One `render_graph` each over the
     section's iloc range:
       - `trajectory_offset` — discriminates EA vs. MS vs. RM vs. PS.
       - `time_difference_to_expert` — confirms gap direction (flat ⇒ EA,
         rising ⇒ MS, falling ⇒ RM).
     These two cover EA / MS / RM / PS detection. Add a third only when a
     specific candidate (O / MD) needs it.

  3. **Score each candidate label against its `characteristics` block.**
     Use `query_telemetry` for quantitative confirmation:
       - `compute_slope` on `time_difference_to_expert` → sign and magnitude
         of the gap trend.
       - `find_extremum` on `trajectory_offset` → peak deviation from zero.
       - `find_first_match` on `Physics_brake` / `Physics_gas` → onset ilocs
         when O needs late-brake evidence.
     A section may attach at most ONE of {EA, MS, RM} (mutually exclusive)
     plus optionally PS / O / MD. Attaching none of {EA, MS, RM} is valid
     when telemetry is too noisy to commit.

  4. **Refine the boundary for parent-label fit.** The characteristics
     blocks assert their signature across the WHOLE range. If the picked
     main label fits only part of the rough window (offset clean for the
     first half then spikes, gap rises only late, etc.), or the signature
     clearly continues past the rough end, call `revise_segment_range`
     to shrink or extend so ONE signature holds uniformly. The working
     envelope is the lap range, so outward extension is allowed. Re-render
     the diagnostic graphs on the new range before scoring again.

  5. **Optionally pick one ST1–ST6** from the label catalog descriptions
     when the trajectory shape is unambiguous. Use `compute_expert_phases`
     to help: empty phases ⇒ straight (ST2), one arc ⇒ in/approach/exit
     corner (ST1/ST3/ST4), multi-arc with no flat gap ⇒ ST6. Skip the ST
     pick entirely when the shape is ambiguous.

  6. **Submit** via `submit_lap_proposal` with
     `label_ids = [circuit, circuit_section_id, ...optional ST, ...optional main labels]`
     and a `reasoning` string citing the ilocs / slopes / offset peaks you
     observed.

  Hard rules:
    - One proposal per agent run; the UI loops one section per click.
    - Never invent label IDs — only IDs from the eligible list are accepted.
    - EA + MS, EA + RM, MS + RM are all contradictions — pick at most one.
    - PS is incompatible with EA / MS / RM / O.
    - Empty `label_ids` `[]` is the valid "drop this section" signal.
    - Final iloc range must remain inside the lap and ≥ 3 ilocs.
