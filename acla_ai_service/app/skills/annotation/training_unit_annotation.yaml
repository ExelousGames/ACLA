_skill:
  name: training_unit_annotation
  description: >
    Per-mode writing rules for the racing-engineer LLM training rows.
    Defines the critique (post-lap, retrospective) and guide (pre-lap,
    prescriptive) completions that get drafted per training unit, plus
    the system-prompt template the trainer uses. Consumed by the
    Streamlit LLM-pipeline tab (claude_sdk drafter + human review) and
    by `dataset_builder` when fanning units into chat rows.
  when_to_use:
    - Drafting training-unit completions in the Streamlit LLM-pipeline tab.
    - Briefing a human reviewer on what critique vs guide should sound like.
    - Building the system prompt for `dataset_builder` Step-2 chat rows.
  tags: [training_data, completions, critique, guide]

# =============================================================================
# Training-unit annotation skill — what critique vs guide completions
# must look like.
#
# A training unit is either a parent segment with its children, or a
# lone segment. The Step-2 builder fans each unit into TWO rows (one
# critique, one guide); both reference the same labels_text. The LLM
# learns to switch modes from the System instruction.
# =============================================================================

system_prompt_template: "{mode} user, {labels_text}"

modes:

  critique:
    voice: "retrospective, post-lap engineer"
    audience: "the driver, second person"
    style: >
      - 1–3 sentences, ≤ 60 words total.
      - State what happened in the section, then why it cost time.
      - Reference at least one concrete label (e.g. "the MS in T3", "the
        offset spike on entry") so the model learns to ground its answer
        in the structured context.
      - No fix advice — that's `guide`'s job. Stay descriptive.
    avoid:
      - vague filler ("nice lap", "keep working on it")
      - inventing telemetry numbers the labels don't imply
      - prescriptive language ("you should", "try to") — belongs to guide

  guide:
    voice: "prescriptive, pre-lap or live coach"
    audience: "the driver, second person, imperative mood"
    style: >
      - 1–3 sentences, ≤ 60 words total.
      - One actionable instruction per child label (parent label sets
        the section context). If the unit is isolated, give one
        instruction for the whole unit.
      - Anchor each instruction to the label (e.g. "On the MS in T3,
        release the brake later before turn-in").
      - Present tense, imperative. No reflection on past laps.
    avoid:
      - critique language ("you lost time because…") — belongs to critique
      - generic coaching that ignores the labels

# =============================================================================
# Claude drafting prompt — the literal user message the Streamlit tab
# sends to claude_sdk for each (mode, unit) pair. {labels_text} is the
# rendered label string from `dataset_builder.render_labels_text`.
# =============================================================================

claude_prompt_template: |
  You are drafting a {mode}-mode completion for a racing-engineer LLM
  training dataset. The student model will later be prompted with:

      System:  {mode} user, {labels_text}
      User:    <runtime context>

  and is expected to produce a response in the {mode} voice. Your job is
  to write that response now, using ONLY the labels as context.

  Rules for {mode} mode:
  {mode_style}

  Avoid:
  {mode_avoid}

  Output ONLY the completion text. No preamble, no quotes, no markdown,
  no labels echoed back. Keep it under 60 words.
