    parent: MSP
    children: []
    exclusive_with: ["MSP38"]

  MSP38:
    name: "Shift down too late"
    type: sub
    description: >
      The player's **downshift** occurs at a later index than the
      expert's matching downshift.
    parent: MSP
    children: []
    exclusive_with: ["MSP37"]

  MSP48:
    name: "Gear too low when accelerating"
    type: sub
    description: >
      The player **holds gear** at a lower number than the expert
      across an index range where the speed trace is rising (player
      is in a **lower gear than** the expert during acceleration).
    parent: MSP
    children: []
    exclusive_with: ["MSP49"]

  MSP49:
    name: "Gear too high when accelerating"
    type: sub
    description: >
      The player **holds gear** at a higher number than the expert
      across an index range where the speed trace is rising (player
      is in a **higher gear than** the expert during acceleration).
    parent: MSP
    children: []
    exclusive_with: ["MSP48"]

  # =========================================================================
  # RACING-MISTAKE SUB-LABELS (parent: MSR)
  #
  # These sub-labels capture pass-engagement failures: the player
  # interacted with a close opponent and the interaction itself caused
  # the time loss / position loss. Gate on the same
  # `find_nearest_opponent` attachment used by O / OD, but flipped — a
  # candidate is present AND the outcome went the wrong way.
  # =========================================================================

  MSR1:
    name: "Failed overtake attempt"
    type: sub
    description: >
      Player engaged a close opponent with attacking moves (late
      brake, off-line entry, or sustained outside / inside sweep) but
      did NOT complete the pass and lost time doing so. Gate on
      `find_nearest_opponent`: a close primary candidate is present
      (`min_distance_m` small OR `side_by_side_iloc_count > 0`) AND
      `passed_by_player: false` AND
      `got_passed_by_opponent: false` (the opponent didn't pass the
      player either — the attempt simply failed). Player-trace
      evidence: `time_difference_to_expert` grows across the
      attempt, typical of an optimistic brake / line that didn't
      stick. Distinguished from O by the missing pass flag, and from
      MSP by the close opponent being the cause.
    parent: MSR
    children: []
    exclusive_with: ["MSR2"]

  MSR2:
    name: "Defense broken (got passed)"
    type: sub
    description: >
      Player attempted to hold position but the primary opponent got
      through. Gate on `find_nearest_opponent`: a close primary
      candidate (`min_distance_m` small OR
      `side_by_side_iloc_count > 0`) AND
      `got_passed_by_opponent: true` — signed longitudinal gap flips
      from negative (opp behind at entry) to positive (opp ahead at
      exit). Player-trace evidence: typically an inside-cover or lift
      that didn't hold; `time_difference_to_expert` usually grows
      across the section. Distinguished from OD by the failed-defense
      flag.
    parent: MSR
    children: []
    exclusive_with: ["MSR1"]

  # =========================================================================
  # SUCCESSFUL OVERTAKE SUB-LABELS (parent: O)
  #
  # Each sub-label rests on TWO legs of evidence:
  #   (a) `passed_by_player: true` on the primary opponent returned by
  #       `find_nearest_opponent` (signed-gap sign flips + → −), AND
  #   (b) the player's own trace vs the expert reference (brake /
  #       throttle / trajectory_offset / speed) explains the move.
  # If (a) is missing the section is NOT an O — see MSR1 (failed
  # overtake attempt, close opponent + no pass flag).
  # =========================================================================

  O1:
    name: "Late-brake attack at entry"
    type: sub
    description: >
      Player's brake **initiation onset is later than** the expert's at
      corner entry, with **peak brake pressure higher than** the expert
      across the braking phase — a deliberate over-commit to pull
      alongside before the apex. Trajectory often **moving toward
      negative (tightening)** into the apex as the player aims for the
      inside. Opponent cue (gate): primary opponent
      `entry_signed_long_gap_m > 0` (ahead at entry) AND
      `passed_by_player: true` (behind by exit), with
      `side_by_side_iloc_count > 0` through the braking-to-apex window.
    parent: O
    children: []
    exclusive_with: ["O4"]

  O3:
    name: "Outside-line sweep"
    type: sub
    description: >
      Trajectory offset **wider than expert** across entry-to-apex by a
      sustained margin, **without a continuously growing time delta** —
      going around the outside on purpose. Often paired with an earlier
      throttle pickup on exit as the wider arc allows it. Opponent cue
      (gate): `passed_by_player: true` with the primary opponent
      **alongside on the inside** through the braking-to-apex window —
      `side_by_side_iloc_count > 0` and `query_opponent_trajectory`
      lateral-offset samples show the opponent on the opposite side of
      the player's heading from the player's offset.
    parent: O
    children: []
    exclusive_with: ["O4"]

  O4:
    name: "Switchback"
    type: sub
    description: >
      Player concedes the entry and recovers it on exit — brake
      **initiation onset is earlier than** the expert's, the trajectory
      offset crosses from **wider than expert** at entry to **tighter
      than expert** at exit, and throttle **application onset is
      earlier than** the expert's around the corner exit. Time delta
      typically shows **gap shrinks** late in the section. Opponent
      cue (gate): primary opponent was **ahead into the corner**
      (`entry_signed_long_gap_m > 0`) and **behind by exit**
      (`exit_signed_long_gap_m < 0`), i.e. `passed_by_player: true`,
      with `query_opponent_trajectory` lateral-offset samples crossing
      zero around apex (line cross).
    parent: O
    children: []
    exclusive_with: ["O1", "O3"]

  O5:
    name: "Slipstream gain on straight"
    type: sub
    description: >
      On a straight section: speed delta shows **player faster than
      expert** while the player's throttle stays **at or below** the
      expert's level — the speed gain is from draft, not extra input.
      Time delta shows **gap shrinks** across the straight. Opponent
      cue (gate): primary opponent **directly ahead in draft range** —
      `entry_signed_long_gap_m` positive and small (typically < ~30 m),
      `min_lateral_offset_m` small (in-line, not side-by-side yet),
      `passed_by_player: true`, and `query_opponent_trajectory` shows
      the signed longitudinal gap **shrinking monotonically** across
      the straight.
    parent: O
    children: []
    exclusive_with: []

  # =========================================================================
  # SUCCESSFUL DEFENSE SUB-LABELS (parent: OD)
  #
  # Each sub-label requires:
  #   (a) a close primary opponent (`side_by_side_iloc_count > 0` OR
  #       `min_distance_m` ≤ ~10 m) AND
  #   (b) `got_passed_by_opponent: false` (the defense held) AND
  #   (c) the player's own trace explains the defensive choice (brake
  #       earlier, hold inside, lift on straight, …).
  # If (a) is missing the section is not OD. If (b) flips true the
  # defense failed — see MSR2 (defense broken).
  # =========================================================================

  OD1:
    name: "Inside cover (early-brake defense)"
    type: sub
    description: >
      Player's brake **initiation onset is earlier than** the expert's
      AND/OR trajectory offset held **tighter than expert** across
      entry-to-apex by a sustained margin — closing the inside line.
      Distinguished from MSP by the **absence of a continuously growing
      time gap** — the inside line is a tactical choice, not a slow
      mistake. Opponent cue (gate): primary opponent
      **close-trailing or alongside on the outside** —
      `side_by_side_iloc_count > 0`, small `min_distance_m`,
      `got_passed_by_opponent: false`, and the
      `query_opponent_trajectory` samples show the opponent's signed
      longitudinal gap staying negative (or briefly crossing then
      returning behind by exit).
    parent: OD
    children: []
    exclusive_with: []

  OD2:
    name: "Defensive lift on straight"
    type: sub
    description: >
      On a straight section: player's throttle drops **below expert**
      with NO matching brake onset (outside any braking zone), causing
      a brief speed dip not explained by track geometry — a lift to
      manage position or check the mirrors. Time delta typically shows
      **gap grows** briefly during the lift. Opponent cue (gate):
      primary opponent **close behind** —
      `entry_signed_long_gap_m < 0`, small `min_distance_m`,
      `got_passed_by_opponent: false`, and
      `query_opponent_trajectory` shows the gap closing during the
      lift (signed-gap magnitude shrinks) without flipping past the
      player.
    parent: OD
    children: []
    exclusive_with: []

