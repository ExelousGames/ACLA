_skill:
  name: sub_label_catalog
  description: >
    Rich metadata for every annotation label (main, sub, segment_type,
    circuit, circuit_section). Per-label description, hierarchy
    (parent/children), exclusive_with constraints, annotation_guideline,
    and normalized_position_range for circuit sections. Descriptions
    contain inline VLM predicates so embedding-similarity over
    observation text shortlists the matching labels.
  when_to_use:
    - Drilling into a parent-labelled section to pick sub-labels (detailed flow).
    - Embedding-similarity shortlist of candidate labels from VLM observations.
    - Validating label hierarchy (parent presence, mutual exclusion).
    - Looking up a circuit_section by normalized lap position.
  tags: [labels, taxonomy, hierarchy, telemetry, circuit_sections, embedding]

# =============================================================================
# Label Catalog — racing telemetry annotation knowledge base
#
# Every label used by the annotation pipeline is defined here with:
# name — human-readable display name
# type — main | sub | segment_type | circuit | circuit_section
# description — what the label means.  Canonical predicates that
# the VLM should produce on the graphs are
# embedded inline as **predicate** so they are
# visually obvious AND so the embedding-similarity
# filter in label_verifier (which sees the
# description verbatim) still hits the correct
# label when those predicates appear in the VLM's
# prose.  Predicates only carry the verb / comparison
# fragment — subject ("the player") and object
# ("the expert") are supplied by the surrounding
# prose.  Racing / visualization jargon used in
# predicates is defined in the per-graph `glossary`
# maps in skills/graph_analysis_skill.yaml.
# annotation_guideline  — (optional) step-by-step instructions for
# identifying this label
# parent — parent label ID (null for top-level)
# children — list of child label IDs
# exclusive_with — labels that cannot coexist with this one
# normalized_position_range — (circuit_section only) [start, end] fractions
# in [0.0, 1.0] of lap position, matched against the
# Graphics_normalized_car_position column. A section
# that crosses the start/finish line wraps — encode as
# start > end (e.g. [0.95, 0.05] = last 5% + first 5%).
# Leave as [null, null] until measured; the
# locate_circuit_section tool ignores unfilled ranges.
#
# This file is loaded once by LabelCatalog (label_catalog.py).
# LABEL_MAPPING / LABEL_CATEGORIES in segment_models.py remain the
# source-of-truth for IDs and names; this YAML enriches them.
#
# Annotation-flow split — read this before editing main-label entries:
#   - The `annotation_guideline` text on EACH main-label entry below
#     ("How to identify the sublabels for ...") is for the **detailed
#     annotation flow** — given a section already labelled as that main
#     label, how to drill in and pick the matching sub-labels.
#   - The **lap-to-segment flow**'s "does this section qualify as MSP at
#     all?" guidance lives in `main_label_skill.yaml` under each main
#     label's `characteristics` block. Do NOT duplicate that here.
#   - Sub-label entries (parent: MSP / RM / ...) carry per-label
#     `description` strings used by both flows.
# =============================================================================

labels:

  # =========================================================================
  # MAIN LABELS
  # =========================================================================

  "O":
    name: "Successful Overtake"
    type: main
    description: >
      Player gained a position on a specific opponent inside the
      section. Required gate: the primary opponent returned by
      `find_nearest_opponent` must show `passed_by_player: true` —
      signed longitudinal gap goes from **positive at entry** (opp
      ahead in player's heading) to **negative at exit** (opp behind).
      A close opponent with an attempted but uncompleted pass is
      `MSR1` (failed overtake attempt), not O. Defensive holds are
      OD; failed defenses are `MSR2`.
    annotation_guideline: >
      How to identify the sublabels for Successful Overtake:
      Step 1 — Confirm the pass. Call `find_nearest_opponent(start,
      end)`. The primary candidate MUST have
      `passed_by_player: true`. If no candidate has that flag, do NOT
      propose any O sub-label — the section is either OD (held
      against a close opponent), `MSR1` (close opponent + failed
      attack, `passed_by_player: false`), `MSR2` (close opponent +
      `got_passed_by_opponent: true`), or no-O. Quote `slot`, `entry_signed_long_gap_m`,
      `exit_signed_long_gap_m`, `min_distance_m`,
      `min_lateral_offset_m`, and `side_by_side_iloc_count` in reasoning.
      Step 2 — Pick the technique sub-label by where the pass
      happened and how the player's own trace diverges from the
      expert:
        - O1 (late-brake attack at corner entry): player's brake
          initiation later than expert + tightening trajectory.
        - O3 (outside-line sweep through a corner): trajectory wider
          than expert through entry-to-apex.
        - O4 (switchback): offset crosses outside-at-entry to
          inside-at-exit, earlier throttle on exit.
        - O5 (slipstream on a straight): speed > expert with throttle
          ≤ expert; gap closed smoothly. Confirm with
          `query_opponent_trajectory(start, end, slot, n_samples)`.
    parent: null
    children: ["O1", "O3", "O4", "O5"]
    exclusive_with: ["OD", "MD", "PS"]

  "OD":
    name: "Successful Defense"
    type: main
    description: >
      Player held position against a real, close opponent inside the
      section. Required gate: the primary opponent returned by
      `find_nearest_opponent` must be close
      (`side_by_side_iloc_count > 0` or `min_distance_m` ≤ ~10 m) AND
      `got_passed_by_opponent: false`. No close opponent ⇒ this is
      not OD (a slow trace alone is MSP / EA). A player who DID lose
      the position is `MSR2` (defense broken), not OD.
    annotation_guideline: >
      How to identify the sublabels for Successful Defense:
      Step 1 — Confirm the defense. Call `find_nearest_opponent(start,
      end)`. Require a primary candidate with
      `got_passed_by_opponent: false` AND a close engagement
      (`side_by_side_iloc_count > 0` OR `min_distance_m` ≤ ~10 m). If
      no close candidate, the section is not OD. Quote the same
      attachment fields as for O in reasoning.
      Step 2 — Pick the technique sub-label by where the defense
      happened:
        - OD1 (inside cover at corner entry): player's brake
          initiation earlier than expert and/or trajectory tighter
          than expert through entry-to-apex; opponent close on the
          outside / behind.
        - OD2 (defensive lift on a straight): player's throttle drops
          below expert with no matching brake; opponent close behind,
          gap shrinks during the lift without flipping past the
          player. Confirm with `query_opponent_trajectory`.
    parent: null
    children: ["OD1", "OD2"]
    exclusive_with: ["O", "MD", "PS"]

  "MD":
    name: "Missing data"
    type: main
    description: >
      Segment contains gaps, dropouts, or corrupted telemetry — sensor data
      drops to zero, flat-lines in an otherwise dynamic signal, or shows
      physically impossible values.
    annotation_guideline: >
      How to identify the Missing Data label:
      This segment contains gaps or corrupted telemetry.  Identify if
      the sensor data drops to zero or becomes inconsistent unexpectedly.
    parent: null
    children: []
    exclusive_with: ["O", "OD", "EA", "PS", "RM", "MSP", "MSR"]

  EA:
    name: "Expert Adherence"
    type: main
    description: >
      Driver closely follows the expert's line and speed profile.  Look
      for **overall gap holds stable** in the time delta and **speed
      match** in the speed delta.  The player's **entry trajectory**
      and **exit trajectory** track the expert through entry, apex,
      and exit, with the trajectory offset **aligned** (within ±0.5 m
      of zero) across every beat.
    annotation_guideline: >
      How to identify the sublabels for Expert Adherence:
      The driver is following the optimal racing line and speed profile
      closely.  Nothing needs to be labeled right now.
    parent: null
    children: []
    exclusive_with: ["MSP", "MSR", "RM", "PS"]

  "PS":
    name: "Pit Stop"
    type: main
    description: >
      Driver entering, in, or exiting the pit lane.  Look for dramatic speed
      reduction, trajectory deviation into the pit lane, and constant low
      speed under pit limiter.
    annotation_guideline: >
      How to identify the sublabels for Pit Stop:
      The driver is entering, waiting in, or exiting the pit lane.
      Look for significant speed reduction and distinct trajectory
      deviation into the pit area.
    parent: null
    children: []
    exclusive_with: ["O", "MD"]

  RM:
    name: "Recovery & Merge"
    type: main
    description: >
      Driver recovering from an incident and merging back to the racing
      line. Time delta shows **gap shrinks** and the trajectory offset 
      shows **recovery**.
    annotation_guideline: >
      How to identify sublabels for Recovery & Merge:
      The driver is recovering from a mistake.
      Step 1: Analyze the 'Time Difference to Expert' graph; a recovery normally
      causes this time gap to decrease continuously without increasing.
      Step 2: Examine the 'trajectory_offset' graph to identify recovery — look for the
      offset trending back toward zero from either side.
      Step 3: Examine the 'speed_delta' graph to identify if the player is accelerating
      back toward the expert's speed profile.
      Step 4: use the 'compute_expert_phases' tool (it produces a 'phase_indices' attachment
      contains the indices for entry/apex/exit).
    parent: null
    children: ["RM1", "RM2", "RM5", "RM6", "RM7", "RM8", "RM9", "RM10", "RM11"]
    exclusive_with: ["EA", "PS"]

  MSP:
    name: "Mistake (Practice)"
    type: main
    description: >
      Technical driving error causing time loss or vehicle instability,
      NOT caused by interaction with a close opponent. Time delta
      shows **gap grows** and the trajectory offset shows a clear
      deviation from the expert's line (offset **wider than expert**
      or **tighter than expert**). When `find_nearest_opponent`
      returns a close primary opponent AND the time loss is tied to
      that interaction, the section is MSR (racing mistake), not MSP.
    annotation_guideline: >
      How to identify sublabels for Practice Mistake:
      The driver has committed a technical driving error.
      Step 1: Analyze the 'Time Difference to Expert' graph; a mistake
      normally causes this time gap to increase continuously without
      decreasing shortly after.
      Step 2: Examine the differences in 'throttle' between the player
      and the expert to identify when the driver applied too much or too
      little throttle, or got on/off the throttle at the wrong time.
      Step 3: Examine the differences in 'brake' between the player
      and the expert to identify if the driver braked too hard or too
      softly, or got on/off the brake at the wrong time.
      Step 4: Examine the 'trajectory_balance' graph to find understeer
      (blue / front-slip dominant) or oversteer (red / rear-slip
      dominant), which could lead to lower speed.
      Step 5: For entry/apex/exit shape questions, request the
      'trajectory_offset' graph and include the 'compute_expert_phases'
      tool on the same step (it produces a 'phase_indices' attachment
      contains the phase indices for entry/apex/exit).
      Step 6: Before committing, call `find_nearest_opponent(start,
      end)` — if a close primary opponent is present, the section is
      likely MSR, not MSP.
    parent: null
    children:
      - "MSP1"
      - "MSP2"
      - "MSP3"
      - "MSP4"
      - "MSP5"
      - "MSP6"
      - "MSP7"
      - "MSP8"
      - "MSP9"
      - "MSP10"
      - "MSP11"
      - "MSP13"
      - "MSP14"
      - "MSP15"
      - "MSP16"
      - "MSP17"
      - "MSP18"
      - "MSP19"
      - "MSP20"
      - "MSP21"
      - "MSP22"
      - "MSP23"
      - "MSP24"
      - "MSP25"
      - "MSP26"
      - "MSP27"
      - "MSP28"
      - "MSP29"
      - "MSP30"
      - "MSP31"
      - "MSP32"
      - "MSP33"
      - "MSP34"
      - "MSP35"
      - "MSP36"
      - "MSP37"
      - "MSP38"
      - "MSP41"
      - "MSP42"
      - "MSP43"
      - "MSP44"
      - "MSP45"
      - "MSP46"
      - "MSP47"
      - "MSP48"
      - "MSP49"
      - "MSP50"
      - "MSP51"
      - "MSP52"
    exclusive_with: ["EA", "PS", "MSR"]

  MSR:
    name: "Mistake (Racing)"
    type: main
    description: >
      Time / position loss caused by an interaction with a close
      opponent. Required gate: `find_nearest_opponent` returns a
      primary candidate that is close (`min_distance_m` small OR
      `side_by_side_iloc_count > 0`) AND the interaction outcome is
      adverse (failed pass attempt OR got passed). If no close
      opponent is present, the section is MSP (technical practice
      mistake) — not MSR.
    annotation_guideline: >
      How to identify sublabels for Racing Mistake:
      Step 1 — Confirm a close opponent. Call
      `find_nearest_opponent(start, end)`. Require a primary candidate
      with `min_distance_m` small OR `side_by_side_iloc_count > 0`.
      If no close candidate, the section is not MSR — re-score as
      MSP (or EA / RM as appropriate).
      Step 2 — Pick the sub-label by outcome flag:
        - MSR1 (failed overtake attempt): `passed_by_player: false`
          AND `got_passed_by_opponent: false` — the attack didn't
          stick and the opponent didn't pass either.
        - MSR2 (defense broken): `got_passed_by_opponent: true` —
          signed longitudinal gap flips negative → positive.
      Step 3 — Cross-check the player trace. MSR1 typically pairs with
      a late-brake / off-line attempt that didn't complete; MSR2
      pairs with an attempted cover / lift that didn't hold.
    parent: null
    children: ["MSR1", "MSR2"]
    exclusive_with: ["EA", "PS", "MSP"]

  brands_hatch:
    name: "Brands Hatch"
    type: circuit
    description: "Segment on the Brands Hatch circuit."
    annotation_guideline: >
      Call `locate_circuit_section(start, end)` to identify which named
      Brands Hatch section the segment overlaps — never guess from
      trajectory shape.  Use its `best_match` (and any `top_matches`
      with high `overlap_fraction`) as the circuit_section label.
      Also identify the shape of the segment using labels ST1–ST6.
    parent: null
    children:
      - "brands_hatch1"
      - "brands_hatch2"
      - "brands_hatch3"
      - "brands_hatch4"
      - "brands_hatch5"
      - "brands_hatch6"
      - "brands_hatch7"
      - "brands_hatch9"
      - "brands_hatch10"
      - "brands_hatch11"
      - "brands_hatch12"
      - "brands_hatch13"
      - "brands_hatch14"
      - "brands_hatch15"
      - "brands_hatch16"
      - "brands_hatch17"
      - "brands_hatch18"
      - "brands_hatch19"
    exclusive_with: ["silverstone"]

  silverstone:
    name: "Silverstone"
    type: circuit
    description: "Segment on the Silverstone circuit."
    annotation_guideline: >
      Call `locate_circuit_section(start, end)` to identify which named
      Silverstone section the segment overlaps — never guess from
      trajectory shape.  Use its `best_match` (and any `top_matches`
      with high `overlap_fraction`) as the circuit_section label.
      Also identify the shape of the segment using labels ST1–ST6.
    parent: null
    children:
      - "silverstone1"
      - "silverstone2"
      - "silverstone3"
      - "silverstone4"
      - "silverstone5"
      - "silverstone6"
      - "silverstone7"
      - "silverstone8"
      - "silverstone9"
      - "silverstone10"
      - "silverstone11"
      - "silverstone12"
      - "silverstone13"
      - "silverstone14"
      - "silverstone15"
      - "silverstone16"
      - "silverstone17"
      - "silverstone18"
      - "silverstone19"
      - "silverstone20"
      - "silverstone21"
    exclusive_with: ["brands_hatch"]

  # =========================================================================
  # RECOVERY & MERGE SUB-LABELS
  # =========================================================================

  RM1:
    name: "Recover from off-track"
    type: sub
    description: >
      Driver returning to track after an off-track excursion — the
      trajectory offset peaks far **wider than expert** earlier in the
      segment (a prior **moving toward positive (widening)** beat),
      then shows **recovery** (offset trending back toward zero) while
      the time delta shows **gap shrinks** and the speed delta shows
      **player faster than** expert as the driver rejoins.
    parent: RM
    children: []
    exclusive_with: ["RM2"]

  RM2:
    name: "Exit pit lane"
    type: sub
    description: >
      Driver re-joining the track after a pit stop — the speed trace
      rises from pit-limiter speed (an **acceleration onset** well
      below normal corner-exit speed) and the trajectory offset shows
      **recovery** back toward zero as the line rejoins the racing
      line.
    parent: RM
    children: []
    exclusive_with: ["RM1"]

  RM5:
    name: "Recover from speed gap over 20"
    type: sub
    description: >
      Player more than 20 km/h slower than the expert with the gap
      closing — the speed delta shows **expert faster than player**
      with a **large gap section** (|Δ| > 20 km/h) that trends toward
      zero across the segment, alongside **gap shrinks** in the time
      delta.
    parent: RM
    children: []
    exclusive_with: ["RM6"]

  RM6:
    name: "Recover from small speed gap under 20"
    type: sub
    description: >
      Player less than 20 km/h slower than the expert with the gap
      closing — the speed delta shows **expert faster than player**
      without any **large gap section** (|Δ| stays ≤ 20 km/h),
      alongside **gap shrinks** in the time delta.
    parent: RM
    children: []
    exclusive_with: ["RM5"]

  RM7:
    name: "Merge back to expert line"
    type: sub
    description: >
      Player trajectory converging toward the expert line — the
      trajectory offset shows **recovery** (trending back toward zero
      from either side), typically across the **post-exit** span of a
      corner phase.
    parent: RM
    children: []
    exclusive_with: []

  RM8:
    name: "Accelerate earlier at exit"
    type: sub
    description: >
      During recovery, the player's throttle **application onset is
      earlier than** the expert's around **at expert's exit (idx N,
      phase k)**, with a matching earlier **acceleration onset** on
      the speed trace, alongside **gap shrinks** in the time delta.
    parent: RM
    children: []
    exclusive_with: ["RM9"]

  RM9:
    name: "Accelerate later at exit"
    type: sub
    description: >
      During recovery, the player's throttle **application onset is
      later than** the expert's around **at expert's exit (idx N,
      phase k)**, with a matching later **acceleration onset** on the
      speed trace, alongside **gap shrinks** in the time delta.
    parent: RM
    children: []
    exclusive_with: ["RM8"]

  RM10:
    name: "Brake earlier at entry"
    type: sub
    description: >
      During recovery, the player's brake **initiation onset is earlier
      than** the expert's around **at expert's entry (idx N, phase k)**,
      with a matching earlier **deceleration onset** on the speed
      trace, alongside **gap shrinks** in the time delta.
    parent: RM
    children: []
    exclusive_with: ["RM11"]

  RM11:
    name: "Brake later at entry"
    type: sub
    description: >
      During recovery, the player's brake **initiation onset is later
      than** the expert's around **at expert's entry (idx N, phase k)**,
      with a matching later **deceleration onset** on the speed trace,
      alongside **gap shrinks** in the time delta.
    parent: RM
    children: []
    exclusive_with: ["RM10"]

  # =========================================================================
  # MISTAKE SUB-LABELS — Braking
  # =========================================================================

  MSP1:
    name: "Initiate brake too late"
    type: sub
    description: >
      The player's brake **initiation onset is later than** the
      expert's at corner entry, alongside the time **gap grows**.
      Player often **moving toward positive (widening)** in the
      trajectory offset across the **entry-to-apex** span as they
      brake later, with the **entry trajectory bulges outside** the
      expert's line.
    parent: MSP
    children: []
    exclusive_with: ["MSP5"]

  MSP5:
    name: "Initiate brake too early"
    type: sub
    description: >
      The player's brake **initiation onset is earlier than** the
      expert's at corner entry, alongside the time **gap grows**
    parent: MSP
    children: []
    exclusive_with: ["MSP1"]

  MSP13:
    name: "Highest brake pressure too low"
    type: sub
    description: >
      The player's **peak brake pressure is lower than** the expert's
      across the braking phase. Player often **moving toward positive 
      (widening)** in the trajectory offset.
    parent: MSP
    children: []
    exclusive_with: ["MSP22"]

  MSP22:
    name: "Highest brake pressure too high"
    type: sub
    description: >
      The player's **peak brake pressure is higher than** the expert's
      across the braking phase. Player often **moving toward positive 
      (widening)** in the trajectory offset.
    parent: MSP
    children: []
    exclusive_with: ["MSP13"]

  MSP14:
    name: "Brake applied too quickly"
    type: sub
    description: >
      The player's **brake initiation is more abrupt than** the
      expert's — the rise from zero to peak spans fewer indices.
      Player often **moving toward positive (widening)** in the
      trajectory offset.  An **oversteer** section (as a **primary
      slide** or **standalone event**) may co-occur on the slip
      balance.
    parent: MSP
    children: []
    exclusive_with: ["MSP24"]

  MSP24:
    name: "Brake applied too slowly"
    type: sub
    description: >
      The player's **brake initiation is more gradual than** the
      expert's — the rise from zero to peak spans more indices.
      Player often **moving toward positive (widening)** in the 
      trajectory offset.
    parent: MSP
    children: []
    exclusive_with: ["MSP14"]

  MSP17:
    name: "Release brake too quickly"
    type: sub
    description: >
      The player's **brake release** is an **abrupt drop** to zero —
      the drop from peak to zero spans fewer indices than the expert's
      (a non-trail-braking release).  Player often **moving toward
      positive (widening)** in the trajectory offset across the exit
      phase as they release earlier, with the **exit trajectory bulges
      outside** the expert's line.
    parent: MSP
    children: []
    exclusive_with: ["MSP18"]

  MSP18:
    name: "Release brake too slowly"
    type: sub
    description: >
      The player's **brake release** is more gradual than the
      expert's — the drop from peak to zero spans more indices,
      consistent with **trail braking**.
    parent: MSP
    children: []
    exclusive_with: ["MSP17"]

  MSP27:
    name: "Initiate brake release too late"
    type: sub
    description: >
      The player's brake has later **release onset** than the expert's
      around **Reach apex**.
    parent: MSP
    children: []
    exclusive_with: ["MSP28"]

  MSP28:
    name: "Initiate brake release too early"
    type: sub
    description: >
      The player's brake has earlier **release onset** than the expert's
      during **Reach apex**.
    parent: MSP
    children: []
    exclusive_with: ["MSP27"]

  MSP31:
    name: "Highest brake length too short"
    type: sub
    description: >
      The player's interval between **brake initiation** end and
      **release onset** spans fewer indices than the expert's —
      **peak brake pressure** is held for a shorter span.
    parent: MSP
    children: []
    exclusive_with: ["MSP32"]

  MSP32:
    name: "Highest brake length too long"
    type: sub
    description: >
      The player's interval between **brake initiation** end and
      **release onset** spans more indices than the expert's —
      **peak brake pressure** is held for a longer span.
    parent: MSP
    children: []
    exclusive_with: ["MSP31"]

  MSP34:
    name: "Throttle and brake applied at the same time for too long"
    type: sub
    description: >
      The player **applies throttle and brake simultaneously** across
      a span where the expert shows no overlap.
    parent: MSP
    children: []
    exclusive_with: []

  # =========================================================================
  # MISTAKE SUB-LABELS — Throttle
  # =========================================================================

  MSP15:
    name: "Throttle applied too quickly"
    type: sub
    description: >
      The player's **throttle application** is more abrupt than the
      expert's — the rise from zero to peak spans fewer indices, often
      co-occurring with **oversteer** or **understeer** in the slip
      balance, and a **modulation dip** shortly after in the same
      **throttle application**.
    parent: MSP
    children: []
    exclusive_with: ["MSP25"]

  MSP25:
    name: "Throttle applied too slowly"
    type: sub
    description: >
      The player's **throttle application** is more gradual than the
      expert's — the rise from zero to peak spans more indices, often
      co-occurring with **gap grows** in the time delta.
    parent: MSP
    children: []
    exclusive_with: ["MSP15"]

  MSP19:
    name: "Highest throttle pressure too low"
    type: sub
    description: >
      The player's **peak throttle** is lower than the expert's across
      the **throttle application** phase for more than 3 indices.
    parent: MSP
    children: []
    exclusive_with: ["MSP26"]

  MSP26:
    name: "Highest throttle pressure too high"
    type: sub
    description: >
      The player's **peak throttle** is higher than the expert's
      across the **throttle application** phase, often co-occurring
      with **oversteer** or **understeer** in the slip balance, and a
      **modulation dip** shortly after in the same **throttle
      application**.
    parent: MSP
    children: []
    exclusive_with: ["MSP19"]

  MSP20:
    name: "Initiate throttle too early"
    type: sub
    description: >
      The player's throttle **application onset** is earlier than the
      expert's at corner exit.
    parent: MSP
    children: []
    exclusive_with: ["MSP21"]

  MSP21:
    name: "Initiate throttle too late"
    type: sub
    description: >
      The player's throttle **application onset** is later than the
      expert's at corner exit.
    parent: MSP
    children: []
    exclusive_with: ["MSP20"]

  MSP23:
    name: "Release throttle too quickly"
    type: sub
    description: >
      The player's **throttle release** is more abrupt than the
      expert's — the drop from peak to zero spans fewer indices.
    parent: MSP
    children: []
    exclusive_with: []

  MSP29:
    name: "Initiate throttle release too late"
    type: sub
    description: >
      The player's throttle **release onset** is later than the
      expert's approaching corner entry.
    parent: MSP
    children: []
    exclusive_with: ["MSP30"]

  MSP30:
    name: "Initiate throttle release too early"
    type: sub
    description: >
      The player's throttle **release onset** is earlier than the
      expert's approaching corner entry.
    parent: MSP
    children: []
    exclusive_with: ["MSP29"]

  # =========================================================================
  # MISTAKE SUB-LABELS — Turn-in / Apex / Exit timing
  # =========================================================================

  MSP2:
    name: "Initiate the turn too late"
    type: sub
    description: >
      The player **initiates the turn later than** the expert's entry
      index, and the player's **entry trajectory bulges outside** the
      expert's line (offset is **wider than expert**) between entry
      and apex.
    parent: MSP
    children: []
    exclusive_with: ["MSP6"]

  MSP6:
    name: "Initiate the turn too early"
    type: sub
    description: >
      The player **initiates the turn earlier than** the expert's
      entry index, and the player's **entry trajectory cuts inside**
      the expert's line (offset is **tighter than expert**) between
      entry and apex.
    parent: MSP
    children: []
    exclusive_with: ["MSP2"]

  MSP3:
    name: "Too late compared to expert Apex"
    type: sub
    description: >
      The player **reaches apex later than** the expert's apex index.
    parent: MSP
    children: []
    exclusive_with: ["MSP7"]

  MSP7:
    name: "Too early compared to expert Apex"
    type: sub
    description: >
      The player **reaches apex earlier than** the expert's apex index.
