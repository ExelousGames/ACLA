# =============================================================================
# Vocabulary — pipeline-wide phrase -> definition lookup
#
# Every prompt assembled in the annotation pipeline (step_describer,
# planner, proposal_synthesizer, ...) is scanned against this dict.
# Phrases found in the prompt body get their definitions injected as a
# Glossary block at the top of the prompt.  A phrase that has no entry
# here passes through unannotated (definitions are optional polish, not
# load-bearing).
#
# Maintenance rules:
#   * Keys are PREDICATES only — verb / verb-phrase / comparative
#     fragments without their subject ("player") or comparison object
#     ("expert").  Subjects and objects are supplied by the prose in
#     graph_analysis_skill.vocabulary_to_use, how_to_analyze, and
#     label_catalog descriptions where the predicate is consumed.
#     Example: "begins braking earlier than" (predicate); the surrounding
#     prose adds the subject ("the player") and object ("the expert").
#   * Keys are lowercase, no trailing punctuation.  Lookup is case-insensitive.
#   * One canonical wording per concept.  Direction-paired predicates live as
#     two separate entries (e.g. "earlier than" + "later than" appear as
#     distinct predicates with their action verb attached).
#   * Definitions teach the VLM/LLM what the predicate means and what to
#     report alongside it (numerical values, indices, etc.).  They are NOT
#     prescriptive on sentence structure -- that lives in each graph's
#     sentence_format_guide.
#   * The audit script in plans/redo-the-skills-yaml-effervescent-muffin.md
#     enforces alignment with graph_analysis_skill.vocabulary_to_use and
#     label_catalog **phrase** highlights.
# =============================================================================

vocabulary:

  # ---------- Throttle ----------
  "begins applying throttle earlier than": >
    The player's throttle-application onset (the index where the throttle
    trace first rises above ~0.05) is to the left of the expert's.
    Report both indices and the gap.
  "begins applying throttle later than": >
    The player's throttle-application onset is to the right of the
    expert's.  Report both indices and the gap.
  "applies throttle more sharply than": >
    The player ramps throttle from zero to its held value in fewer
    indices than the expert;
  "applies throttle more gradually than": >
    The player ramps throttle from zero to its held value in more
    indices than the expert; the rising edge is shallower.
  "peak throttle is lower than": >
    The maximum y-value the player's throttle trace reaches is below
    the expert's.  Report both values and the difference.
  "peak throttle is higher than": >
    The maximum y-value the player's throttle trace reaches is above
    the expert's.  Report both values and the difference.
  "begins releasing throttle earlier than": >
    The player's throttle-release onset (where the trace begins falling
    from its held value) is to the left of the expert's.
  "begins releasing throttle later than": >
    The player's throttle-release onset is to the right of the expert's.
  "releases throttle more abruptly than": >
    The player drops throttle to zero in fewer indices than the expert;
    the falling edge is steeper.
  "releases throttle more gradually than": >
    The player drops throttle to zero in more indices than the expert;
    the falling edge is shallower.

  # ---------- Brake ----------
  "begins braking earlier than": >
    The player's brake-initiation index is to the left of the expert's
    (occurs at a lower segment index).  Report both indices and the gap.
  "begins braking later than": >
    The player's brake-initiation index is to the right of the expert's
    (occurs at a higher segment index).  Report both indices and the gap.
  "applies brake more sharply than": >
    The player ramps from zero to peak brake pressure in fewer indices
    than the expert; the rising edge of the trace is steeper.
  "applies brake more gradually than": >
    The player ramps from zero to peak brake pressure in more indices
    than the expert; the rising edge is shallower.
  "peak brake pressure is lower than": >
    The maximum y-value the player's brake trace reaches is below the
    expert's maximum.  Report both values and the difference.
  "peak brake pressure is higher than": >
    The maximum y-value the player's brake trace reaches is above the
    expert's maximum.  Report both values and the difference.
  "begins releasing brake earlier than": >
    The player's brake-release onset (where the trace begins falling
    from its peak) is to the left of the expert's.
  "begins releasing brake later than": >
    The player's brake-release onset is to the right of the expert's.
  "releases brake more abruptly than": >
    The player drops brake pressure to zero in fewer indices than the
    expert; trail braking is absent or much shorter.
  "releases brake more gradually than": >
    The player drops brake pressure to zero in more indices than the
    expert; trail braking is present or longer.
  "trail braking": >
    A phase where brake pressure decreases gradually rather than
    releasing abruptly to zero.  Used to maintain front-axle load
    through corner entry.  Report whether each trace exhibits it and
    over which index range.
  "braking duration longer than": >
    The number of indices from brake initiation to full release is
    larger for the player than for the expert.
  "braking duration shorter than": >
    The number of indices from brake initiation to full release is
    smaller for the player than for the expert.
  "applies throttle and brake simultaneously": >
    An index range where both the brake trace and throttle trace are
    above zero at the same time.  Report start, end, approximate values,
    and whether the expert shows the same overlap.

  # ---------- Time delta ----------
  "gap to expert grows": >
    The time-delta line is rising — the player is losing time to the
    expert across this section.  Report start index, end index, and ms.
  "gap to expert shrinks": >
    The time-delta line is falling — the player is gaining time on the
    expert across this section.  Report start index, end index, and ms.
  "gap to expert is stable": >
    The time-delta line is flat — the player matches the expert's pace
    across this section.  Report start index, end index, and the value.
  "loses time to": >
    Synonym for "gap to expert grows".  The cumulative delta moves
    upward (positive direction) over a stretch of indices — subject
    (the player) loses time to object (the expert).
  "gains time on": >
    Synonym for "gap to expert shrinks".  The cumulative delta moves
    downward over a stretch of indices — subject (the player) gains
    time on object (the expert).

  # ---------- Speed delta ----------
  "expert faster than player": >
    Section on the speed-delta graph where the line sits above zero
    (positive y = expert faster).  Report indices and magnitude in km/h.
  "player faster than expert": >
    Section on the speed-delta graph where the line sits below zero
    (negative y = player faster).  Report indices and magnitude in km/h.
  "speed match": >
    Section on the speed-delta graph where the absolute difference
    stays within ±5 km/h — player matches the expert's speed.
  "large gap section": >
    Section on the speed-delta graph where the absolute difference
    exceeds 20 km/h.  Report start index, end index, peak magnitude,
    and direction (expert faster or player faster).
  "zero crossing": >
    Index where the speed-delta line crosses zero.  Report whether the
    crossing is from "expert faster" to "player faster" or vice versa.

  # ---------- Speed (player vs expert traces) ----------
  "entry speed is lower than": >
    The player's speed at the start of the segment (or just before the
    deceleration phase) is below the expert's.  Report both km/h values.
  "entry speed is higher than": >
    The player's speed at the start of the segment is above the
    expert's.  Report both km/h values.
  "minimum speed is lower than": >
    The lowest y-value the player's speed trace reaches is below the
    expert's minimum.  Report both km/h values and the indices.
  "minimum speed is higher than": >
    The lowest y-value the player's speed trace reaches is above the
    expert's minimum.  Report both km/h values and the indices.
  "reaches minimum speed earlier than": >
    The index where the player's speed bottoms out is to the left of
    the expert's.  Report the index gap.
  "reaches minimum speed later than": >
    The index where the player's speed bottoms out is to the right of
    the expert's.
  "exit speed is lower than": >
    The player's speed at the end of the segment (after the
    acceleration phase) is below the expert's.  Report both km/h values.
  "exit speed is higher than": >
    The player's speed at the end of the segment is above the expert's.
  "begins decelerating earlier than": >
    The index where the player's speed begins falling is to the left
    of the expert's deceleration onset.
  "begins decelerating later than": >
    The index where the player's speed begins falling is to the right
    of the expert's deceleration onset.
  "begins accelerating earlier than": >
    The index where the player's speed begins rising again is to the
    left of the expert's acceleration onset.
  "begins accelerating later than": >
    The index where the player's speed begins rising again is to the
    right of the expert's acceleration onset.

  # ---------- Push / limit ----------
  "over-limit spike": >
    A push_limit excursion above 1.0.  Report start index (where the
    trace crosses 1.0), peak index, peak value, return index (where it
    falls back to 1.0), and duration above 1.0.
  "sustained over-limit": >
    A section where the push_limit trace stays above 1.0 for many
    indices.  Phrase as "tire is sustained over its peak grip across
    indices N–M".  Report the index range and the peak value.
  "sustained low": >
    A section where the push_limit trace stays well below 1.0 — the
    driver is well within grip limits.  Report the index range and the
    approximate value held.
  "tire is sustained over its peak grip": >
    Long-form phrasing for sustained over-limit.  Reserve for sections
    that span many indices, not single-index spikes.  Report the index
    range.

  # ---------- Gear ----------
  "upshifts earlier than": >
    The index of the player's upshift (gear N to N+1) is to the left
    of the expert's matching upshift.
  "upshifts later than": >
    The index of the player's upshift is to the right of the expert's.
  "downshifts earlier than": >
    The index of the player's downshift (gear N to N-1) is to the left
    of the expert's matching downshift.
  "downshifts later than": >
    The index of the player's downshift is to the right of the expert's.
  "lower gear than": >
    Across an index range the player holds gear N while the expert
    holds gear M (M > N).  Report the range and both gear numbers.
  "higher gear than": >
    Across an index range the player holds gear N while the expert
    holds gear M (M < N).  Report the range and both gear numbers.
  "shifts more often than": >
    Total upshift+downshift count on the player trace exceeds the
    expert's count over the segment.
  "shifts fewer times than": >
    Total upshift+downshift count on the player trace is below the
    expert's count over the segment.

  # ---------- Trajectory — entry / apex / exit ----------
  "entry line is tighter than": >
    The player's trajectory at corner entry passes between the expert
    line and the inside edge of the track.  Equivalent to "closer to
    inside than expert" at entry.
  "entry line is wider than": >
    The player's trajectory at corner entry passes between the expert
    line and the outside edge of the track.  Equivalent to "closer to
    outside than expert" at entry.
  "turns in earlier than": >
    The point where the player begins curving from a straight path is
    earlier along the trajectory than the expert's turn-in point.
  "turns in later than": >
    The point where the player begins curving is later along the
    trajectory than the expert's turn-in point.
  "tighter apex than": >
    At the apex marker the player passes closer to the inside of the
    corner than the expert.  Equivalent to "closer to inside than
    expert at apex".
  "wider apex than": >
    At the apex marker the player passes farther from the inside of
    the corner than the expert.  Equivalent to "farther from inside
    than expert at apex".
  "reaches apex earlier than": >
    The player's apex marker (curvature-detected) lies earlier along
    the trajectory than the expert's.
  "reaches apex later than": >
    The player's apex marker lies later along the trajectory than the
    expert's.
  "exit line is tighter than": >
    The player's trajectory at corner exit uses less track width than
    the expert (closer to inside on exit).
  "exit line is wider than": >
    The player's trajectory at corner exit uses more track width than
    the expert (closer to outside on exit).
  "exits the corner earlier than": >
    The point where the player straightens the steering is earlier
    than the expert's exit point.
  "exits the corner later than": >
    The point where the player straightens the steering is later than
    the expert's exit point.
  "cuts inside the racing line": >
    The player line crosses inside the expert line, shortening the
    corner relative to the expert's path.
  "off track at entry": >
    The player's trajectory crosses outside the track bounds during
    the corner-entry phase.
  "off track at exit": >
    The player's trajectory crosses outside the track bounds during
    the corner-exit phase.
  "off track on the straight": >
    The player's trajectory crosses outside the track bounds on a
    straight section.
  "kink in the line": >
    A sharp brief deviation in the player trajectory suggesting a
    correction.  Report location and whether the expert line is smooth
    in the same area.
  "largest divergence at entry": >
    Of the three phases (entry / apex / exit), the entry phase shows
    the biggest gap between player and expert lines.
  "largest divergence at apex": >
    The apex phase shows the biggest gap between player and expert lines.
  "largest divergence at exit": >
    The exit phase shows the biggest gap between player and expert lines.

  # ---------- Trajectory — gas/brake colour ----------
  "red section starts earlier than": >
    On the gas/brake trajectory the red (braking) coloured section
    begins before the expert's typical braking zone.
  "red section starts later than": >
    The red section begins after the expert's typical braking zone.
  "red section is longer than": >
    The red braking section spans more indices/distance than the
    expert's typical braking zone.
  "red section is shorter than": >
    The red braking section spans fewer indices/distance than the
    expert's typical braking zone.
  "throttle resumes earlier than": >
    The green (full-throttle) section on the gas/brake trajectory
    begins before the expert's typical throttle-resume point at corner
    exit.
  "throttle resumes later than": >
    The green section begins after the expert's typical throttle-resume
    point at corner exit.
  "yellow (coast or overlap)": >
    A yellow section on the gas/brake trajectory.  The colour cannot
    disambiguate coast from partial gas/brake overlap; use this exact
    phrasing rather than guessing.

  # ---------- Trajectory — balance (oversteer / understeer) ----------
  "rear-slip dominant at corner entry": >
    Section on the balance trajectory where the rear tyres slip more
    than the fronts, falling within the corner-entry phase.  Appears
    as red colouring.
  "rear-slip dominant at mid-corner": >
    Rear-slip-dominant section in the mid-corner phase.
  "rear-slip dominant at corner exit": >
    Rear-slip-dominant section in the corner-exit phase (after the apex).
  "front-slip dominant at corner entry": >
    Section on the balance trajectory where the front tyres slip more
    than the rears, in the corner-entry phase.  Appears as blue
    colouring; note 2x amplification.
  "front-slip dominant at mid-corner": >
    Front-slip-dominant section in the mid-corner phase.
  "front-slip dominant at corner exit": >
    Front-slip-dominant section in the corner-exit phase.
  "neutral balance": >
    White / near-neutral colouring on the balance trajectory — the
    player's slip distribution matches the expert's reference.
  "abrupt colour change": >
    A point on the balance trajectory where the colour shifts sharply
    (e.g. blue to red, vivid to neutral) within a few indices.  Often
    co-occurs with a push_limit spike.
  "2x understeer amplification": >
    Reminder that blue (front-slip) on the balance trajectory is
    displayed at 2x intensity for visibility.  A given blue intensity
    represents half the actual slip difference of the same red
    intensity.
