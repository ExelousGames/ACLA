# =============================================================================
# Label Catalog – racing telemetry annotation knowledge base
#
# Every label used by the annotation pipeline is defined here with:
#   name            – human-readable display name
#   type            – main | sub | segment_type | circuit | circuit_section
#   description     – what the label means
#   what_to_look_for – telemetry signals / graphs that indicate this label
#   parent          – parent label ID (null for top-level)
#   children        – list of child label IDs
#   exclusive_with  – labels that cannot coexist with this one
#   analysis_steps  – (main labels only) ordered procedure for the solver
#
# This file is loaded once by LabelCatalog (label_catalog.py).
# LABEL_MAPPING / LABEL_CATEGORIES in segment_models.py remain the
# source-of-truth for IDs and names; this YAML enriches them.
# =============================================================================

labels:

  # =========================================================================
  # MAIN LABELS
  # =========================================================================

  "1":
    name: "Overtaking"
    type: main
    description: >
      The driver is attempting to pass another car, or is being passed.
      This involves deliberate line deviation, late braking, or exploiting
      a speed differential to change track position.
    what_to_look_for:
      - "Speed differential between player and another car (visible in speed trace)"
      - "Late braking compared to normal — brake trace onset significantly later than expert"
      - "Line deviation — trajectory shifts off the optimal racing line to find a gap"
      - "Close proximity to other cars (if available in telemetry)"
    parent: null
    children: []
    exclusive_with: ["2", "4"]
    analysis_steps:
      - "Check speed trace for unusual speed differentials"
      - "Look for late braking patterns"
      - "Inspect trajectory for deliberate line deviations"
      - "Assess if the move was successful and safe"

  "2":
    name: "Missing data"
    type: main
    description: >
      The segment contains gaps, dropouts, or corrupted telemetry.
      Sensor data may drop to zero, become constant unexpectedly, or
      show physically impossible values.
    what_to_look_for:
      - "Sensor values dropping to zero or NaN unexpectedly"
      - "Constant/flat-line readings where variation is expected"
      - "Physically impossible values (negative speed, >100% throttle)"
      - "Sudden jumps or discontinuities in otherwise smooth signals"
    parent: null
    children: []
    exclusive_with: ["1", "EA", "4", "RM", "MS"]
    analysis_steps:
      - "Scan all telemetry channels for zero/NaN dropouts"
      - "Look for flat-line segments in otherwise dynamic signals"
      - "Check for physically impossible or out-of-range values"

  EA:
    name: "Expert Adherence"
    type: main
    description: >
      The driver is closely following the expert's optimal racing line
      and speed profile.  The time difference to the expert is stable
      or decreasing.  No significant errors are present.
    what_to_look_for:
      - "Time Difference to Expert is stable (flat) or decreasing"
      - "Speed delta near zero throughout the segment"
      - "Trajectory closely overlaps the expert line"
      - "Throttle and brake traces closely match expert"
    parent: null
    children: []
    exclusive_with: ["MS", "RM", "2"]
    analysis_steps:
      - "Check Time Difference to Expert graph — should be flat or decreasing"
      - "Verify speed delta is near zero"
      - "Confirm trajectory follows expert line"

  "4":
    name: "Pit Stop"
    type: main
    description: >
      The driver is entering, waiting in, or exiting the pit lane.
      This involves a significant speed reduction and a distinct
      trajectory deviation into the pit area.
    what_to_look_for:
      - "Significant speed reduction well below normal corner speed"
      - "Trajectory deviates sharply into the pit lane area"
      - "Throttle drops to zero for an extended period (pit stop)"
      - "Speed limiter engaged (constant low speed in pit lane)"
    parent: null
    children: []
    exclusive_with: ["1", "2"]
    analysis_steps:
      - "Look for dramatic speed reduction"
      - "Check trajectory for pit lane entry/exit deviation"
      - "Verify if speed limiter is engaged (constant low speed)"

  RM:
    name: "Recovery & Merge"
    type: main
    description: >
      The driver is recovering from a prior incident — such as going
      off-track, exiting the pit, or having a speed deficit — and is
      merging back onto the optimal racing line.  The time delta to
      the expert may initially be large but should be closing.
    what_to_look_for:
      - "Large initial speed gap to expert that gradually closes"
      - "Trajectory initially far from expert line, converging back"
      - "Time Difference to Expert decreasing (gap closing)"
      - "Throttle application pattern consistent with catching up"
    parent: null
    children: ["RM1", "RM2", "RM5", "RM6", "RM7", "RM8", "RM9", "RM10", "RM11"]
    exclusive_with: ["EA"]
    analysis_steps:
      - "Identify if driver is recovering from low speed, off-track, or pit exit"
      - "Check if time delta to expert is decreasing"
      - "Examine trajectory for merge-back behavior"
      - "Assign specific recovery sub-labels"

  MS:
    name: "Mistake"
    type: main
    description: >
      The driver has committed a driving error that results in time
      loss or vehicle instability.  The time difference to the expert
      increases continuously without a quick recovery.
    what_to_look_for:
      - "Time Difference to Expert graph increasing continuously without decreasing shortly after"
      - "Differences in throttle and brake between player and expert"
      - "Push_limit graph showing understeer or oversteer"
      - "Trajectory deviations from optimal line"
    parent: null
    children:
      - "MS1"
      - "MS2"
      - "MS3"
      - "MS4"
      - "MS5"
      - "MS6"
      - "MS7"
      - "MS8"
      - "MS9"
      - "MS10"
      - "MS11"
      - "MS13"
      - "MS14"
      - "MS15"
      - "MS16"
      - "MS17"
      - "MS18"
      - "MS19"
      - "MS20"
      - "MS21"
      - "MS22"
      - "MS23"
      - "MS24"
      - "MS25"
      - "MS26"
      - "MS27"
      - "MS28"
      - "MS29"
      - "MS30"
      - "MS31"
      - "MS32"
      - "MS33"
      - "MS34"
      - "MS35"
      - "MS36"
      - "MS37"
      - "MS38"
      - "MS41"
      - "MS42"
      - "MS43"
      - "MS44"
      - "MS45"
      - "MS46"
      - "MS47"
      - "MS48"
      - "MS49"
      - "MS50"
      - "MS51"
      - "MS52"
    exclusive_with: ["EA"]
    analysis_steps:
      - "Analyze the Time Difference to Expert graph — a mistake normally causes this time gap to increase continuously without decreasing shortly after"
      - "Examine the differences in throttle and brake between the player and the expert to find out why the player is slower"
      - "Examine the push_limit graph to find understeer or oversteer, which could lead to lower speed"
      - "Check the Trajectory map for mistakes caused by deviations from the optimal line"
      - "Find the sub-labels that describe the root cause"

  brands_hatch:
    name: "Brands Hatch"
    type: circuit
    description: >
      The segment takes place on the Brands Hatch circuit.  Identify
      which specific named corner or straight section the segment
      corresponds to using the trajectory overlay.
    what_to_look_for:
      - "Trajectory overlay matching Brands Hatch circuit layout"
      - "Corner/straight characteristics matching a known section"
    parent: null
    children:
      - "brands_hatch1"
      - "brands_hatch2"
      - "brands_hatch3"
      - "brands_hatch4"
      - "brands_hatch5"
      - "brands_hatch6"
      - "brands_hatch7"
      - "brands_hatch9"
      - "brands_hatch10"
      - "brands_hatch11"
      - "brands_hatch12"
      - "brands_hatch13"
      - "brands_hatch14"
      - "brands_hatch15"
      - "brands_hatch16"
      - "brands_hatch17"
      - "brands_hatch18"
      - "brands_hatch19"
    exclusive_with: ["silverstone"]
    analysis_steps:
      - "Look at the Trajectories Overlay to identify the section of the circuit"
      - "Identify specific named corners or straight sections"
      - "Also identify the shape of the segment using Segment Type labels ST1-ST6"

  silverstone:
    name: "Silverstone"
    type: circuit
    description: >
      The segment takes place on the Silverstone circuit.  Identify
      which specific named corner or straight section the segment
      corresponds to using the trajectory overlay.
    what_to_look_for:
      - "Trajectory overlay matching Silverstone circuit layout"
      - "Corner/straight characteristics matching a known section"
    parent: null
    children:
      - "silverstone1"
      - "silverstone2"
      - "silverstone3"
      - "silverstone4"
      - "silverstone5"
      - "silverstone6"
      - "silverstone7"
      - "silverstone8"
      - "silverstone9"
      - "silverstone10"
      - "silverstone11"
      - "silverstone12"
      - "silverstone13"
      - "silverstone14"
      - "silverstone15"
      - "silverstone16"
      - "silverstone17"
      - "silverstone18"
      - "silverstone19"
      - "silverstone20"
      - "silverstone21"
    exclusive_with: ["brands_hatch"]
    analysis_steps:
      - "Look at the Trajectories Overlay to identify the section of the circuit"
      - "Identify specific named corners or straight sections"
      - "Also identify the shape of the segment using Segment Type labels ST1-ST6"

  # =========================================================================
  # RECOVERY & MERGE SUB-LABELS
  # =========================================================================

  RM1:
    name: "Recover from off-track"
    type: sub
    description: >
      The driver went off the circuit surface and is now returning
      to the track.  There may be a large trajectory deviation and
      sudden speed loss.
    what_to_look_for:
      - "Sudden speed drop followed by gradual recovery"
      - "Large lateral deviation from expert line"
    parent: RM
    children: []
    exclusive_with: ["RM2"]

  RM2:
    name: "Exit pit lane"
    type: sub
    description: >
      The driver is re-joining the track after a pit stop.  Speed
      increases from pit-limiter speed to racing speed.
    what_to_look_for:
      - "Speed increasing from pit-limiter level (~50 km/h) to racing speed"
      - "Trajectory merging from pit lane exit onto expert trajectory"
    parent: RM
    children: []
    exclusive_with: ["RM1"]

  RM5:
    name: "Recover from speed gap over 20"
    type: sub
    description: >
      The driver has a speed deficit of more than 20 km/h compared
      to the expert and is working to close the gap.
    what_to_look_for:
      - "Speed delta (player - expert) exceeds -20 km/h at segment start"
      - "Speed delta gradually decreasing toward zero"
      - "Heavy throttle application to catch up"
    parent: RM
    children: []
    exclusive_with: ["RM6"]

  RM6:
    name: "Recover from small speed gap under 20"
    type: sub
    description: >
      The driver has a speed deficit of less than 20 km/h compared
      to the expert and is closing the gap.
    what_to_look_for:
      - "Speed delta (player - expert) is between 0 and -20 km/h"
      - "Gap closing over the segment length"
    parent: RM
    children: []
    exclusive_with: ["RM5"]

  RM7:
    name: "Merge back to expert line"
    type: sub
    description: >
      The driver's trajectory is converging back to the optimal
      expert racing line after a deviation.
    what_to_look_for:
      - "Trajectory gradually converging toward the expert line"
      - "Lateral distance to expert line decreasing"
    parent: RM
    children: []
    exclusive_with: []

  RM8:
    name: "Accelerate earlier at exit"
    type: sub
    description: >
      During recovery the driver applies throttle earlier than
      the expert at the corner exit.
    what_to_look_for:
      - "Throttle onset occurs at an earlier index/point than expert throttle onset"
      - "Recovery pattern — catching up by being more aggressive on exit"
    parent: RM
    children: []
    exclusive_with: ["RM9"]

  RM9:
    name: "Accelerate later at exit"
    type: sub
    description: >
      During recovery the driver applies throttle later than
      the expert at the corner exit.
    what_to_look_for:
      - "Throttle onset occurs at a later index/point than expert throttle onset"
      - "Cautious recovery — building speed more gradually"
    parent: RM
    children: []
    exclusive_with: ["RM8"]

  RM10:
    name: "Brake earlier at entry"
    type: sub
    description: >
      During recovery the driver starts braking earlier than
      the expert at the corner entry.
    what_to_look_for:
      - "Brake onset occurs at an earlier index than expert brake onset"
      - "Cautious approach to the corner during recovery"
    parent: RM
    children: []
    exclusive_with: ["RM11"]

  RM11:
    name: "Brake later at entry"
    type: sub
    description: >
      During recovery the driver starts braking later than
      the expert at the corner entry.
    what_to_look_for:
      - "Brake onset occurs at a later index than expert brake onset"
      - "Aggressive approach to corner during recovery"
    parent: RM
    children: []
    exclusive_with: ["RM10"]

  # =========================================================================
  # MISTAKE SUB-LABELS — Braking
  # =========================================================================

  MS1:
    name: "Initiate brake too late"
    type: sub
    description: >
      The driver starts braking after the optimal braking point,
      carrying too much speed into the corner.
    what_to_look_for:
      - "Brake trace onset is at a later index than expert brake onset"
      - "Speed at the braking point is higher than expert"
      - "Time delta increases through the braking zone"
    parent: MS
    children: []
    exclusive_with: ["MS5"]

  MS5:
    name: "Initiate brake too early"
    type: sub
    description: >
      The driver starts braking before the optimal braking point,
      losing time by decelerating too soon.
    what_to_look_for:
      - "Brake trace onset is at an earlier index than expert brake onset"
      - "Speed reduction begins sooner than expert"
      - "Time delta increases because driver is slower than necessary"
    parent: MS
    children: []
    exclusive_with: ["MS1"]

  MS13:
    name: "Highest brake pressure too low"
    type: sub
    description: >
      Peak brake pressure is lower than the expert's, resulting
      in insufficient deceleration.
    what_to_look_for:
      - "Max brake value in segment is lower than expert max brake"
      - "Speed reduction is slower than expert"
      - "Braking zone is longer than expert's"
    parent: MS
    children: []
    exclusive_with: ["MS22"]

  MS22:
    name: "Highest brake pressure too high"
    type: sub
    description: >
      Peak brake pressure exceeds the expert's, risking lock-up
      or instability.
    what_to_look_for:
      - "Max brake value in segment exceeds expert max brake"
      - "Possible lock-up indicators (sudden speed drop, instability)"
    parent: MS
    children: []
    exclusive_with: ["MS13"]

  MS14:
    name: "Brake applied too quickly"
    type: sub
    description: >
      The brake is applied with a very steep ramp — transitioning
      from zero to high pressure too rapidly.
    what_to_look_for:
      - "Steep rise in brake trace (high rate of change)"
      - "Brake onset-to-peak time shorter than expert"
    parent: MS
    children: []
    exclusive_with: ["MS24"]

  MS24:
    name: "Brake applied too slowly"
    type: sub
    description: >
      The brake is applied with a gradual ramp — not reaching
      peak pressure quickly enough.
    what_to_look_for:
      - "Gradual rise in brake trace (low rate of change)"
      - "Brake onset-to-peak time longer than expert"
    parent: MS
    children: []
    exclusive_with: ["MS14"]

  MS17:
    name: "Release brake too quickly"
    type: sub
    description: >
      The driver releases the brake pedal too fast — losing trail
      braking and destabilising the car mid-corner.
    what_to_look_for:
      - "Steep drop in brake trace (high negative rate of change)"
      - "Brake release duration shorter than expert"
      - "Potential mid-corner instability (push_limit spike)"
    parent: MS
    children: []
    exclusive_with: ["MS18"]

  MS18:
    name: "Release brake too slowly"
    type: sub
    description: >
      The driver releases the brake pedal too gradually — carrying
      too much braking into the corner and scrubbing speed.
    what_to_look_for:
      - "Gradual drop in brake trace (low negative rate of change)"
      - "Brake release duration longer than expert"
      - "Speed lower than expert through mid-corner"
    parent: MS
    children: []
    exclusive_with: ["MS17"]

  MS27:
    name: "Initiate brake release too late"
    type: sub
    description: >
      The driver begins releasing the brake at a later point than
      the expert, staying on the brake too long.
    what_to_look_for:
      - "Brake release onset at a later index than expert"
      - "Trail-braking zone extends further than expert's"
    parent: MS
    children: []
    exclusive_with: ["MS28"]

  MS28:
    name: "Initiate brake release too early"
    type: sub
    description: >
      The driver begins releasing the brake at an earlier point
      than the expert, losing trail-braking benefit.
    what_to_look_for:
      - "Brake release onset at an earlier index than expert"
      - "Less trail-braking than expert, potential understeer"
    parent: MS
    children: []
    exclusive_with: ["MS27"]

  MS31:
    name: "Highest brake length too short"
    type: sub
    description: >
      The total duration of brake application is shorter than the
      expert's — potentially under-braking.
    what_to_look_for:
      - "Total brake application duration (samples) shorter than expert"
      - "Higher corner entry speed than expert"
    parent: MS
    children: []
    exclusive_with: ["MS32"]

  MS32:
    name: "Highest brake length too long"
    type: sub
    description: >
      The total duration of brake application is longer than the
      expert's — over-braking and losing time.
    what_to_look_for:
      - "Total brake application duration (samples) longer than expert"
      - "Lower corner entry speed than expert"
    parent: MS
    children: []
    exclusive_with: ["MS31"]

  MS34:
    name: "Throttle and brake applied at the same time for too long"
    type: sub
    description: >
      The driver is simultaneously on throttle and brake for an
      excessive duration (left-foot braking overlap).
    what_to_look_for:
      - "Both throttle > 0 and brake > 0 for a sustained period"
      - "Overlap duration longer than expert (or expert has no overlap)"
    parent: MS
    children: []
    exclusive_with: []

  # =========================================================================
  # MISTAKE SUB-LABELS — Throttle
  # =========================================================================

  MS15:
    name: "Throttle applied too quickly"
    type: sub
    description: >
      Throttle is applied with a very steep ramp —
      risking wheelspin or oversteer on corner exit.
    what_to_look_for:
      - "Steep rise in throttle trace (high rate of change)"
      - "Throttle onset-to-full time shorter than expert"
      - "Possible push_limit drop (oversteer/wheelspin)"
    parent: MS
    children: []
    exclusive_with: ["MS25"]

  MS25:
    name: "Throttle applied too slowly"
    type: sub
    description: >
      Throttle is applied too gradually — not building speed
      quickly enough on corner exit.
    what_to_look_for:
      - "Gradual rise in throttle trace (low rate of change)"
      - "Throttle onset-to-full time longer than expert"
      - "Speed at exit lower than expert"
    parent: MS
    children: []
    exclusive_with: ["MS15"]

  MS19:
    name: "Highest throttle pressure too low"
    type: sub
    description: >
      Peak throttle application is lower than the expert's —
      not using full power when it is safe to do so.
    what_to_look_for:
      - "Max throttle value in segment lower than expert"
      - "Speed lower than expert on straights or exits"
    parent: MS
    children: []
    exclusive_with: ["MS26"]

  MS26:
    name: "Highest throttle pressure too high"
    type: sub
    description: >
      Peak throttle exceeds what the expert uses — possibly
      causing wheelspin or instability.
    what_to_look_for:
      - "Max throttle value exceeds expert max throttle"
      - "Possible oversteer or wheelspin (push_limit drop)"
    parent: MS
    children: []
    exclusive_with: ["MS19"]

  MS20:
    name: "Initiate throttle too early"
    type: sub
    description: >
      The driver gets on the throttle before the optimal point,
      risking oversteer or running wide on exit.
    what_to_look_for:
      - "Throttle onset at an earlier index than expert"
      - "Potential exit trajectory deviation (running wide)"
    parent: MS
    children: []
    exclusive_with: ["MS21"]

  MS21:
    name: "Initiate throttle too late"
    type: sub
    description: >
      The driver gets on the throttle after the optimal point,
      losing exit speed.
    what_to_look_for:
      - "Throttle onset at a later index than expert"
      - "Lower exit speed than expert"
    parent: MS
    children: []
    exclusive_with: ["MS20"]

  MS23:
    name: "Release throttle too quickly"
    type: sub
    description: >
      The driver lifts off the throttle too abruptly, causing
      weight transfer instability.
    what_to_look_for:
      - "Steep drop in throttle trace (high negative rate of change)"
      - "Throttle lift-to-zero time shorter than expert"
    parent: MS
    children: []
    exclusive_with: []

  MS29:
    name: "Initiate throttle release too late"
    type: sub
    description: >
      The driver stays on the throttle longer than the expert
      before lifting — late lift-off.
    what_to_look_for:
      - "Throttle release onset at a later index than expert"
      - "Higher speed into braking zone"
    parent: MS
    children: []
    exclusive_with: ["MS30"]

  MS30:
    name: "Initiate throttle release too early"
    type: sub
    description: >
      The driver lifts off the throttle earlier than the expert —
      coasting or early lift.
    what_to_look_for:
      - "Throttle release onset at an earlier index than expert"
      - "Speed lower than expert approaching braking zone"
    parent: MS
    children: []
    exclusive_with: ["MS29"]

  # =========================================================================
  # MISTAKE SUB-LABELS — Turn-in / Timing
  # =========================================================================

  MS2:
    name: "Initiate the turn too late"
    type: sub
    description: >
      The driver turns into the corner after the optimal turn-in
      point, resulting in a wider entry.
    what_to_look_for:
      - "Steering angle onset at a later index than expert"
      - "Entry trajectory wider than expert"
      - "Potential late apex"
    parent: MS
    children: []
    exclusive_with: ["MS6"]

  MS6:
    name: "Initiate the turn too early"
    type: sub
    description: >
      The driver turns into the corner before the optimal turn-in
      point, resulting in a tighter entry.
    what_to_look_for:
      - "Steering angle onset at an earlier index than expert"
      - "Entry trajectory tighter than expert"
      - "Potential early apex"
    parent: MS
    children: []
    exclusive_with: ["MS2"]

  MS3:
    name: "Too late compared to expert Apex"
    type: sub
    description: >
      The driver reaches the apex (closest point to the inside
      of the corner) later than the expert.
    what_to_look_for:
      - "Minimum distance to inside kerb occurs at a later index than expert"
      - "Apex point shifted downstream in the trajectory"
    parent: MS
    children: []
    exclusive_with: ["MS7"]

  MS7:
    name: "Too early compared to expert Apex"
    type: sub
    description: >
      The driver reaches the apex earlier than the expert,
      potentially compromising exit speed.
    what_to_look_for:
      - "Minimum distance to inside kerb occurs at an earlier index than expert"
      - "Apex point shifted upstream in the trajectory"
    parent: MS
    children: []
    exclusive_with: ["MS3"]

  MS4:
    name: "Time to exit too early"
    type: sub
    description: >
      The driver exits the corner (straightens steering) earlier
      than the expert.
    what_to_look_for:
      - "Steering angle returns to near-zero at an earlier index than expert"
      - "May lead to running wide on exit"
    parent: MS
    children: []
    exclusive_with: ["MS8"]

  MS8:
    name: "Time to exit too late"
    type: sub
    description: >
      The driver exits the corner (straightens steering) later
      than the expert, staying in the turn too long.
    what_to_look_for:
      - "Steering angle returns to near-zero at a later index than expert"
      - "Speed build-up on exit delayed"
    parent: MS
    children: []
    exclusive_with: ["MS4"]

  # =========================================================================
  # MISTAKE SUB-LABELS — Trajectory
  # =========================================================================

  MS9:
    name: "Entry trajectory too tight"
    type: sub
    description: >
      The driver takes a tighter line than the expert on corner
      entry, reducing corner speed potential.
    what_to_look_for:
      - "Trajectory is closer to the inside than expert on entry"
      - "Higher steering angle than expert on entry"
    parent: MS
    children: []
    exclusive_with: ["MS33"]

  MS33:
    name: "Entry trajectory too wide"
    type: sub
    description: >
      The driver takes a wider line than the expert on corner
      entry, requiring a tighter mid-corner to hit the apex.
    what_to_look_for:
      - "Trajectory is farther from the inside than expert on entry"
      - "May cause a late apex or excess steering mid-corner"
    parent: MS
    children: []
    exclusive_with: ["MS9"]

  MS10:
    name: "Apex too wide"
    type: sub
    description: >
      The driver's closest point to the inside of the corner is
      wider (farther from the kerb) than the expert's apex.
    what_to_look_for:
      - "Minimum lateral distance to inside kerb is greater than expert"
      - "Trajectory doesn't clip the apex as tightly as expert"
    parent: MS
    children: []
    exclusive_with: []

  MS11:
    name: "Exit trajectory too narrow"
    type: sub
    description: >
      The driver stays too close to the inside on corner exit,
      not using the full track width to carry speed.
    what_to_look_for:
      - "Trajectory is tighter (more inside) than expert on exit"
      - "Less track width used on exit"
      - "Lower acceleration potential on exit"
    parent: MS
    children: []
    exclusive_with: ["MS16"]

  MS16:
    name: "Exit trajectory too wide"
    type: sub
    description: >
      The driver runs too wide on corner exit, potentially going
      off-track or losing time by exceeding track limits.
    what_to_look_for:
      - "Trajectory is farther from the inside than expert on exit"
      - "May approach or exceed track limits"
    parent: MS
    children: []
    exclusive_with: ["MS11"]

  MS41:
    name: "Cutting the line"
    type: sub
    description: >
      The driver cuts inside the optimal racing line, shortening
      the corner but potentially violating track limits.
    what_to_look_for:
      - "Trajectory cuts significantly inside the expert line"
      - "Shorter path but may compromise speed or grip"
    parent: MS
    children: []
    exclusive_with: []

  MS50:
    name: "Off track at entry"
    type: sub
    description: >
      The driver goes off the track surface during corner entry.
    what_to_look_for:
      - "Trajectory exceeds track boundary on entry"
      - "Sudden speed change or grip loss on entry"
    parent: MS
    children: []
    exclusive_with: []

  MS51:
    name: "Off track at exit"
    type: sub
    description: >
      The driver goes off the track surface during corner exit.
    what_to_look_for:
      - "Trajectory exceeds track boundary on exit"
      - "Sudden speed change or grip loss on exit"
    parent: MS
    children: []
    exclusive_with: []

  MS52:
    name: "Off track in the straight"
    type: sub
    description: >
      The driver goes off the track surface on a straight section.
    what_to_look_for:
      - "Trajectory deviates beyond track boundary on a straight"
      - "Unusual lateral movement on a section with no corners"
    parent: MS
    children: []
    exclusive_with: []

  # =========================================================================
  # MISTAKE SUB-LABELS — Grip / Vehicle dynamics
  # =========================================================================

  MS42:
    name: "Inefficient grip utilization at entry"
    type: sub
    description: >
      The driver is not using the available tire grip efficiently
      on corner entry — either under- or over-loading the tires.
    what_to_look_for:
      - "Push_limit graph shows the driver is well below the grip limit on entry"
      - "Speed lower than expert despite available grip margin"
    parent: MS
    children: []
    exclusive_with: []

  MS43:
    name: "Inefficient grip utilization at exit"
    type: sub
    description: >
      The driver is not using the available tire grip efficiently
      on corner exit.
    what_to_look_for:
      - "Push_limit graph shows the driver is well below the grip limit on exit"
      - "Speed lower than expert despite available grip margin"
    parent: MS
    children: []
    exclusive_with: []

  MS44:
    name: "Oversteering at entry"
    type: sub
    description: >
      The rear of the car loses grip on corner entry, causing
      the car to rotate more than intended.
    what_to_look_for:
      - "Push_limit graph showing grip loss (value drops) on entry"
      - "Driver may apply opposite steering lock (counter-steer)"
      - "Sudden yaw rate change"
    parent: MS
    children: []
    exclusive_with: ["MS45"]

  MS45:
    name: "Understeering at entry"
    type: sub
    description: >
      The front tires lose grip on corner entry, causing the
      car to push wide (not turning enough).
    what_to_look_for:
      - "Push_limit graph showing the car is at the limit but trajectory is wider than expert"
      - "Increased steering angle with no additional rotation"
      - "Speed too high for available grip"
    parent: MS
    children: []
    exclusive_with: ["MS44"]

  MS46:
    name: "Oversteering at exit"
    type: sub
    description: >
      The rear of the car loses grip on corner exit, usually
      due to aggressive throttle application.
    what_to_look_for:
      - "Push_limit graph showing grip loss on exit"
      - "Throttle application coincides with instability"
      - "Possible snap oversteer on power"
    parent: MS
    children: []
    exclusive_with: ["MS47"]

  MS47:
    name: "Understeering at exit"
    type: sub
    description: >
      The front tires lose grip on corner exit, causing the
      car to run wide despite steering input.
    what_to_look_for:
      - "Push_limit at limit on exit but trajectory wider than expert"
      - "Throttle application causes front to wash out"
    parent: MS
    children: []
    exclusive_with: ["MS46"]

  # =========================================================================
  # MISTAKE SUB-LABELS — Gear / Shifting
  # =========================================================================

  MS35:
    name: "Shift up too early"
    type: sub
    description: >
      The driver upshifts before reaching optimal RPM, losing
      acceleration in the next gear.
    what_to_look_for:
      - "Gear change to a higher gear at a lower RPM/speed than expert"
      - "Engine RPM at shift point lower than expert"
    parent: MS
    children: []
    exclusive_with: ["MS36"]

  MS36:
    name: "Shift up too late"
    type: sub
    description: >
      The driver upshifts past the optimal RPM, hitting the
      rev limiter or losing power in over-rev.
    what_to_look_for:
      - "Gear change to a higher gear at a higher RPM/speed than expert"
      - "Engine may hit rev limiter"
    parent: MS
    children: []
    exclusive_with: ["MS35"]

  MS37:
    name: "Shift down too early"
    type: sub
    description: >
      The driver downshifts before the optimal point,
      potentially causing engine braking instability.
    what_to_look_for:
      - "Gear change to a lower gear at a higher speed than expert"
      - "Potential rear-wheel instability from engine braking"
    parent: MS
    children: []
    exclusive_with: ["MS38"]

  MS38:
    name: "Shift down too late"
    type: sub
    description: >
      The driver downshifts after the optimal point,
      entering the corner in too high a gear.
    what_to_look_for:
      - "Gear change to a lower gear at a lower speed than expert"
      - "May cause low RPM mid-corner, reducing engine response"
    parent: MS
    children: []
    exclusive_with: ["MS37"]

  MS48:
    name: "Gear too low when accelerating"
    type: sub
    description: >
      The driver is in a lower gear than the expert during
      acceleration, hitting the rev limiter sooner.
    what_to_look_for:
      - "Gear number lower than expert at the same track position"
      - "Higher RPM than expert at the same speed"
    parent: MS
    children: []
    exclusive_with: ["MS49"]

  MS49:
    name: "Gear too high when accelerating"
    type: sub
    description: >
      The driver is in a higher gear than the expert during
      acceleration, resulting in less torque/power.
    what_to_look_for:
      - "Gear number higher than expert at the same track position"
      - "Lower RPM than expert at the same speed"
      - "Slower acceleration than expert"
    parent: MS
    children: []
    exclusive_with: ["MS48"]

  # =========================================================================
  # SEGMENT TYPE LABELS
  # =========================================================================

  ST1:
    name: "In the corner"
    type: segment_type
    description: >
      The segment is entirely within a corner.  The driver is
      turning throughout.
    what_to_look_for:
      - "Sustained non-zero steering angle"
      - "Speed generally lower than straight-line speed"
      - "Lateral G-force present throughout"
    parent: null
    children: []
    exclusive_with: ["ST2", "ST3", "ST4", "ST5", "ST6"]

  ST2:
    name: "On the straight"
    type: segment_type
    description: >
      The segment is on a straight section.  Minimal steering,
      high speed, full throttle typical.
    what_to_look_for:
      - "Steering angle near zero"
      - "High and increasing speed"
      - "Full or near-full throttle"
    parent: null
    children: []
    exclusive_with: ["ST1", "ST3", "ST4", "ST5", "ST6"]

  ST3:
    name: "Approach to corner"
    type: segment_type
    description: >
      The segment covers the approach/braking zone before a corner.
      The driver is decelerating and preparing to turn in.
    what_to_look_for:
      - "Brake application begins during segment"
      - "Speed decreasing"
      - "Steering angle near zero initially, may begin turning at end"
    parent: null
    children: []
    exclusive_with: ["ST1", "ST2", "ST4", "ST5", "ST6"]

  ST4:
    name: "Exit corner leading to straight"
    type: segment_type
    description: >
      The segment covers the exit of a corner leading onto a
      straight.  Steering angle is decreasing, throttle increasing.
    what_to_look_for:
      - "Steering angle decreasing toward zero"
      - "Throttle increasing"
      - "Speed increasing as the car straightens"
    parent: null
    children: []
    exclusive_with: ["ST1", "ST2", "ST3", "ST5", "ST6"]

  ST5:
    name: "Between consecutive corners"
    type: segment_type
    description: >
      The segment is a short connection between two corners —
      not a full straight but a brief transition.
    what_to_look_for:
      - "Brief period of near-zero steering between two turning phases"
      - "Short duration compared to a full straight"
    parent: null
    children: []
    exclusive_with: ["ST1", "ST2", "ST3", "ST4", "ST6"]

  ST6:
    name: "Consecutive corners with no straight in between"
    type: segment_type
    description: >
      The segment covers multiple corners with no intervening
      straight — e.g., an esses or chicane complex.
    what_to_look_for:
      - "Steering angle alternates direction without returning to zero"
      - "No full-throttle straight section between turns"
      - "Speed remains in cornering range throughout"
    parent: null
    children: []
    exclusive_with: ["ST1", "ST2", "ST3", "ST4", "ST5"]

