<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>LLM Entry Editor</title>
<style>
  /* All shades derive from four theme-driven base vars — see applyTheme(). */
  :root {
    --bg: #ffffff;
    --text: #262730;
    --accent: #ff4b4b;
    --panel: #f0f2f6;

    --panel-2: color-mix(in srgb, var(--bg) 86%, var(--text));
    --border: color-mix(in srgb, var(--bg) 78%, var(--text));
    --muted: color-mix(in srgb, var(--text) 55%, var(--bg));
    --accent-soft: color-mix(in srgb, var(--accent) 16%, transparent);
    --preview-bg: color-mix(in srgb, var(--bg) 92%, var(--text));
    --chip: #2c5cdd;
    --chip-text: #ffffff;
    --ok: #2fbf71;
    --warn: #d9a441;
    --danger: #e35d6a;
    --shadow: 0 1px 0 color-mix(in srgb, var(--text) 4%, transparent),
              0 2px 8px color-mix(in srgb, var(--text) 8%, transparent);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 13px;
    color: var(--text);
    background: transparent;
  }
  #root {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 6px 2px 12px;
  }

  /* ── Variable palette ────────────────────────────────────────── */
  .palette {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    box-shadow: var(--shadow);
  }
  .palette-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .palette-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .palette-chip {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 3px 8px;
    border-radius: 999px;
    font-size: 12px;
    cursor: pointer;
    user-select: none;
    transition: background 80ms, border-color 80ms;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  .palette-chip:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
  }
  .palette-chip .val {
    color: var(--muted);
    margin-left: 6px;
    font-size: 11px;
  }
  .palette-hint {
    color: var(--muted);
    font-size: 11px;
    margin-top: 6px;
  }

  /* ── Entry tabs ─────────────────────────────────────────────── */
  .tabs {
    display: flex;
    gap: 6px;
    align-items: center;
    overflow-x: auto;
    padding: 4px 2px;
  }
  .tab {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    white-space: nowrap;
    color: var(--muted);
    font-size: 12px;
    user-select: none;
  }
  .tab.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--text);
  }
  .tab .close {
    margin-left: 8px;
    color: var(--muted);
    font-size: 11px;
  }
  .tab .close:hover { color: var(--danger); }
  .tab .turn-count {
    margin-left: 6px;
    color: var(--muted);
    font-size: 10.5px;
  }
  .tab-add {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 12px;
  }
  .tab-add:hover { color: var(--accent); border-color: var(--accent); }

  /* ── Entry body ─────────────────────────────────────────────── */
  .entry {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    box-shadow: var(--shadow);
  }
  .empty {
    color: var(--muted);
    font-style: italic;
    padding: 16px;
    text-align: center;
  }

  /* ── Turns ──────────────────────────────────────────────────── */
  .turn {
    display: grid;
    grid-template-columns: 18px 92px minmax(0, 1fr) minmax(0, 1fr) 26px;
    gap: 8px;
    align-items: start;
    padding: 8px;
    margin-bottom: 6px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .turn.dragging { opacity: 0.4; }
  .turn.drag-over { border-color: var(--accent); }
  .drag-handle {
    cursor: grab;
    color: var(--muted);
    user-select: none;
    text-align: center;
    line-height: 1.4;
    padding-top: 4px;
  }
  .drag-handle:active { cursor: grabbing; }
  .role-select {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 6px;
    font-size: 12px;
    height: 28px;
  }
  .role-select:focus {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
  }
  .template {
    min-height: 56px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
    color: var(--text);
    font-size: 13px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: anywhere;
    outline: none;
    transition: border-color 80ms;
  }
  .template:focus {
    border-color: var(--accent);
  }
  .template[data-empty="true"]::before {
    content: attr(data-placeholder);
    color: var(--muted);
    font-style: italic;
    pointer-events: none;
  }
  .chip {
    display: inline-block;
    background: var(--chip);
    color: var(--chip-text);
    padding: 1px 7px;
    margin: 0 1px;
    border-radius: 4px;
    font-size: 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    user-select: none;
    cursor: default;
    vertical-align: baseline;
  }
  .chip.unknown {
    background: var(--warn);
    color: #1c1f26; /* amber bg is always light, so fix dark text for readability */
  }
  .preview {
    min-height: 56px;
    background: var(--preview-bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
    color: var(--text);
    font-size: 12.5px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  .preview.empty { color: var(--muted); font-style: italic; }
  .preview .val-chip {
    display: inline-block;
    background: color-mix(in srgb, var(--ok) 22%, transparent);
    color: color-mix(in srgb, var(--ok) 80%, var(--text));
    padding: 1px 5px;
    border-radius: 3px;
    margin: 0 1px;
  }
  .turn-del {
    background: transparent;
    border: 1px solid transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 4px;
    padding: 2px;
    width: 26px;
    height: 26px;
  }
  .turn-del:hover { color: var(--danger); border-color: var(--border); background: var(--panel); }

  .add-turn-row {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }
  .btn {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #ffffff;
  }
  .btn.primary:hover {
    background: color-mix(in srgb, var(--accent) 82%, #000);
    color: #ffffff;
  }
  .btn.ok {
    background: var(--ok);
    border-color: var(--ok);
    color: #07210f; /* dark text on saturated green reads in both themes */
  }
  .btn.ok:hover { background: color-mix(in srgb, var(--ok) 82%, #000); }
  .btn.ghost {
    background: transparent;
  }
  .btn.danger { color: var(--danger); }
  .btn.danger:hover { border-color: var(--danger); }
  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 10px;
  }
  .dirty-badge {
    margin-left: auto;
    color: var(--warn);
    font-size: 11.5px;
  }
  .dirty-badge.clean { color: var(--muted); }

  .col-head {
    display: grid;
    grid-template-columns: 18px 92px minmax(0, 1fr) minmax(0, 1fr) 26px;
    gap: 8px;
    padding: 0 8px 4px;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
  }
  .col-head > div:nth-child(3) { padding-left: 2px; }
  .col-head > div:nth-child(4) { padding-left: 2px; }
</style>
</head>
<body>
<div id="root"></div>

<script>
"use strict";

// ── Streamlit message shim (no external lib) ─────────────────────────────
const Streamlit = (() => {
  function send(type, payload = {}) {
    window.parent.postMessage(Object.assign({ isStreamlitMessage: true, type }, payload), "*");
  }
  return {
    onReady(cb) {
      send("streamlit:componentReady", { apiVersion: 1 });
      window.addEventListener("message", (e) => {
        if (!e.data || e.data.type !== "streamlit:render") return;
        // Streamlit sends theme info on every render — keep CSS vars in sync.
        if (e.data.theme) applyTheme(e.data.theme);
        cb(e.data.args || {});
      });
    },
    setValue(value) {
      send("streamlit:setComponentValue", { value, dataType: "json" });
    },
    setHeight(h) {
      send("streamlit:setFrameHeight", { height: Math.ceil(h) });
    },
  };
})();

// Map Streamlit's theme object onto our four base CSS variables; the rest
// of the palette derives from them via color-mix().
function applyTheme(theme) {
  const root = document.documentElement;
  if (theme.backgroundColor) root.style.setProperty("--bg", theme.backgroundColor);
  if (theme.textColor) root.style.setProperty("--text", theme.textColor);
  if (theme.primaryColor) root.style.setProperty("--accent", theme.primaryColor);
  if (theme.secondaryBackgroundColor) root.style.setProperty("--panel", theme.secondaryBackgroundColor);
  if (theme.base) document.body.dataset.themeBase = theme.base;
  if (theme.font) document.body.style.fontFamily = theme.font;
}

// ── State ────────────────────────────────────────────────────────────────
const state = {
  entries: [],          // [{entry_id, turns: [{role, template}]}]
  variables: {},        // {name: resolved_value}
  varNames: [],         // ordered list of variable names
  approved: false,
  activeIdx: 0,
  initialized: false,
  dirty: false,
  // remember which template element is focused so palette inserts go there
  focusedTurn: null,    // {entryIdx, turnIdx}
};

const ROLES = ["system", "user", "assistant"];

// ── Utilities ────────────────────────────────────────────────────────────
function uid() {
  return Math.random().toString(36).slice(2, 10);
}

function nextRole(turns) {
  if (!turns.length) return "user";
  const last = turns[turns.length - 1].role;
  return last === "user" ? "assistant" : "user";
}

function markDirty() {
  state.dirty = true;
  renderBadge();
}

function clearDirty() {
  state.dirty = false;
  renderBadge();
}

// Resolve a template against current variables (for preview rendering).
// Returns an array of {type: "text"|"var"|"unknown", text, name?} segments.
function tokenize(template) {
  const out = [];
  const re = /\{(\w+)\}/g;
  let last = 0, m;
  while ((m = re.exec(template)) !== null) {
    if (m.index > last) out.push({ type: "text", text: template.slice(last, m.index) });
    const name = m[1];
    if (state.variables.hasOwnProperty(name)) {
      out.push({ type: "var", text: state.variables[name], name });
    } else {
      out.push({ type: "unknown", text: "{" + name + "}", name });
    }
    last = re.lastIndex;
  }
  if (last < template.length) out.push({ type: "text", text: template.slice(last) });
  return out;
}

// Build the contenteditable DOM nodes from a template string.
// Chips render as inline non-editable spans; text becomes plain text nodes.
function buildEditableDOM(template) {
  const frag = document.createDocumentFragment();
  const re = /\{(\w+)\}/g;
  let last = 0, m;
  while ((m = re.exec(template)) !== null) {
    if (m.index > last) frag.appendChild(document.createTextNode(template.slice(last, m.index)));
    frag.appendChild(makeChip(m[1]));
    last = re.lastIndex;
  }
  if (last < template.length) frag.appendChild(document.createTextNode(template.slice(last)));
  return frag;
}

function makeChip(name) {
  const span = document.createElement("span");
  span.className = "chip" + (state.variables.hasOwnProperty(name) ? "" : " unknown");
  span.contentEditable = "false";
  span.dataset.var = name;
  span.textContent = name;
  return span;
}

// Serialize a contenteditable node back to raw "{var}" template text.
function serializeEditable(node) {
  let out = "";
  for (const child of node.childNodes) {
    if (child.nodeType === Node.TEXT_NODE) {
      out += child.nodeValue;
    } else if (child.nodeType === Node.ELEMENT_NODE) {
      if (child.classList && child.classList.contains("chip")) {
        out += "{" + (child.dataset.var || "") + "}";
      } else if (child.tagName === "BR") {
        out += "\n";
      } else {
        // unexpected nested element — recurse to preserve text.
        out += serializeEditable(child);
      }
    }
  }
  return out;
}

// ── Render ───────────────────────────────────────────────────────────────
function $(sel, root) { return (root || document).querySelector(sel); }

function render() {
  const root = $("#root");
  root.innerHTML = "";

  root.appendChild(renderPalette());
  root.appendChild(renderTabs());
  root.appendChild(renderActiveEntry());
  root.appendChild(renderActions());

  // After paint, report height so the iframe sizes correctly.
  requestAnimationFrame(() => Streamlit.setHeight(document.body.scrollHeight));
}

function renderPalette() {
  const wrap = document.createElement("div");
  wrap.className = "palette";

  const title = document.createElement("div");
  title.className = "palette-title";
  title.textContent = "Variables · click to insert at cursor";
  wrap.appendChild(title);

  const chips = document.createElement("div");
  chips.className = "palette-chips";
  state.varNames.forEach((name) => {
    const chip = document.createElement("button");
    chip.type = "button";
    chip.className = "palette-chip";
    chip.title = state.variables[name];
    chip.innerHTML = "{" + name + "}" + '<span class="val">= ' + escapeHtml(truncate(state.variables[name], 40)) + "</span>";
    chip.addEventListener("mousedown", (e) => e.preventDefault()); // keep focus on editor
    chip.addEventListener("click", () => insertChipAtCursor(name));
    chips.appendChild(chip);
  });
  wrap.appendChild(chips);

  const hint = document.createElement("div");
  hint.className = "palette-hint";
  hint.textContent = "Tip: focus a template box first, then click a chip to drop it at the cursor.";
  wrap.appendChild(hint);
  return wrap;
}

function renderTabs() {
  const wrap = document.createElement("div");
  wrap.className = "tabs";

  state.entries.forEach((entry, idx) => {
    const tab = document.createElement("div");
    tab.className = "tab" + (idx === state.activeIdx ? " active" : "");
    tab.draggable = true;

    const label = document.createElement("span");
    label.textContent = "#" + (idx + 1);
    tab.appendChild(label);

    const count = document.createElement("span");
    count.className = "turn-count";
    count.textContent = "· " + entry.turns.length + "t";
    tab.appendChild(count);

    const close = document.createElement("span");
    close.className = "close";
    close.textContent = "✕";
    close.title = "Delete entry";
    close.addEventListener("click", (e) => {
      e.stopPropagation();
      if (!confirm("Delete entry #" + (idx + 1) + "?")) return;
      state.entries.splice(idx, 1);
      if (state.activeIdx >= state.entries.length) state.activeIdx = state.entries.length - 1;
      if (state.activeIdx < 0) state.activeIdx = 0;
      markDirty();
      render();
    });
    tab.appendChild(close);

    tab.addEventListener("click", () => {
      state.activeIdx = idx;
      render();
    });

    // Drag-to-reorder entries.
    tab.addEventListener("dragstart", (e) => {
      e.dataTransfer.setData("text/x-entry-idx", String(idx));
      e.dataTransfer.effectAllowed = "move";
    });
    tab.addEventListener("dragover", (e) => {
      if (e.dataTransfer.types.includes("text/x-entry-idx")) {
        e.preventDefault();
        tab.style.borderColor = "var(--accent)";
      }
    });
    tab.addEventListener("dragleave", () => { tab.style.borderColor = ""; });
    tab.addEventListener("drop", (e) => {
      tab.style.borderColor = "";
      const fromStr = e.dataTransfer.getData("text/x-entry-idx");
      if (!fromStr) return;
      e.preventDefault();
      const from = parseInt(fromStr, 10);
      if (from === idx) return;
      const [moved] = state.entries.splice(from, 1);
      state.entries.splice(idx, 0, moved);
      state.activeIdx = idx;
      markDirty();
      render();
    });

    wrap.appendChild(tab);
  });

  const add = document.createElement("button");
  add.type = "button";
  add.className = "tab-add";
  add.textContent = "+ Add entry";
  add.addEventListener("click", () => {
    state.entries.push({ entry_id: uid(), turns: [{ role: "user", template: "" }] });
    state.activeIdx = state.entries.length - 1;
    markDirty();
    render();
  });
  wrap.appendChild(add);
  return wrap;
}

function renderActiveEntry() {
  const wrap = document.createElement("div");
  wrap.className = "entry";

  const entry = state.entries[state.activeIdx];
  if (!entry) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "No entries yet. Click + Add entry to start.";
    wrap.appendChild(empty);
    return wrap;
  }

  const head = document.createElement("div");
  head.className = "col-head";
  head.innerHTML = "<div></div><div>Role</div><div>Template</div><div>Preview</div><div></div>";
  wrap.appendChild(head);

  entry.turns.forEach((turn, turnIdx) => {
    wrap.appendChild(renderTurn(entry, turnIdx, turn));
  });

  const addRow = document.createElement("div");
  addRow.className = "add-turn-row";
  const addBtn = document.createElement("button");
  addBtn.type = "button";
  addBtn.className = "btn ghost";
  addBtn.textContent = "+ Add turn";
  addBtn.addEventListener("click", () => {
    entry.turns.push({ role: nextRole(entry.turns), template: "" });
    markDirty();
    render();
  });
  addRow.appendChild(addBtn);
  wrap.appendChild(addRow);

  return wrap;
}

function renderTurn(entry, turnIdx, turn) {
  const row = document.createElement("div");
  row.className = "turn";
  row.draggable = false; // dragging is on the handle, not the row.

  // Drag handle.
  const handle = document.createElement("div");
  handle.className = "drag-handle";
  handle.textContent = "⠿";
  handle.draggable = true;
  handle.title = "Drag to reorder";
  handle.addEventListener("dragstart", (e) => {
    e.dataTransfer.setData("text/x-turn-idx", String(turnIdx));
    e.dataTransfer.effectAllowed = "move";
    row.classList.add("dragging");
  });
  handle.addEventListener("dragend", () => row.classList.remove("dragging"));
  row.appendChild(handle);

  row.addEventListener("dragover", (e) => {
    if (e.dataTransfer.types.includes("text/x-turn-idx")) {
      e.preventDefault();
      row.classList.add("drag-over");
    }
  });
  row.addEventListener("dragleave", () => row.classList.remove("drag-over"));
  row.addEventListener("drop", (e) => {
    row.classList.remove("drag-over");
    const fromStr = e.dataTransfer.getData("text/x-turn-idx");
    if (!fromStr) return;
    e.preventDefault();
    const from = parseInt(fromStr, 10);
    if (from === turnIdx) return;
    const [moved] = entry.turns.splice(from, 1);
    entry.turns.splice(turnIdx, 0, moved);
    markDirty();
    render();
  });

  // Role select.
  const sel = document.createElement("select");
  sel.className = "role-select";
  ROLES.forEach((r) => {
    const opt = document.createElement("option");
    opt.value = r;
    opt.textContent = r;
    if (r === turn.role) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener("change", () => {
    turn.role = sel.value;
    markDirty();
    // No full re-render needed; preview header isn't role-dependent in this design.
  });
  row.appendChild(sel);

  // Template (contenteditable with chips).
  const tpl = document.createElement("div");
  tpl.className = "template";
  tpl.contentEditable = "true";
  tpl.spellcheck = false;
  tpl.dataset.entryIdx = String(state.activeIdx);
  tpl.dataset.turnIdx = String(turnIdx);
  tpl.dataset.placeholder = "type message; click a chip above to insert a variable…";
  tpl.appendChild(buildEditableDOM(turn.template));
  updateEmptyAttr(tpl);

  tpl.addEventListener("focus", () => {
    state.focusedTurn = { entryIdx: state.activeIdx, turnIdx };
  });
  tpl.addEventListener("input", () => {
    turn.template = serializeEditable(tpl);
    updateEmptyAttr(tpl);
    updatePreview(row, turn.template);
    markDirty();
  });
  // Prevent pasted rich HTML — keep it plain text.
  tpl.addEventListener("paste", (e) => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData("text");
    document.execCommand("insertText", false, text);
  });
  row.appendChild(tpl);

  // Preview.
  const prev = document.createElement("div");
  prev.className = "preview";
  renderPreviewInto(prev, turn.template);
  row.appendChild(prev);

  // Delete turn.
  const del = document.createElement("button");
  del.type = "button";
  del.className = "turn-del";
  del.title = "Delete turn";
  del.textContent = "✕";
  del.addEventListener("click", () => {
    entry.turns.splice(turnIdx, 1);
    markDirty();
    render();
  });
  row.appendChild(del);

  return row;
}

function updateEmptyAttr(tpl) {
  const txt = serializeEditable(tpl);
  tpl.dataset.empty = txt.length === 0 ? "true" : "false";
}

function renderPreviewInto(node, template) {
  node.innerHTML = "";
  const segs = tokenize(template);
  if (!segs.length || segs.every((s) => !s.text)) {
    node.classList.add("empty");
    node.textContent = "(preview)";
    return;
  }
  node.classList.remove("empty");
  segs.forEach((s) => {
    if (s.type === "var") {
      const span = document.createElement("span");
      span.className = "val-chip";
      span.textContent = s.text;
      node.appendChild(span);
    } else if (s.type === "unknown") {
      const span = document.createElement("span");
      span.className = "chip unknown";
      span.textContent = s.name;
      node.appendChild(span);
    } else {
      node.appendChild(document.createTextNode(s.text));
    }
  });
}

function updatePreview(row, template) {
  const prev = row.querySelector(".preview");
  if (prev) renderPreviewInto(prev, template);
}

function renderActions() {
  const wrap = document.createElement("div");
  wrap.className = "actions";

  const saveBtn = document.createElement("button");
  saveBtn.type = "button";
  saveBtn.className = "btn primary";
  saveBtn.textContent = "💾 Save";
  saveBtn.addEventListener("click", () => emit("save"));
  wrap.appendChild(saveBtn);

  const approveBtn = document.createElement("button");
  approveBtn.type = "button";
  approveBtn.className = "btn ok";
  approveBtn.textContent = state.approved ? "↩ Un-approve" : "✅ Approve";
  approveBtn.addEventListener("click", () => {
    state.approved = !state.approved;
    emit("approve");
    render();
  });
  wrap.appendChild(approveBtn);

  const badge = document.createElement("div");
  badge.className = "dirty-badge" + (state.dirty ? "" : " clean");
  badge.id = "dirty-badge";
  badge.textContent = state.dirty ? "● unsaved changes" : "✓ saved";
  wrap.appendChild(badge);

  return wrap;
}

function renderBadge() {
  const b = document.getElementById("dirty-badge");
  if (!b) return;
  b.className = "dirty-badge" + (state.dirty ? "" : " clean");
  b.textContent = state.dirty ? "● unsaved changes" : "✓ saved";
}

// ── Variable insertion ───────────────────────────────────────────────────
function insertChipAtCursor(name) {
  const ft = state.focusedTurn;
  if (!ft) return;
  // Find the template element.
  const tpl = document.querySelector(
    `.template[data-entry-idx="${ft.entryIdx}"][data-turn-idx="${ft.turnIdx}"]`,
  );
  if (!tpl) return;
  tpl.focus();
  const sel = window.getSelection();
  let range;
  if (sel.rangeCount && tpl.contains(sel.anchorNode)) {
    range = sel.getRangeAt(0);
    range.deleteContents();
  } else {
    // No active selection inside this template — append at end.
    range = document.createRange();
    range.selectNodeContents(tpl);
    range.collapse(false);
  }
  const chip = makeChip(name);
  const space = document.createTextNode(" "); // nbsp so cursor lands cleanly after the chip
  range.insertNode(space);
  range.insertNode(chip);
  // Move caret after the space.
  const after = document.createRange();
  after.setStartAfter(space);
  after.collapse(true);
  sel.removeAllRanges();
  sel.addRange(after);

  // Persist to state.
  const entry = state.entries[ft.entryIdx];
  const turn = entry && entry.turns[ft.turnIdx];
  if (turn) {
    turn.template = serializeEditable(tpl);
    updateEmptyAttr(tpl);
    const row = tpl.closest(".turn");
    if (row) updatePreview(row, turn.template);
    markDirty();
  }
  requestAnimationFrame(() => Streamlit.setHeight(document.body.scrollHeight));
}

// ── Emit to Streamlit ────────────────────────────────────────────────────
function emit(action) {
  clearDirty();
  Streamlit.setValue({
    action,
    entries: state.entries,
    approved: state.approved,
    nonce: Date.now(),
  });
}

// ── Helpers ──────────────────────────────────────────────────────────────
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
  }[c]));
}
function truncate(s, n) {
  s = String(s);
  return s.length > n ? s.slice(0, n - 1) + "…" : s;
}

// ── Boot ─────────────────────────────────────────────────────────────────
Streamlit.onReady((args) => {
  // On every render-event from Streamlit:
  //   * First time → adopt inputs as authoritative state.
  //   * Subsequent times → ignore the incoming entries (Python re-passes
  //     them after our setValue), but pick up any change to approved
  //     coming from a different source.
  if (!state.initialized) {
    state.entries = JSON.parse(JSON.stringify(args.entries || []));
    state.variables = args.variables || {};
    state.varNames = Object.keys(state.variables);
    state.approved = !!args.approved;
    state.activeIdx = state.entries.length ? 0 : 0;
    state.initialized = true;
    render();
  } else {
    // Refresh variable map (labels could change if the unit was re-annotated
    // — but in practice the key changes on unit switch, remounting the iframe).
    state.variables = args.variables || state.variables;
    state.varNames = Object.keys(state.variables);
    // Re-render only the palette + previews to reflect new values.
    render();
  }
});
</script>
</body>
</html>
