services:
  frontend:
    build:
      context: ./acla_front
      dockerfile: dev.dockerfile
      args:
        - BACKEND_SERVER_IP=${BACKEND_SERVER_IP}
        - BACKEND_PROXY_PORT=${BACKEND_PROXY_PORT}
    container_name: acla_front_c
    env_file:
      - .dev.env
    environment:
      - WATCHPACK_POLLING=true
      - WDS_SOCKET_PORT=3000
      - FAST_REFRESH=false
    ports:
      - '${REACT_WEBSITE_PORT}:3000'
    # Mounts the current directory and node_modules for hot-reloading.
    volumes:
      - ./acla_front:/app
      - /app/node_modules
    # stdin_open and tty: Keep the container running and interactive.
    stdin_open: true
    tty: true
    depends_on:
      - backend_proxy
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  backend_proxy:
    image: nginx:stable-perl
    container_name: backend_proxy_c
    ports:
      - "${BACKEND_PROXY_PORT}:80"
    volumes:
      - ./backend_nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ./static:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - frontend-network
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  backend:
    build:
      context: ./acla_backend
      dockerfile: dev.dockerfile
    container_name: acla_backend_c
    env_file:
      - .dev.env
      - .env.secrets
    environment:
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - AI_SERVICE_USERNAME=${AI_SERVICE_USERNAME}
      - AI_SERVICE_PASSWORD=${AI_SERVICE_PASSWORD}
    volumes:
      - ./acla_backend:/app
      - /app/node_modules
    depends_on:
      - mongodb
    ports:
      - '7001:7001'
    networks:
      - db-network
      - frontend-network
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G

  ai_service:
    build:
      context: ./acla_ai_service
      dockerfile: dev.dockerfile
    container_name: acla_ai_service_c
    env_file:
      - .dev.env
      - .env.secrets
    environment:
      - BACKEND_SERVER_IP=${BACKEND_SERVER_IP_FOR_AI}
      - BACKEND_PROXY_PORT=${BACKEND_PORT}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AI_SERVICE_USERNAME=${AI_SERVICE_USERNAME}
      - AI_SERVICE_PASSWORD=${AI_SERVICE_PASSWORD}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
      - GEMINI_BATCH_GCS_BUCKET=${GEMINI_BATCH_GCS_BUCKET}
      - HF_TOKEN=${HF_TOKEN}
      # Telemetry storage backend: 'lance' (Lance-backed columnar store) or
      # 'zarr' (legacy chunked-JSON-over-Zarr). Defaults to 'lance' after the
      # migration in scripts/migrate_zarr_to_lance.py copied all cache_keys
      # from telemetry_zarr_store/ to telemetry_lance_store/.
      - TELEMETRY_STORE_BACKEND=${TELEMETRY_STORE_BACKEND:-lance}
    volumes:
      - ./acla_ai_service:/app
      # Share the host's Claude Code login (Max subscription) with the
      # container so claude-agent-sdk can spawn `claude` without re-auth.
      # Read-write so the CLI can refresh its OAuth tokens.
      # The CLI expects both ~/.claude/ (state dir, holds .credentials.json)
      # AND ~/.claude.json (top-level config file, sibling of the dir).
      - ${HOME}/.claude:/root/.claude
      - ${HOME}/.claude.json:/root/.claude.json
      # One volume for ALL on-disk AI models: chat sidecar GGUF, Kokoro TTS,
      # annotation VLM GGUFs + mmproj, HuggingFace cache, LoRA adapters,
      # training datasets. Subdirs are created on demand by the service.
      - ai_models:/app/models
    ports:
      - '8000:8000'
      - '8080:8080'
      - '8501:8501'
    network_mode: "host"
    deploy:
      resources:
        reservations:
          memory: 1G

  mongodb:
    build: ./acla_db
    container_name: mongodb_c
    restart: always
    environment:
      #create a user for authticated database access
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ADMINUSERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ADMINPASSWORD}
      MONGO_ADMINPASSWORD: ${MONGO_ADMINPASSWORD}
      MONGO_ADMINUSERNAME: ${MONGO_ADMINUSERNAME}
      MONGO_INITDB_DATABASE: ${MONGO_DATEBASE}
    volumes:
      - ./acla_db/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js
      - mongodb_data:/data/db
      - ./acla_db/backups:/backups
    env_file:
      - .dev.env
    ports:
      - "27017:27017"
    networks:
      - db-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  #The default values for the first login are "admin" for username and "pass" for password
  mongo-express:
    image: mongo-express:1.0.2-20-alpine3.19
    container_name: mongo-express
    ports:
      - 8081:8081
    env_file:
      - .dev.env
    environment:
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ADMINUSERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ADMINPASSWORD}
      #use the created admin user inside this compose file for authenticated database access
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ADMINUSERNAME}:${MONGO_ADMINPASSWORD}@mongodb_c:27017
    volumes:
      - mongodb_data:/data/db:ro
    networks:
      - db-network
    depends_on:
      - mongodb
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  mongodb_data:
    driver: local
  ai_models:
    driver: local

networks:
  db-network:
    driver: bridge

  frontend-network:
    driver: bridge
