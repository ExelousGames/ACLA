services:
  ai_service:
    build:
      context: ./acla_ai_service
      dockerfile: dev.amd.dockerfile
    privileged: true
    ipc: host
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
      - /dev/mem:/dev/mem
    security_opt:
      - seccomp=unconfined
    group_add:
      - video
      - render
    environment:
      - ROCM_PATH=/opt/rocm
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
      - GEMINI_BATCH_GCS_BUCKET=${GEMINI_BATCH_GCS_BUCKET}
