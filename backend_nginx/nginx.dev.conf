
events {}

http {
    client_max_body_size 100M;

    # WebSocket upgrade mapping. When a request includes `Upgrade: websocket`,
    # we need to forward both the Upgrade and Connection headers; for normal
    # HTTP requests we want Connection unset so keepalive isn't broken.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 80;
        server_name backend;
        location / {
            #using docker network to communicate
            proxy_pass http://acla_backend_c:7001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # Voice sessions can be long-lived; bump idle timeouts so nginx
            # doesn't drop them between user turns.
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
        }
    }
}
